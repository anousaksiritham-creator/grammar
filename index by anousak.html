{id:"u119",num:"Unit 119",title:"one and ones",
preview:"Which bag do you want? The big one. I like the red ones.",
grammar:[
{h:"one = replacing a singular countable noun",c:`Use <span class="hl">one</span> to avoid repeating a noun:<span class="ex">Which bag? — The <span class="w">big one</span>. (= the big bag)<br>I need a pen — do you have <span class="w">one</span>? (= a pen)<br>This coat is too small. I need a bigger <span class="w">one</span>.</span>`},
{h:"ones = replacing plural countable nouns",c:`<span class="ex">Which shoes? — The <span class="w">red ones</span>. (= the red shoes)<br>I don't like these — I prefer the <span class="w">ones</span> over there.</span>`},
{h:"one / ones after adjectives",c:`<span class="ex">Do you want the cheap <span class="w">one</span> or the expensive <span class="w">one</span>?<br>I like the small <span class="w">ones</span> better than the large <span class="w">ones</span>.</span>`},
{h:"one (impersonal) vs. one (replacing noun)",c:`<span class="ex">I need to buy a new phone — <span class="w">one</span> that has a good camera. (= a phone)<br><span class="w">One</span> should always be polite. (impersonal 'you')</span>`}
],
quiz:[
{q:"Which dress do you prefer? The long _____.",o:["one","ones","it","that"],a:"one",h:"Singular noun replacement → one"},
{q:"I like these shoes, but the blue _____ are nicer.",o:["ones","one","that","those"],a:"ones",h:"Plural noun replacement → ones"},
{q:"I lost my pen. Do you have _____?",o:["one","ones","it","a one"],a:"one",h:"= a pen → one"},
{q:"These biscuits are nice but I prefer the chocolate _____.",o:["ones","one","them","those"],a:"ones",h:"Plural → ones"},
]},

{id:"u120",num:"Unit 120",title:"I think so / I hope so / I'm afraid so",
preview:"Will it rain? I think so. Is she coming? I hope so. I'm afraid not.",
grammar:[
{h:"so / not after think/hope/believe/expect/suppose/imagine/afraid",c:`Use <span class="hl">so</span> (positive) or <span class="hl">not</span> (negative) instead of repeating a clause:<span class="ex">Will it rain? — I <span class="w">think so</span>. (= I think it will rain.)<br>Is she coming? — I <span class="w">hope so</span>. (= I hope she is.)<br>Has she left? — I'm <span class="w">afraid so</span>. (= I'm afraid she has.)</span>`},
{h:"Negative forms",c:`<table><tr><th>Verb</th><th>Positive</th><th>Negative</th></tr><tr><td>think</td><td>I think so.</td><td>I don't think so.</td></tr><tr><td>hope</td><td>I hope so.</td><td>I hope not.</td></tr><tr><td>believe</td><td>I believe so.</td><td>I don't believe so.</td></tr><tr><td>afraid</td><td>I'm afraid so.</td><td>I'm afraid not.</td></tr><tr><td>suppose</td><td>I suppose so.</td><td>I suppose not.</td></tr></table>`}
],
quiz:[
{q:"Is it going to rain? — I _____ so. (I think it will)",o:["think","hope","afraid","suppose"],a:"think",h:"Giving an opinion → I think so"},
{q:"Is the restaurant closed? — I'm afraid _____.",o:["so","not","it","yes"],a:"so",h:"Confirming bad news → I'm afraid so"},
{q:"Will she be there? — I _____ not. (I don't want her to be)",o:["hope","think","suppose","afraid"],a:"hope",h:"Hoping for negative → I hope not"},
{q:"Did he pass? — I don't _____ so. (I doubt it)",o:["think","hope","afraid","suppose"],a:"think",h:"Doubting → I don't think so"},
]},
]},

// ══════════════════════════════════════════
// SECTION 28 — LOOK, SEEM, FEEL, SMELL, SOUND
// ══════════════════════════════════════════
{id:"sense",label:"Sense Verbs & Expressions",units:[
{id:"u121",num:"Unit 121",title:"look / sound / smell / taste / feel + adjective",
preview:"She looks tired. It sounds good. This smells strange. It tastes delicious.",
grammar:[
{h:"Sense verbs + adjective (NOT adverb)",c:`<span class="hl">look, sound, smell, taste, feel</span> + adjective (describe the subject)<span class="ex">She <span class="w">looks</span> tired. (NOT: looks tiredly)<br>That music <span class="w">sounds</span> good. &nbsp; This food <span class="w">tastes</span> awful.<br>The flowers <span class="w">smell</span> beautiful. &nbsp; I <span class="w">feel</span> better today.</span>`},
{h:"look like / sound like / feel like + noun",c:`<span class="hl">look like + noun</span> = resemble<span class="ex">She <span class="w">looks like</span> her mother. (similar appearance)<br>That <span class="w">sounds like</span> a good idea. &nbsp; It <span class="w">feels like</span> silk.</span>`},
{h:"look + as if/though (clause)",c:`<span class="ex">She <span class="w">looks as if</span> she hasn't slept. &nbsp; It <span class="w">looks as though</span> it will rain.<br>He <span class="w">sounds as if</span> he's angry.</span>`}
],
quiz:[
{q:"She _____ very tired — has she been working all night?",o:["looks","is looking","looks like","seems like"],a:"looks",h:"looks + adjective (not adverb)"},
{q:"That idea _____ great! Let's do it.",o:["sounds","sounds like","hears","is sounding"],a:"sounds",h:"sounds + adjective"},
{q:"He _____ his father — same nose, same eyes.",o:["looks like","looks","appears","seems"],a:"looks like",h:"look like + noun = resemble"},
{q:"This coffee _____ bitter — did you add sugar?",o:["tastes","is tasting","tastes like","taste"],a:"tastes",h:"sense verb + adjective"},
]},

{id:"u122",num:"Unit 122",title:"make + object + adjective/verb (make her happy)",
preview:"The film made me cry. She made him apologize. It makes me angry.",
grammar:[
{h:"make + object + adjective",c:`<span class="hl">make + object + adjective</span> = cause someone/something to feel/be a certain way<span class="ex">The film <span class="w">made me cry</span>. (= caused me to cry)<br>She <span class="w">makes me happy</span>. &nbsp; The noise <span class="w">made him angry</span>.<br>That song <span class="w">makes me sad</span>.</span>`},
{h:"make + object + base verb (causative)",c:`<span class="hl">make + object + base verb</span> = force or cause to do something<span class="ex">She <span class="w">made him apologize</span>. (he had to apologize)<br>Don't <span class="w">make me laugh</span>! &nbsp; The teacher <span class="w">made us wait</span>.</span>`},
{h:"make vs. let",c:`<span class="hl">make</span> = force (do it even if you don't want to)<br><span class="hl">let</span> = allow (permit to do something)<span class="ex">She <span class="w">made</span> him clean his room. (forced)<br>She <span class="w">let</span> him go to the party. (allowed)</span>`}
],
quiz:[
{q:"The news _____ her very sad.",o:["made","let","made her","caused"],a:"made",h:"make + object + adjective"},
{q:"He _____ me wait for an hour!",o:["made","let","had","caused"],a:"made",h:"force → make + object + base verb"},
{q:"Her parents _____ her stay out until midnight.",o:["let","made","have","allowed"],a:"let",h:"allow → let + object + base verb"},
{q:"Don't _____ me laugh — it's not funny!",o:["make","let","have","cause"],a:"make",h:"make + object + base verb"},
]},

{id:"u123",num:"Unit 123",title:"see/hear/notice/watch + object + -ing or base verb",
preview:"I heard her singing. I saw him leave. I noticed them arguing.",
grammar:[
{h:"see/hear/notice/watch/feel + object + -ing (part of action)",c:`+ -ing = in progress, part of the action (not the whole thing)<span class="ex">I <span class="w">heard her singing</span>. (= she was in the middle of singing)<br>I <span class="w">saw them arguing</span>. &nbsp; We <span class="w">watched him playing</span> football.</span>`},
{h:"see/hear/notice/watch/feel + object + base verb (complete action)",c:`+ base verb = the whole/complete action<span class="ex">I <span class="w">saw him leave</span> the building. (= I saw the whole thing — he left)<br>I <span class="w">heard someone knock</span> at the door. (complete knock)</span>`},
{h:"Difference",c:`<span class="ex">I <span class="w">saw her cross</span> the road. (complete — I saw her cross all the way)<br>I <span class="w">saw her crossing</span> the road. (in progress — while she was in the middle of crossing)</span>`}
],
quiz:[
{q:"I _____ him _____ (leave) the office at 6pm.",o:["saw/leave","saw/to leave","watched/left","see/leaving"],a:"saw/leave",h:"Complete action → see + object + base verb"},
{q:"She _____ someone _____ (sing) outside.",o:["heard/singing","heard/to sing","listen/sing","hears/sang"],a:"heard/singing",h:"In progress → hear + object + -ing"},
{q:"I _____ them _____ (argue) in the corridor.",o:["noticed/arguing","noticed/argue","notice/argued","saw/to argue"],a:"noticed/arguing",h:"Partial/in-progress → notice + -ing"},
{q:"We _____ the plane _____ (take off).",o:["watched/take off","watched/taking off","Both correct","see/took off"],a:"Both correct",h:"both base verb and -ing work with watch"},
]},

{id:"u124",num:"Unit 124",title:"something to do / nowhere to go / time to rest",
preview:"I have nothing to do. Is there anywhere to eat? She has no time to rest.",
grammar:[
{h:"something/nothing/anywhere + to-infinitive",c:`<span class="hl">something/nothing/anything/somewhere/nowhere/anywhere</span> + to + verb<span class="ex">I have <span class="w">nothing to do</span>. &nbsp; Is there <span class="w">anywhere to eat</span>?<br>I need <span class="w">something to drink</span>. &nbsp; There's <span class="w">nowhere to sit</span>.</span>`},
{h:"noun + to-infinitive",c:`<span class="hl">noun + to + verb</span> = the purpose or use<span class="ex">I don't have <span class="w">time to rest</span>. &nbsp; There's a lot of <span class="w">work to do</span>.<br>Is there a <span class="w">reason to worry</span>? &nbsp; I have a <span class="w">meeting to attend</span>.</span>`},
{h:"adjective + noun + to-infinitive",c:`<span class="ex">It's the <span class="w">best way to learn</span>. &nbsp; It was a <span class="w">nice place to visit</span>.<br>She's the <span class="w">right person to ask</span>.</span>`}
],
quiz:[
{q:"I have _____ to do this weekend — I'm free!",o:["nothing","nowhere","nobody","no"],a:"nothing",h:"no thing → nothing + to-infinitive"},
{q:"Is there _____ to eat near here?",o:["anywhere","somewhere","nowhere","everywhere"],a:"anywhere",h:"Question → anywhere to eat"},
{q:"She doesn't have _____ to practise.",o:["time","times","the time","a time"],a:"time",h:"time to practise (no article needed here)"},
{q:"There's _____ to sit — it's completely full.",o:["nowhere","nothing","nobody","no place"],a:"nowhere",h:"no place → nowhere + to sit"},
]},

{id:"u125",num:"Unit 125",title:"Adjective + to-infinitive (easy to do, happy to help)",
preview:"It's easy to learn. She was happy to help. This is difficult to understand.",
grammar:[
{h:"It + be + adjective + to-infinitive",c:`<span class="ex">It's <span class="w">easy to understand</span>. &nbsp; It's <span class="w">difficult to explain</span>.<br>It's <span class="w">important to be</span> honest. &nbsp; It was <span class="w">nice to meet</span> you.</span>`},
{h:"Subject + be + adjective + to-infinitive",c:`<span class="ex">She was <span class="w">happy to help</span>. &nbsp; He was <span class="w">surprised to see</span> me.<br>They were <span class="w">ready to go</span>. &nbsp; I'm <span class="w">pleased to meet</span> you.</span>`},
{h:"Noun + adjective + to-infinitive",c:`<span class="ex">The exam was <span class="w">easy to pass</span>. &nbsp; The problem was <span class="w">hard to solve</span>.<br>The water is <span class="w">safe to drink</span>. &nbsp; Is this <span class="w">OK to eat</span>?</span>`},
{h:"Too + adj + to / adj + enough + to",c:`<span class="ex">It's <span class="w">too difficult to understand</span>. (can't do it)<br>She's <span class="w">old enough to vote</span>. (can do it)</span>`}
],
quiz:[
{q:"It's _____ to learn a new language as an adult.",o:["difficult to","difficult for","difficulty to","difficult at"],a:"difficult to",h:"It's + adjective + to-infinitive"},
{q:"He was _____ see her again after so long.",o:["happy to","happy for","happily to","glad for"],a:"happy to",h:"Subject + was + adjective + to-infinitive"},
{q:"This water is _____ drink — it's clean.",o:["safe to","safe for","safely to","safe enough"],a:"safe to",h:"Noun + adjective + to-infinitive"},
{q:"She's _____ understand fast speech — she's a beginner.",o:["too young to","not old enough to","too good to","Both a and b"],a:"Both a and b",h:"too ... to / not ... enough to both express inability"},
]},
]},

// ══════════════════════════════════════════
// SECTION 29 — PASSIVE ADVANCED
// ══════════════════════════════════════════
{id:"pass2",label:"Advanced Passive",units:[
{id:"u126",num:"Unit 126",title:"Passive with modal verbs",
preview:"It must be done. It should be cleaned. The meeting can be postponed.",
grammar:[
{h:"Modal + be + past participle",c:`<span class="hl">must / should / can / could / will / might / may</span> + be + past participle<span class="ex">This <span class="w">must be done</span> by tomorrow.<br>The room <span class="w">should be cleaned</span> every day.<br>The meeting <span class="w">can be postponed</span>. &nbsp; The answer <span class="w">might be wrong</span>.</span>`},
{h:"Modal perfect passive: modal + have been + p.p.",c:`<span class="ex">The letter <span class="w">should have been sent</span> yesterday.<br>It <span class="w">could have been avoided</span>. &nbsp; He <span class="w">must have been informed</span>.</span>`},
{h:"Common examples",c:`<span class="ex">Smoking <span class="w">is not allowed</span> here. &nbsp; English <span class="w">is taught</span> in schools.<br>Your question <span class="w">will be answered</span> shortly.<br>All bags <span class="w">must be checked</span>.</span>`}
],
quiz:[
{q:"This report _____ (finish) by Friday.",o:["must be finished","must finish","must be finish","has to finished"],a:"must be finished",h:"modal + be + past participle"},
{q:"The mistake _____ (could/avoid).",o:["could have been avoided","could be avoided","could avoid","could been avoided"],a:"could have been avoided",h:"Past modal passive: could have been + p.p."},
{q:"Passengers _____ (request) to fasten their seatbelts.",o:["are requested","are requesting","request","will requesting"],a:"are requested",h:"Present passive: are + past participle"},
{q:"The problem _____ (should/address) immediately.",o:["should be addressed","should been addressed","should have been address","should addressed"],a:"should be addressed",h:"modal + be + past participle"},
]},

{id:"u127",num:"Unit 127",title:"It is said that... / He is said to be...",
preview:"It is said that she is rich. She is said to be rich. It is believed that...",
grammar:[
{h:"It + passive + that-clause (impersonal passive)",c:`<span class="hl">It is said / believed / thought / reported / known</span> + that...<span class="ex"><span class="w">It is said that</span> she is very rich.<br><span class="w">It is believed that</span> he stole the money.<br><span class="w">It was reported that</span> there was an accident.</span>`},
{h:"Subject + passive + to-infinitive",c:`<span class="hl">Subject + is said/believed/thought/known + to + be/have etc.</span><span class="ex">She <span class="w">is said to be</span> very rich. (= It is said that she is)<br>He <span class="w">is believed to have stolen</span> the money.<br>They <span class="w">are thought to be</span> in hiding.</span>`},
{h:"Past reference: to have + p.p.",c:`<span class="ex">She is said <span class="w">to have been</span> a great singer. (in the past)<br>He is thought <span class="w">to have escaped</span> the country.</span>`}
],
quiz:[
{q:"_____ that the company is in financial trouble.",o:["It is said","They say","It is saying","It says"],a:"It is said",h:"Impersonal passive → It is said that"},
{q:"She is believed _____ over a million dollars.",o:["to have earned","to earn","earning","have earned"],a:"to have earned",h:"Past reference → to have + p.p."},
{q:"It _____ that the temperature will rise by 2 degrees.",o:["is predicted","predicts","was predicting","has predicted"],a:"is predicted",h:"Impersonal passive: it is + past participle + that"},
{q:"The suspects are _____ hiding in the mountains.",o:["thought to be","thought being","thought that are","thinking to be"],a:"thought to be",h:"Subject + is thought + to be"},
]},

{id:"u128",num:"Unit 128",title:"Passive with two objects (I was given / She was shown)",
preview:"I was given a prize. She was shown the way. He was offered the job.",
grammar:[
{h:"Verbs with two objects → two possible passives",c:`Active: <span class="hl">They gave him a prize.</span><br>Passive 1: <span class="hl">He was given a prize.</span> (person = subject)<br>Passive 2: <span class="hl">A prize was given to him.</span> (thing = subject)<span class="ex">Active: The company offered her the job.<br>→ <span class="w">She was offered the job</span>. (more common)<br>→ The job was offered to her.</span>`},
{h:"Common verbs with two passives",c:`<span class="hl">give, offer, show, send, tell, teach, pay, award, lend, promise</span><span class="ex">I <span class="w">was told</span> to wait. &nbsp; She <span class="w">was shown</span> the way.<br>He <span class="w">was sent</span> a letter. &nbsp; We <span class="w">were taught</span> English.</span>`}
],
quiz:[
{q:"The winner _____ a gold medal.",o:["was given","was give","gave","is given"],a:"was given",h:"Person as subject of passive: was + given"},
{q:"She _____ the truth about what happened.",o:["was told","told","is telling","was tell"],a:"was told",h:"tell → was told (passive)"},
{q:"All employees _____ a bonus at the end of the year.",o:["are paid","pay","are pay","is paid"],a:"are paid",h:"Present passive: are + past participle"},
{q:"He _____ the opportunity to study abroad.",o:["was offered","offered","was offer","has offering"],a:"was offered",h:"offer → was offered (passive)"},
]},
]},

// ══════════════════════════════════════════

{id:"add",label:"Additional Grammar",units:[
{id:"u129",num:"Unit 129",title:"both... and / either... or / neither... nor",
preview:"Both Tom and Lisa came. Either he or she will do it. Neither plan worked.",
grammar:[
{h:"both ... and (two, all true)",c:`<span class="hl">both ... and</span> = A and B (two things are true)<span class="ex"><span class="w">Both</span> Tom <span class="w">and</span> Lisa came. (= Tom came AND Lisa came)<br>She is <span class="w">both</span> smart <span class="w">and</span> beautiful.</span>`},
{h:"either ... or (one of two)",c:`<span class="hl">either ... or</span> = A or B (one of the two)<span class="ex"><span class="w">Either</span> he <span class="w">or</span> she will do it.<br>You can have <span class="w">either</span> tea <span class="w">or</span> coffee.</span>`},
{h:"neither ... nor (not A, not B)",c:`<span class="hl">neither ... nor</span> = not A and not B<span class="ex"><span class="w">Neither</span> Tom <span class="w">nor</span> Lisa came. (= Tom didn't come and Lisa didn't come)<br>She is <span class="w">neither</span> rich <span class="w">nor</span> famous.</span>`},
{h:"Verb agreement",c:`<span class="hl">both ... and</span> → plural verb<br><span class="hl">either/neither ... or/nor</span> → verb agrees with the nearest subject<span class="ex"><span class="w">Both</span> he <span class="w">and</span> she <span class="w">are</span> coming.<br><span class="w">Either</span> he <span class="w">or</span> they <span class="w">are</span> responsible.</span>`}
],
quiz:[
{q:"_____ she _____ I can come — neither of us is free.",o:["Neither/nor","Both/and","Either/or","Not/nor"],a:"Neither/nor",h:"Not A, not B → neither ... nor"},
{q:"You can choose _____ the red _____ the blue one.",o:["either/or","neither/nor","both/and","not/or"],a:"either/or",h:"One of two → either ... or"},
{q:"_____ the food _____ the service was good — perfect evening!",o:["Both/and","Either/or","Neither/nor","Not/and"],a:"Both/and",h:"Two true things → both ... and"},
{q:"_____ he _____ she is right — I disagree with both.",o:["Neither/nor","Both/and","Either/or","Not/and"],a:"Neither/nor",h:"Not A and not B → neither ... nor"},
]},

{id:"u130",num:"Unit 130",title:"whatever, whenever, wherever — review and extension",
preview:"Take whatever you need. Come whenever you want. I'll follow wherever you go.",
grammar:[
{h:"whatever = anything that / no matter what",c:`<span class="ex">Take <span class="w">whatever</span> you need. (= anything that you need)<br><span class="w">Whatever</span> you do, be careful.</span>`},
{h:"whoever = anyone who / no matter who",c:`<span class="ex"><span class="w">Whoever</span> finds it can keep it. (= anyone who finds it)<br>I'll help <span class="w">whoever</span> needs it.</span>`},
{h:"whichever = any one that / no matter which",c:`<span class="ex">Choose <span class="w">whichever</span> you like best.<br><span class="w">Whichever</span> route you take, it takes an hour.</span>`},
{h:"whenever / wherever / however",c:`<span class="ex">Come <span class="w">whenever</span> you want. (= at any time)<br>I'll go <span class="w">wherever</span> you go. (= to any place)<br><span class="w">However</span> difficult it is, don't give up.</span>`}
],
quiz:[
{q:"You can eat _____ you want from the buffet.",o:["whatever","whoever","whenever","whichever"],a:"whatever",h:"Anything that (food) → whatever"},
{q:"_____ calls, please take a message.",o:["Whoever","Whatever","Whenever","However"],a:"Whoever",h:"Anyone who calls → whoever"},
{q:"Choose _____ seat you prefer — they're all the same.",o:["whichever","whatever","whoever","wherever"],a:"whichever",h:"Any one of the specific options → whichever"},
{q:"Come _____ you're ready — there's no hurry.",o:["whenever","wherever","whoever","whatever"],a:"whenever",h:"At any time → whenever"},
]},

{id:"u131",num:"Unit 131",title:"other / another / others",
preview:"I need another one. The others are waiting. Some people agreed; others didn't.",
grammar:[
{h:"another = one more (singular)",c:`<span class="hl">another</span> + singular countable noun = one more / a different one<span class="ex">Can I have <span class="w">another</span> coffee? &nbsp; Try <span class="w">another</span> way.<br>That wasn't enough — give me <span class="w">another one</span>.</span>`},
{h:"other = different (plural or uncountable)",c:`<span class="hl">other</span> + plural noun / uncountable<span class="ex">There are <span class="w">other</span> ways to do this.<br>I have <span class="w">other</span> things to do. &nbsp; Do you have any <span class="w">other</span> questions?</span>`},
{h:"the other / the others = the remaining one(s)",c:`<span class="hl">the other</span> = the remaining one (of two)<br><span class="hl">the others</span> = the remaining ones (of a group)<span class="ex">One coffee is for me. <span class="w">The other</span> is for you. (of two)<br>Some students passed. <span class="w">The others</span> failed. (rest of the group)</span>`},
{h:"others (no the) = different people/things in general",c:`<span class="ex">Some people like it. <span class="w">Others</span> don't. (= other people in general)</span>`}
],
quiz:[
{q:"I don't like this colour. Can I try _____ one?",o:["another","other","the other","others"],a:"another",h:"One more/different (singular) → another"},
{q:"Two of the students came late. _____ arrived on time.",o:["The others","Others","The other","Other"],a:"The others",h:"Rest of the specific group → the others"},
{q:"Some enjoy coffee; _____ prefer tea.",o:["others","the others","another","other"],a:"others",h:"Other people in general → others"},
{q:"This solution doesn't work. Let's think of _____ solutions.",o:["other","another","the other","others"],a:"other",h:"Different (plural) → other + plural noun"},
]},

{id:"u132",num:"Unit 132",title:"at / in / on — expressions of place (review)",
preview:"at home, in the car, on the bus, in bed, on the phone, at work",
grammar:[
{h:"Fixed expressions with at",c:`<span class="hl">at home / at work / at school / at university / at the top/bottom / at the front/back / at the end / at the corner / at a party / at a conference</span><span class="ex">I'll be <span class="w">at home</span> all day. &nbsp; She's <span class="w">at work</span>. &nbsp; Meet me <span class="w">at the corner</span>.</span>`},
{h:"Fixed expressions with in",c:`<span class="hl">in bed / in hospital / in prison / in the car / in a taxi / in a lift / in the street / in the city / in the country / in a queue</span><span class="ex">She spent the day <span class="w">in bed</span>. &nbsp; We got stuck <span class="w">in a queue</span>.</span>`},
{h:"Fixed expressions with on",c:`<span class="hl">on the bus / on the train / on a plane / on a ship / on the phone / on the radio / on TV / on the internet / on the left/right / on the floor / on the ceiling</span><span class="ex">I heard it <span class="w">on the radio</span>. &nbsp; She was <span class="w">on the phone</span>.</span>`}
],
quiz:[
{q:"I'm going _____ bed — I'm exhausted.",o:["to","in","at","on"],a:"to",h:"go to bed (movement)"},
{q:"She's _____ the phone — she'll be with you in a minute.",o:["on","in","at","by"],a:"on",h:"on the phone (fixed expression)"},
{q:"I'm not _____ work today — I'm on holiday.",o:["at","in","on","to"],a:"at",h:"at work (fixed expression)"},
{q:"The cat is sleeping _____ the floor.",o:["on","in","at","over"],a:"on",h:"surface → on the floor"},
]},

{id:"u133",num:"Unit 133",title:"Common Errors — mistakes to avoid",
preview:"I am agree ✗ → I agree ✓. She is married with ✗ → married to ✓.",
grammar:[
{h:"Common grammar errors",c:`<table><tr><th>Wrong ✗</th><th>Correct ✓</th></tr><tr><td>I am agree.</td><td>I <b>agree</b>.</td></tr><tr><td>She is married with him.</td><td>She is married <b>to</b> him.</td></tr><tr><td>I am boring.</td><td>I am <b>bored</b>. / It is <b>boring</b>.</td></tr><tr><td>She doesn't knows.</td><td>She doesn't <b>know</b>.</td></tr><tr><td>I didn't went.</td><td>I didn't <b>go</b>.</td></tr><tr><td>very much people</td><td><b>many</b> people</td></tr><tr><td>He is taller as me.</td><td>He is taller <b>than</b> me.</td></tr></table>`},
{h:"More common errors",c:`<table><tr><th>Wrong ✗</th><th>Correct ✓</th></tr><tr><td>I have 20 years.</td><td>I am 20 years old.</td></tr><tr><td>It depends of...</td><td>It depends <b>on</b>...</td></tr><tr><td>He suggested me to go.</td><td>He suggested <b>going</b> / that I <b>go</b>.</td></tr><tr><td>I am interesting in...</td><td>I am <b>interested</b> in...</td></tr><tr><td>since 5 years</td><td><b>for</b> 5 years</td></tr></table>`}
],
quiz:[
{q:"She is married _____ a doctor.",o:["to","with","by","from"],a:"to",h:"married to (NOT married with)"},
{q:"The film was very _____.",o:["boring","bored","bore","boringful"],a:"boring",h:"Describing the thing → -ing adjective (boring)"},
{q:"She didn't _____ to the party.",o:["come","came","comes","coming"],a:"come",h:"didn't + base verb (NOT didn't came)"},
{q:"He is taller _____ his brother.",o:["than","as","then","that"],a:"than",h:"Comparative → than (NOT as or then)"},
]},

{id:"u134",num:"Unit 134",title:"Spelling rules — -ed, -ing, plurals, comparatives",
preview:"stop→stopping, love→loving, study→studied, big→bigger, happy→happiest",
grammar:[
{h:"-ing spelling rules",c:`• Most verbs: add -ing → <span class="hl">work→working</span>, <span class="hl">read→reading</span><br>• End in -e: drop e + -ing → <span class="hl">come→coming</span>, <span class="hl">write→writing</span><br>• Short (CVC): double consonant + -ing → <span class="hl">run→running</span>, <span class="hl">sit→sitting</span>, <span class="hl">swim→swimming</span>`},
{h:"-ed spelling rules",c:`• Most verbs: add -ed → <span class="hl">work→worked</span>, <span class="hl">play→played</span><br>• End in -e: add -d → <span class="hl">love→loved</span>, <span class="hl">use→used</span><br>• End in consonant+y: y→i + -ed → <span class="hl">study→studied</span>, <span class="hl">carry→carried</span><br>• Short (CVC): double consonant → <span class="hl">stop→stopped</span>, <span class="hl">plan→planned</span>`},
{h:"Comparative/superlative spelling",c:`• End in -e: add -r/-st → <span class="hl">nice→nicer→nicest</span><br>• End in consonant+y: y→i → <span class="hl">happy→happier→happiest</span><br>• Short (CVC): double → <span class="hl">big→bigger→biggest</span>, <span class="hl">hot→hotter→hottest</span>`}
],
quiz:[
{q:"What is the -ing form of 'swim'?",o:["swimming","swiming","swiming","swimm"],a:"swimming",h:"Short vowel+m → double m + -ing"},
{q:"What is the past tense of 'study'?",o:["studied","studyed","studyied","studed"],a:"studied",h:"consonant+y → y→i + -ed"},
{q:"What is the comparative of 'big'?",o:["bigger","biger","more big","bigg"],a:"bigger",h:"Short CVC → double g + -er"},
{q:"What is the -ing form of 'write'?",o:["writing","writeing","writting","writes"],a:"writing",h:"End in -e → drop e + -ing"},
]},

{id:"u135",num:"Unit 135",title:"Punctuation & Capital Letters",
preview:"I live in Bangkok. She's from Thailand. What time is it? Don't be late!",
grammar:[
{h:"Capital letters — when to use",c:`• Start of sentence: <span class="hl">She</span> is a teacher.<br>• Proper nouns: <span class="hl">Thailand, Bangkok, Tom, Monday, January</span><br>• Pronoun I: <span class="hl">I</span> am happy.<br>• Titles: <span class="hl">Dr</span> Smith, <span class="hl">President</span> Obama`},
{h:"Full stop / Period (.)",c:`At the end of a statement:<span class="ex">I live in Bangkok<span class="hl">.</span> &nbsp; She works here<span class="hl">.</span></span>`},
{h:"Comma (,) — main uses",c:`• Joining clauses: I was tired<span class="hl">,</span> so I went to bed.<br>• After subordinate clause first: <span class="hl">Because</span> it rained<span class="hl">,</span> we stayed in.<br>• In lists: I bought apples<span class="hl">,</span> oranges<span class="hl">,</span> and bananas.`},
{h:"Apostrophe — two uses",c:`1. Contraction: <span class="hl">I'm</span> = I am, <span class="hl">don't</span> = do not, <span class="hl">she's</span> = she is/has<br>2. Possession: <span class="hl">Tom's</span> car, <span class="hl">the girl's</span> bag`}
],
quiz:[
{q:"Which is correct?",o:["I live in thailand.","I live in Thailand.","i live in Thailand.","I live in Thailand"],a:"I live in Thailand.",h:"Capital for proper noun + full stop at end"},
{q:"Which is correct?",o:["its cold today","It's cold today.","Its cold today.","it's cold Today."],a:"It's cold today.",h:"It's = it is; capital start; full stop end"},
{q:"Which is correct?",o:["She doesnt like it.","She doesn't like it.","She dont like it.","She doesn't likes it."],a:"She doesn't like it.",h:"doesn't = does not (apostrophe)"},
{q:"Which is the correct possessive?",o:["Tom's car","Toms car","Tom car","Toms' car"],a:"Tom's car",h:"Singular possessive: name + 's"},
]},

{id:"u136",num:"Unit 136",title:"Word formation — noun, verb, adjective, adverb",
preview:"beauty → beautiful → beautifully. educate → education → educational.",
grammar:[
{h:"Common suffixes — adjective",c:`<span class="hl">-ful:</span> beauty→<span class="hl">beautiful</span>, care→<span class="hl">careful</span>, help→<span class="hl">helpful</span><br><span class="hl">-less:</span> care→<span class="hl">careless</span>, help→<span class="hl">helpless</span>, hope→<span class="hl">hopeless</span><br><span class="hl">-ous:</span> danger→<span class="hl">dangerous</span>, fame→<span class="hl">famous</span><br><span class="hl">-al:</span> nation→<span class="hl">national</span>, education→<span class="hl">educational</span>`},
{h:"Common suffixes — noun",c:`<span class="hl">-tion/-sion:</span> educate→<span class="hl">education</span>, decide→<span class="hl">decision</span><br><span class="hl">-ness:</span> happy→<span class="hl">happiness</span>, kind→<span class="hl">kindness</span><br><span class="hl">-ment:</span> develop→<span class="hl">development</span>, agree→<span class="hl">agreement</span><br><span class="hl">-er/-or:</span> teach→<span class="hl">teacher</span>, act→<span class="hl">actor</span>`},
{h:"Common suffixes — adverb",c:`<span class="hl">-ly:</span> careful→<span class="hl">carefully</span>, quick→<span class="hl">quickly</span>, happy→<span class="hl">happily</span>`}
],
quiz:[
{q:"What is the adjective form of 'danger'?",o:["dangerous","dangerly","dangerful","dangerous"],a:"dangerous",h:"danger + -ous → dangerous"},
{q:"What is the noun form of 'decide'?",o:["decision","decidement","decideness","declaration"],a:"decision",h:"decide → decision (-sion)"},
{q:"What is the adverb form of 'careful'?",o:["carefully","carefuled","careless","careful"],a:"carefully",h:"careful + -ly → carefully"},
{q:"What is the opposite of 'careful' (adjective)?",o:["careless","uncaring","discareful","incareful"],a:"careless",h:"care + -less → careless (without care)"},
]},

{id:"u137",num:"Unit 137",title:"Numbers — ordinals, fractions, dates, years",
preview:"the first floor, a third of students, on 5th June 2024, in the 21st century",
grammar:[
{h:"Ordinal numbers",c:`1st <span class="hl">first</span>, 2nd <span class="hl">second</span>, 3rd <span class="hl">third</span>, 4th <span class="hl">fourth</span> ... 11th <span class="hl">eleventh</span>, 12th <span class="hl">twelfth</span>, 20th <span class="hl">twentieth</span>, 21st <span class="hl">twenty-first</span><span class="ex">She lives on the <span class="w">third</span> floor. &nbsp; It's his <span class="w">first</span> time in London.</span>`},
{h:"Fractions",c:`<span class="hl">½ = a half, ⅓ = a third, ¼ = a quarter, ¾ = three quarters, ⅔ = two thirds</span><span class="ex"><span class="w">A third of</span> students passed. &nbsp; <span class="w">Three quarters</span> of the work is done.</span>`},
{h:"Dates — spoken",c:`5th June 2024 = spoken: <span class="hl">the fifth of June, twenty twenty-four</span><br>OR: <span class="hl">June fifth, twenty twenty-four</span> (American English)`},
{h:"Years",c:`<span class="hl">1990:</span> nineteen ninety &nbsp; <span class="hl">2000:</span> two thousand<br><span class="hl">2005:</span> two thousand and five &nbsp; <span class="hl">2024:</span> twenty twenty-four</span>`}
],
quiz:[
{q:"How do you say '2024' in English?",o:["twenty twenty-four","two thousand twenty-four","Both are correct","two zero two four"],a:"Both are correct",h:"Both forms are used in modern English"},
{q:"What is 1/4 in words?",o:["a quarter","a fourth","one quarter","Both a and c"],a:"Both a and c",h:"a quarter = one quarter"},
{q:"She finished _____ (3rd place).",o:["third","three","thirdly","third place"],a:"third",h:"Ordinal number → third"},
{q:"How do you say '5th June'?",o:["the fifth of June","June the fifth","Both are correct","five June"],a:"Both are correct",h:"Both British and American forms work"},
]},

{id:"u138",num:"Unit 138",title:"Saying large numbers, percentages, and measurements",
preview:"2,500,000 — 75% — 3.5 km — 180 cm tall — £15.99",
grammar:[
{h:"Large numbers",c:`<span class="hl">1,000</span> = one thousand &nbsp; <span class="hl">1,000,000</span> = one million<br><span class="hl">2,500</span> = two thousand five hundred<br><span class="hl">1,200,000</span> = one million, two hundred thousand<span class="ex">The population of Bangkok is about <span class="w">10 million</span>.</span>`},
{h:"Percentages and decimals",c:`<span class="hl">75%</span> = seventy-five percent<br><span class="hl">3.5</span> = three point five<br><span class="hl">0.25</span> = zero point two five (or nought point two five)<span class="ex"><span class="w">75%</span> of students passed. &nbsp; The temperature is <span class="w">36.5</span> degrees.</span>`},
{h:"Measurements",c:`<span class="hl">180 cm</span> = one hundred and eighty centimetres<br><span class="hl">5 kg</span> = five kilograms &nbsp; <span class="hl">3.5 km</span> = three and a half kilometres<br><span class="hl">£15.99</span> = fifteen pounds ninety-nine pence</span>`}
],
quiz:[
{q:"How do you say '1,500,000'?",o:["one million five hundred thousand","one thousand five hundred","fifteen hundred thousand","one and a half thousand"],a:"one million five hundred thousand",h:"1,000,000 + 500,000 = one million five hundred thousand"},
{q:"How do you say '2.5'?",o:["two point five","two and a half","two five","Both a and b"],a:"Both a and b",h:"Both '2.5' and '2½' = two point five / two and a half"},
{q:"How do you say '85%'?",o:["eighty-five percent","eighty-five per cent","Both are correct","85 percents"],a:"Both are correct",h:"percent and per cent are both acceptable"},
{q:"How do you say '0.5 kg'?",o:["half a kilogram","zero point five kilograms","Both are correct","nought kilograms five"],a:"Both are correct",h:"0.5 kg = half a kilo / zero point five kilograms"},
]},

{id:"u139",num:"Unit 139",title:"Telephoning & Written English expressions",
preview:"Speaking! / Hold on. / As mentioned above... / I look forward to hearing from you.",
grammar:[
{h:"Telephone expressions",c:`<span class="ex"><span class="w">Is that</span> Tom? &nbsp; <span class="w">Speaking!</span> (= yes, it's me)<br><span class="w">Hold on</span> a moment. &nbsp; <span class="w">I'll put you through</span>.<br>Can I <span class="w">leave a message</span>? &nbsp; Could you <span class="w">call back</span> later?<br>The line is <span class="w">busy / engaged</span>.</span>`},
{h:"Formal written expressions (emails/letters)",c:`<span class="ex"><span class="w">I am writing to</span>... &nbsp; <span class="w">With reference to</span>...<br><span class="w">Please find attached</span>... &nbsp; <span class="w">As mentioned above</span>...<br><span class="w">I look forward to hearing from you</span>.<br><span class="w">Yours sincerely</span> (when you know the name) / <span class="w">Yours faithfully</span> (formal, unknown)</span>`},
{h:"Polite requests in conversation",c:`<span class="ex">Could you possibly...? &nbsp; Would it be possible to...?<br>Would you mind + -ing? &nbsp; I was wondering if...</span>`}
],
quiz:[
{q:"You answer the phone. Someone asks for you. You say: '_____ !'",o:["Speaking","I am","Yes me","This is I"],a:"Speaking",h:"Confirming it's you on the phone → Speaking!"},
{q:"You want someone to wait. You say: '_____'",o:["Hold on a moment.","Wait please.","Stop calling.","Be patient."],a:"Hold on a moment.",h:"Asking to wait → Hold on"},
{q:"In a formal letter, you end with: 'I look forward _____ from you.'",o:["to hearing","to hear","for hearing","in hearing"],a:"to hearing",h:"look forward to + -ing"},
{q:"When you don't know the recipient's name, you end with:",o:["Yours faithfully","Yours sincerely","Best regards","Kind regards"],a:"Yours faithfully",h:"Unknown name → Yours faithfully (British formal)"},
]},

grammar:[
{h:"Group 1: All three forms the same",c:`<table><tr><th>Base</th><th>Past</th><th>Past Participle</th></tr><tr><td>cut</td><td>cut</td><td>cut</td></tr><tr><td>put</td><td>put</td><td>put</td></tr><tr><td>let</td><td>let</td><td>let</td></tr><tr><td>hit</td><td>hit</td><td>hit</td></tr><tr><td>read</td><td>read*</td><td>read*</td></tr></table>*read: pronounced /rɛd/ in past`},
{h:"Group 2: Two forms the same (past = p.p.)",c:`<table><tr><th>Base</th><th>Past = P.P.</th></tr><tr><td>buy</td><td>bought</td></tr><tr><td>bring</td><td>brought</td></tr><tr><td>think</td><td>thought</td></tr><tr><td>catch</td><td>caught</td></tr><tr><td>teach</td><td>taught</td></tr><tr><td>find</td><td>found</td></tr><tr><td>tell</td><td>told</td></tr><tr><td>make</td><td>made</td></tr><tr><td>send</td><td>sent</td></tr><tr><td>spend</td><td>spent</td></tr></table>`},

],
quiz:[
{q:"Past tense of 'speak':",o:["spoke","speaked","spoken","speaks"],a:"spoke",h:"speak → spoke → spoken"},
{q:"Past participle of 'break':",o:["broken","broke","breaked","broked"],a:"broken",h:"break → broke → broken"},
{q:"Past tense of 'teach':",o:["taught","teached","thought","tought"],a:"taught",h:"teach → taught (same as past p.p.)"},
{q:"Past participle of 'go':",o:["gone","went","goed","goes"],a:"gone",h:"go → went → gone (past p.p. = gone)"},
]},

{h:"Grammar differences",c:`<table><tr><th>American</th><th>British</th></tr><tr><td>I just <b>got</b> home. / have gotten</td><td>I have just <b>got</b> home.</td></tr><tr><td>Do you have a pen?</td><td>Have you got a pen?</td></tr><tr><td>on the weekend</td><td>at the weekend</td></tr><tr><td>math</td><td>maths</td></tr></table>`},
{h:"Spelling differences",c:`<table><tr><th>American</th><th>British</th></tr><tr><td>color</td><td>colour</td></tr><tr><td>center</td><td>centre</td></tr><tr><td>organize</td><td>organise</td></tr><tr><td>traveling</td><td>travelling</td></tr></table>`}
],

{q:"In American English, what do you call 'petrol'?",o:["gas","oil","fuel","energy"],a:"gas",h:"petrol (Br) = gas (Am)"},
{q:"Which spelling is British?",o:["colour","color","collour","colouor"],a:"colour",h:"British: colour; American: color"},
{q:"'Soccer' in American English = _____ in British English.",o:["football","handball","baseball","rugby"],a:"football",h:"soccer (Am) = football (Br)"},
]},

{id:"u142",num:"Unit 142",title:"Collocations — words that go together",
preview:"make a decision, do homework, take a photo, have a break, give advice",
grammar:[
{h:"make + noun",c:`<span class="hl">make</span> a decision/mistake/suggestion/effort/noise/progress/a phone call/money/friends/a mess<span class="ex">Don't <span class="w">make</span> a mess. &nbsp; Have you <span class="w">made</span> a decision yet?</span>`},
{h:"do + noun",c:`<span class="hl">do</span> homework/the dishes/exercise/business/your best/a course/harm/good/a favour<span class="ex">I need to <span class="w">do</span> the dishes. &nbsp; She's <span class="w">doing</span> a yoga course.</span>`},
{h:"take + noun",c:`<span class="hl">take</span> a photo/a break/a seat/a shower/medicine/a taxi/an exam/part/notes/care<span class="ex"><span class="w">Take</span> a seat. &nbsp; I need to <span class="w">take</span> a break.<br>She <span class="w">took</span> notes during the meeting.</span>`},
{h:"have + noun",c:`<span class="hl">have</span> a break/a look/a chat/a drink/fun/a good time/a meeting/a problem/an idea<span class="ex">Let's <span class="w">have</span> a break. &nbsp; <span class="w">Have</span> fun!</span>`}
],
quiz:[
{q:"She _____ a mistake in her report.",o:["made","did","had","took"],a:"made",h:"make a mistake"},
{q:"Can you _____ me a favour?",o:["do","make","give","take"],a:"do",h:"do a favour"},
{q:"Let's _____ a break. We've been working for hours.",o:["take","do","make","have"],a:"take",h:"take a break (also: have a break)"},
{q:"He _____ a photo of the beautiful sunset.",o:["took","made","did","had"],a:"took",h:"take a photo"},
]},

{id:"u143",num:"Unit 143",title:"Expressions with time",
preview:"on time, in time, for a long time, waste time, spend time, have time",
grammar:[
{h:"Time expressions with prepositions",c:`<span class="ex"><span class="w">on time</span> (= punctual) &nbsp; <span class="w">in time</span> (= early enough)<br><span class="w">for a long time</span> &nbsp; <span class="w">at times</span> (= sometimes)<br><span class="w">at the same time</span> &nbsp; <span class="w">from time to time</span> (= occasionally)</span>`},
{h:"Time expressions with verbs",c:`<span class="hl">spend time</span> + -ing &nbsp; <span class="hl">waste time</span> + -ing &nbsp; <span class="hl">have time</span> + to-infinitive<span class="ex">She <span class="w">spends</span> a lot of time <span class="w">reading</span>.<br>Don't <span class="w">waste time</span> worrying. &nbsp; I don't <span class="w">have time to</span> explain.</span>`},
{h:"Other time expressions",c:`<span class="ex"><span class="w">It's time to</span> go. &nbsp; <span class="w">It's time for</span> bed.<br><span class="w">take time</span> (= require time): Learning a language takes time.<br><span class="w">in no time</span> (= very quickly): She finished in no time.</span>`}
],
quiz:[
{q:"I don't have _____ to explain everything now.",o:["time","times","the time","a time"],a:"time",h:"have time + to-infinitive"},
{q:"She _____ a lot of time reading.",o:["spends","wastes","takes","loses"],a:"spends",h:"spend time + -ing"},
{q:"Don't _____ time — we need to finish by 5.",o:["waste","spend","take","lose"],a:"waste",h:"waste time = use time unproductively"},
{q:"We arrived just _____ time to catch the last train.",o:["in","on","at","for"],a:"in",h:"in time = early enough"},
]},

{id:"u144",num:"Unit 144",title:"Feelings — adjective pairs (-ed vs. -ing)",
preview:"I'm bored (how I feel). The film is boring (what causes the feeling).",
grammar:[
{h:"-ed adjectives = how a person feels",c:`<span class="hl">bored, tired, excited, interested, surprised, shocked, worried, confused, satisfied, annoyed, frightened, embarrassed</span><span class="ex">I'm <span class="w">bored</span>. (= I feel bored) &nbsp; She's <span class="w">excited</span>. &nbsp; He was <span class="w">surprised</span>.</span>`},
{h:"-ing adjectives = what causes the feeling",c:`<span class="hl">boring, tiring, exciting, interesting, surprising, shocking, worrying, confusing, satisfying, annoying, frightening, embarrassing</span><span class="ex">The film is <span class="w">boring</span>. (= it makes you bored) &nbsp; That's <span class="w">surprising</span>!</span>`},
{h:"Key rule",c:`<span class="hl">-ed</span> = person's feeling (I am bored/interested/tired)<br><span class="hl">-ing</span> = quality of thing/person that causes feeling (it is boring/interesting/tiring)<span class="ex">I'm <span class="w">interested</span> in the topic. (I feel interested)<br>The topic is <span class="w">interesting</span>. (it causes interest)</span>`}
],
quiz:[
{q:"I'm _____ because I have nothing to do.",o:["bored","boring","bore","boringly"],a:"bored",h:"-ed → how the person feels"},
{q:"The lesson was very _____. Everyone loved it.",o:["interesting","interested","interestingly","interest"],a:"interesting",h:"-ing → quality of the lesson (caused interest)"},
{q:"She was _____ when she heard the news.",o:["shocked","shocking","shockingly","shocks"],a:"shocked",h:"-ed → how she felt"},
{q:"It can be _____ to speak in public.",o:["frightening","frightened","fright","frighteningly"],a:"frightening",h:"-ing → what the experience causes (fear)"},
]},

{id:"u145",num:"Unit 145",title:"Review — putting it all together",
preview:"A final review of key grammar patterns across all 145 units.",
grammar:[
{h:"Tense summary",c:`<table><tr><th>Tense</th><th>Use</th><th>Example</th></tr><tr><td>Present Simple</td><td>habit/fact</td><td>I work every day.</td></tr><tr><td>Present Continuous</td><td>now/temporary</td><td>I'm working now.</td></tr><tr><td>Past Simple</td><td>finished past</td><td>I worked yesterday.</td></tr><tr><td>Past Continuous</td><td>in progress past</td><td>I was working at 8.</td></tr><tr><td>Present Perfect</td><td>past with present result</td><td>I have worked here for a year.</td></tr><tr><td>will</td><td>future decision/prediction</td><td>I'll help you.</td></tr><tr><td>going to</td><td>plan/evidence</td><td>I'm going to study.</td></tr></table>`},
{h:"Key modal verbs",c:`<table><tr><th>Modal</th><th>Main meaning</th></tr><tr><td>can/could</td><td>ability / polite request</td></tr><tr><td>must/have to</td><td>obligation / necessity</td></tr><tr><td>should</td><td>advice</td></tr><tr><td>might/may</td><td>possibility</td></tr><tr><td>would</td><td>conditional / polite</td></tr></table>`},
{h:"Key structures to remember",c:`✓ <span class="hl">If</span> + present → <span class="hl">will</span> (1st conditional)<br>✓ <span class="hl">If</span> + past → <span class="hl">would</span> (2nd conditional)<br>✓ Passive: <span class="hl">is/are/was/were</span> + past participle<br>✓ Reported: say/tell + <span class="hl">that</span> + past tense<br>✓ Relative: <span class="hl">who</span> (people) / <span class="hl">which/that</span> (things)`}
],
quiz:[
{q:"Choose the correct sentence:",o:["I have seen him yesterday.","I saw him yesterday.","I have saw him yesterday.","I did see him yesterday."],a:"I saw him yesterday.",h:"yesterday = specific time → past simple"},
{q:"Choose the correct sentence:",o:["She is married with Tom.","She is married to Tom.","She married with Tom.","She married to Tom."],a:"She is married to Tom.",h:"married to (not with)"},
{q:"Choose the correct sentence:",o:["If I would have more time, I'll study.","If I have more time, I'll study.","If I had more time, I'll study.","If I have more time, I would study."],a:"If I have more time, I'll study.",h:"1st conditional: if + present simple, will"},
{q:"Choose the correct sentence:",o:["The book was written from Shakespeare.","The book was written by Shakespeare.","The book is written by Shakespeare.","The book wrote by Shakespeare."],a:"The book was written by Shakespeare.",h:"Passive with agent: by"},
]},
]},
];

// ══════════════════════════════════════════
// STATE & STORAGE
// ══════════════════════════════════════════
const ST={done:JSON.parse(localStorage.getItem('eg4done')||'[]'),sec:S[0].id,unit:null,tab:'g',qa:{}};
const save=()=>localStorage.setItem('eg4done',JSON.stringify(ST.done));
const allU=()=>S.filter(s=>s&&s.units).flatMap(s=>s.units);

function updatePB(){
  const total=allU().length,d=ST.done.length,pct=total?Math.round(d/total*100):0;
  document.getElementById('pb').style.width=pct+'%';
  document.getElementById('pt').textContent=`${d} / ${total} units completed (${pct}%)`;
}

// ══════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════
function doSearch(q){
  const box=document.getElementById('sr');
  q=q.trim().toLowerCase();
  if(!q){box.className='search-results';return}
  const hits=allU().filter(u=>u.title.toLowerCase().includes(q)||u.num.toLowerCase().includes(q)||u.preview.toLowerCase().includes(q)).slice(0,8);
  if(!hits.length){box.innerHTML='<div class="sr-item"><span class="sr-title" style="color:var(--muted)">No results found</span></div>';box.className='search-results show';return}
  box.innerHTML=hits.map(u=>`<div class="sr-item" onmousedown="srOpen('${u.id}')"><span class="sr-num">${u.num}</span><span class="sr-title">${u.title}</span></div>`).join('');
  box.className='search-results show';
}
function srOpen(id){
  document.getElementById('srch').value='';
  document.getElementById('sr').className='search-results';
  const u=allU().find(u=>u.id===id);
  const sec=S.find(s=>s.units.some(x=>x.id===id));
  if(sec){ST.sec=sec.id;renderNav();renderMain()}
  openU(id);
}
function closeSR(){document.getElementById('sr').className='search-results'}

// ══════════════════════════════════════════
// NAV
// ══════════════════════════════════════════
function renderNav(){
  document.getElementById('nav').innerHTML=S.filter(s=>s&&s.id).map(s=>{
    const done=s.units.filter(u=>ST.done.includes(u.id)).length;
    const total=s.units.length;
    return`<button class="nb ${s.id===ST.sec?'active':''}" onclick="selSec('${s.id}')">${s.label}<span class="np">${done}/${total}</span></button>`;
  }).join('');
}
function selSec(id){ST.sec=id;renderNav();renderMain();window.scrollTo({top:0,behavior:'smooth'})}

// ══════════════════════════════════════════
// MAIN GRID
// ══════════════════════════════════════════
function renderMain(){
  const sec=S.find(s=>s.id===ST.sec);
  const doneCount=sec.units.filter(u=>ST.done.includes(u.id)).length;
  document.getElementById('app').innerHTML=`
    <div class="sec-header">
      <div class="sec-title"><span></span>${sec.label}</div>
      <span class="sec-badge">${doneCount} / ${sec.units.length} done</span>
    </div>
    <div class="grid">${sec.units.map((u,i)=>`
      <div class="card ${ST.done.includes(u.id)?'done':''}" onclick="openU('${u.id}')" style="animation-delay:${i*28}ms">
        <div class="unum">${u.num}</div>
        <h3>${u.title}</h3>
        <p>${u.preview}</p>
        <div class="card-footer">
          <span class="tag">${ST.done.includes(u.id)?'✓ Completed':`${u.quiz.length} Q`}</span>
          <span class="card-num-pill">${ST.done.includes(u.id)?'':'▶ Start'}</span>
        </div>
      </div>`).join('')}
    </div>`;
}

// ══════════════════════════════════════════
// LESSON MODAL
// ══════════════════════════════════════════
function openU(id){
  ST.unit=allU().find(u=>u.id===id);ST.tab='g';ST.qa={};
  renderLesson();
  document.getElementById('ov').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeU(){
  document.getElementById('ov').classList.remove('open');
  document.body.style.overflow='';
}
function ovClick(e){if(e.target===document.getElementById('ov'))closeU();}

function navUnit(dir){
  const flat=allU();
  const idx=flat.findIndex(u=>u.id===ST.unit.id);
  const next=flat[idx+dir];
  if(!next)return;
  const sec=S.find(s=>s.units.some(x=>x.id===next.id));
  if(sec&&sec.id!==ST.sec){ST.sec=sec.id;renderNav();renderMain()}
  openU(next.id);
}

function renderLesson(){
  const u=ST.unit,done=ST.done.includes(u.id);
  const flat=allU(),idx=flat.findIndex(x=>x.id===u.id);
  document.getElementById('mod').innerHTML=`
    <div class="mhead">
      <div class="mhead-left">
        <div class="unum-m">${u.num}</div>
        <h2>${u.title}</h2>
      </div>
      <div class="mhead-nav">
        <button class="mnav-btn" onclick="navUnit(-1)" ${idx===0?'disabled style="opacity:.3"':''} title="Previous unit">&#8592;</button>
        <button class="mnav-btn" onclick="navUnit(1)" ${idx===flat.length-1?'disabled style="opacity:.3"':''} title="Next unit">&#8594;</button>
        <button class="x" onclick="closeU()" title="Close (Esc)">&#x2715;</button>
      </div>
    </div>
    <div class="ltabs">
      <button class="ltab ${ST.tab==='g'?'active':''}" onclick="switchTab('g')">&#128214; Grammar</button>
      <button class="ltab ${ST.tab==='q'?'active':''}" onclick="switchTab('q')">&#9999; Quiz (${u.quiz.length}Q)</button>
    </div>
    <div class="tp ${ST.tab==='g'?'active':''}">
      ${u.grammar.map(g=>`<div class="gbox"><h4>${g.h}</h4><div class="rule">${g.c}</div></div>`).join('')}
      <button class="go-quiz-btn" onclick="switchTab('q')">Go to Quiz &#8594;</button>
    </div>
    <div class="tp ${ST.tab==='q'?'active':''}">
      <div class="qsec"><h3>Practice Questions</h3>
      ${u.quiz.map((q,i)=>`
        <div class="qi ${ST.qa[i]!==undefined?'answered':''}" id="qi${i}">
          <div class="qn">Q${i+1} / ${u.quiz.length}</div>
          <div class="qt">${q.q}</div>
          <div class="opts">${q.o.map(op=>`
            <button class="ob ${optCls(i,op)}" onclick="ans(${i},'${esc(op)}')" ${ST.qa[i]!==undefined?'disabled':''}>${op}</button>`).join('')}
          </div>
          <div class="fb ${ST.qa[i]!==undefined?'show':''} ${ST.qa[i]===q.a?'ok':'no'}">
            ${ST.qa[i]!==undefined?(ST.qa[i]===q.a?'&#10003; Correct!':'&#10007; Hint: '+q.h):''}
          </div>
        </div>`).join('')}
      ${scoreHTML(u)}</div>
      <div class="btn-row">
        <button class="cbtn ${done?'done-s':''}" onclick="markDone('${u.id}')">
          ${done?'&#10003; Completed!':'Mark as Complete'}
        </button>
        ${idx<flat.length-1?`<button class="cbtn-ghost" onclick="navUnit(1)">Next &#8594;</button>`:''}
      </div>
    </div>`;
}

function optCls(i,op){
  if(ST.qa[i]===undefined)return'';
  const a=ST.unit.quiz[i].a;
  return op===a?'correct':op===ST.qa[i]?'wrong':'';
}
function esc(s){return s.replace(/'/g,"\\'")}
function scoreHTML(u){
  const ans=Object.keys(ST.qa).length;
  if(ans<u.quiz.length)return'<div class="sdis" id="sd"></div>';
  const c=u.quiz.filter((q,i)=>ST.qa[i]===q.a).length;
  const pct=Math.round(c/u.quiz.length*100);
  const msg=pct===100?'Perfect score! Outstanding!':pct>=80?'Great job! Keep it up!':pct>=60?'Good effort! Review the hints.':'Keep practicing — you\'ll get it!';
  return`<div class="sdis show" id="sd">
    <div class="bs">${pct}%</div>
    <div class="score-label">${c} / ${u.quiz.length} correct</div>
    <div class="score-msg">${msg}</div>
  </div>`;
}
function switchTab(t){ST.tab=t;renderLesson();document.getElementById('mod').scrollTop=0}
function ans(i,sel){
  if(ST.qa[i]!==undefined)return;
  ST.qa[i]=sel;
  const allAns=Object.keys(ST.qa).length===ST.unit.quiz.length;
  renderLesson();
  if(allAns){
    setTimeout(()=>{const el=document.getElementById('sd');if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'})},80);
  } else {
    setTimeout(()=>{const el=document.getElementById('qi'+i);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'})},50);
  }
}
function markDone(id){
  if(!ST.done.includes(id)){ST.done.push(id);save();updatePB();renderMain()}
  renderLesson();
}

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeU();
  if(e.key==='ArrowLeft'&&ST.unit)navUnit(-1);
  if(e.key==='ArrowRight'&&ST.unit)navUnit(1);
});

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
renderNav();renderMain();updatePB();
</script>
</body>
</html>
