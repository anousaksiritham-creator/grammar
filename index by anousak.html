{id:"prepw",label:"Prepositions After Words",units:[
{id:"u75",num:"Unit 75",title:"Prepositions after Adjectives",
preview:"afraid of, good at, interested in, famous for, different from",
grammar:[
{h:"Common adjective + preposition combinations",c:`<table><tr><th>Adjective + prep.</th><th>Example</th></tr><tr><td>afraid <b>of</b></td><td>She's afraid of spiders.</td></tr><tr><td>good/bad <b>at</b></td><td>He's good at maths.</td></tr><tr><td>interested <b>in</b></td><td>I'm interested in art.</td></tr><tr><td>famous <b>for</b></td><td>Paris is famous for food.</td></tr><tr><td>different <b>from</b></td><td>This is different from that.</td></tr><tr><td>similar <b>to</b></td><td>Your idea is similar to mine.</td></tr><tr><td>proud <b>of</b></td><td>I'm proud of you.</td></tr><tr><td>tired <b>of</b></td><td>I'm tired of waiting.</td></tr></table>`},
{h:"More adjective + preposition",c:`<table><tr><th>Adjective + prep.</th><th>Example</th></tr><tr><td>angry/upset <b>about</b></td><td>She's upset about the news.</td></tr><tr><td>keen <b>on</b></td><td>He's keen on football.</td></tr><tr><td>responsible <b>for</b></td><td>Who's responsible for this?</td></tr><tr><td>married <b>to</b></td><td>She's married to a doctor.</td></tr><tr><td>full <b>of</b></td><td>The room is full of people.</td></tr><tr><td>dependent <b>on</b></td><td>He is dependent on others.</td></tr></table>`}
],
quiz:[
{q:"She's very good _____ languages.",o:["at","in","for","of"],a:"at",h:"good at → skill/subject"},
{q:"I'm not interested _____ politics.",o:["in","at","for","of"],a:"in",h:"interested in"},
{q:"Thailand is famous _____ its food.",o:["for","of","at","in"],a:"for",h:"famous for → reason"},
{q:"This car is very different _____ mine.",o:["from","to","of","than"],a:"from",h:"different from (British English)"},
]},

{id:"u76",num:"Unit 76",title:"Prepositions after Verbs",
preview:"wait for, listen to, look at, talk to, depend on, apologize for",
grammar:[
{h:"Common verb + preposition combinations",c:`<table><tr><th>Verb + prep.</th><th>Example</th></tr><tr><td>wait <b>for</b></td><td>I'm waiting for the bus.</td></tr><tr><td>listen <b>to</b></td><td>She listens to music.</td></tr><tr><td>look <b>at</b></td><td>Look at this photo!</td></tr><tr><td>talk/speak <b>to/with</b></td><td>I need to talk to you.</td></tr><tr><td>think <b>about</b></td><td>I'm thinking about it.</td></tr><tr><td>ask <b>for</b></td><td>She asked for help.</td></tr><tr><td>apply <b>for</b></td><td>He applied for the job.</td></tr><tr><td>belong <b>to</b></td><td>This belongs to me.</td></tr></table>`},
{h:"More verb + preposition",c:`<table><tr><th>Verb + prep.</th><th>Example</th></tr><tr><td>depend <b>on</b></td><td>It depends on the weather.</td></tr><tr><td>apologize <b>for</b></td><td>He apologized for being late.</td></tr><tr><td>agree <b>with</b></td><td>I agree with you.</td></tr><tr><td>laugh <b>at</b></td><td>Don't laugh at me.</td></tr><tr><td>care <b>about</b></td><td>I care about the environment.</td></tr><tr><td>succeed <b>in</b></td><td>She succeeded in her plan.</td></tr></table>`}
],
quiz:[
{q:"I'm waiting _____ the bus.",o:["for","to","at","on"],a:"for",h:"wait for"},
{q:"Please listen _____ me carefully.",o:["to","at","for","on"],a:"to",h:"listen to"},
{q:"She apologized _____ being late.",o:["for","to","of","about"],a:"for",h:"apologize for"},
{q:"It depends _____ the weather.",o:["on","for","of","at"],a:"on",h:"depend on"},
]},

{id:"u77",num:"Unit 77",title:"Phrasal Verbs",
preview:"turn on, give up, look up, put off, run out of, get on with",
grammar:[
{h:"What are phrasal verbs?",c:`Verb + particle (preposition or adverb) = new meaning<span class="ex"><span class="w">turn on</span> (= switch on) &nbsp; <span class="w">give up</span> (= stop trying)<br><span class="w">put off</span> (= postpone) &nbsp; <span class="w">look up</span> (= find information)</span>`},
{h:"Common phrasal verbs — separable",c:`<table><tr><th>Phrasal verb</th><th>Meaning</th><th>Example</th></tr><tr><td>turn on/off</td><td>switch on/off</td><td>Turn the TV on/off.</td></tr><tr><td>put off</td><td>postpone</td><td>Don't put it off.</td></tr><tr><td>pick up</td><td>lift, collect</td><td>Pick me up at 8.</td></tr><tr><td>give up</td><td>stop doing</td><td>She gave up smoking.</td></tr><tr><td>fill in/out</td><td>complete a form</td><td>Fill in this form.</td></tr></table>`},
{h:"Common phrasal verbs — inseparable",c:`<table><tr><th>Phrasal verb</th><th>Meaning</th><th>Example</th></tr><tr><td>look after</td><td>take care of</td><td>She looks after her parents.</td></tr><tr><td>run out of</td><td>have no more</td><td>We ran out of milk.</td></tr><tr><td>get on with</td><td>have good relations</td><td>I get on with my boss.</td></tr><tr><td>look forward to</td><td>be excited about</td><td>I look forward to seeing you.</td></tr><tr><td>come across</td><td>find by chance</td><td>I came across an old photo.</td></tr></table>`}
],
quiz:[
{q:"Can you _____ the TV? I can't see the button.",o:["turn on","turn in","turn of","turn"],a:"turn on",h:"switch on → turn on"},
{q:"She _____ smoking last year. Now she's healthier.",o:["gave up","gave off","gave in","gave out"],a:"gave up",h:"stop doing → give up"},
{q:"We _____ petrol on the motorway.",o:["ran out of","ran out","ran away from","ran into"],a:"ran out of",h:"had no more → run out of"},
{q:"I'm _____ my holiday next week.",o:["looking forward to","looking after","looking up","looking into"],a:"looking forward to",h:"excited about future → look forward to"},
]},

{id:"u78",num:"Unit 78",title:"Noun + Noun Compounds",
preview:"a bus driver, a football match, a bedroom window, a three-hour journey",
grammar:[
{h:"Noun + noun = compound noun (first noun describes second)",c:`The first noun acts like an adjective and describes the second noun:<span class="ex">a <span class="w">bus driver</span> (= a driver of buses)<br>a <span class="w">football match</span> (= a match of football)<br>a <span class="w">bedroom window</span> (= the window of a bedroom)<br>a <span class="w">credit card</span> (= a card for credit)</span>`},
{h:"More examples",c:`<span class="ex"><span class="w">a car park</span>, <span class="w">a road accident</span>, <span class="w">a bus stop</span><br><span class="w">a coffee cup</span>, <span class="w">a birthday cake</span>, <span class="w">a phone charger</span><br><span class="w">a car key</span>, <span class="w">a train station</span>, <span class="w">a swimming pool</span></span>`},
{h:"Key rule: first noun is singular (usually)",c:`<span class="ex">✓ a <span class="w">book</span> shop (NOT a books shop)<br>✓ a <span class="w">car</span> park (NOT a cars park)<br>Exception: a <span class="w">sports</span> car, a <span class="w">glasses</span> case</span>`},
{h:"Number + noun + noun (hyphenated)",c:`<span class="ex">a <span class="w">three-hour</span> journey (= a journey of three hours)<br>a <span class="w">five-star</span> hotel, a <span class="w">ten-minute</span> walk</span>`}
],
quiz:[
{q:"A place where you park cars = a _____ park.",o:["car","cars","vehicle","drive"],a:"car",h:"First noun (singular) + park → car park"},
{q:"A match of football = a _____ match.",o:["football","footballs","sport","ball"],a:"football",h:"football (singular) + match"},
{q:"A journey of three hours = a _____ journey.",o:["three-hour","three hours","three-hours","hour three"],a:"three-hour",h:"Number + singular noun + hyphen: three-hour"},
{q:"The key for my car = my _____ key.",o:["car","cars","vehicle","drive"],a:"car",h:"car key = compound noun (car singular)"},
]},
]},
// ══════════════════════════════════════════
// SECTION 19 — AUXILIARY VERBS & RESPONSES
// ══════════════════════════════════════════
{id:"aux",label:"Auxiliary Verbs",units:[
{id:"u79",num:"Unit 79",title:"Short Answers — Yes I am / No she doesn't",
preview:"Are you ready? Yes, I am. Does she work? No, she doesn't.",
grammar:[
{h:"Short answers use auxiliary, NOT full verb",c:`<table><tr><th>Question</th><th>Yes</th><th>No</th></tr><tr><td>Are you...?</td><td>Yes, I <b>am</b>.</td><td>No, I'm <b>not</b>.</td></tr><tr><td>Do you...?</td><td>Yes, I <b>do</b>.</td><td>No, I <b>don't</b>.</td></tr><tr><td>Does she...?</td><td>Yes, she <b>does</b>.</td><td>No, she <b>doesn't</b>.</td></tr><tr><td>Did they...?</td><td>Yes, they <b>did</b>.</td><td>No, they <b>didn't</b>.</td></tr><tr><td>Have you...?</td><td>Yes, I <b>have</b>.</td><td>No, I <b>haven't</b>.</td></tr><tr><td>Can she...?</td><td>Yes, she <b>can</b>.</td><td>No, she <b>can't</b>.</td></tr><tr><td>Will he...?</td><td>Yes, he <b>will</b>.</td><td>No, he <b>won't</b>.</td></tr></table>`},
{h:"Avoiding repetition with auxiliaries",c:`<span class="ex">A: I'm tired. B: <span class="w">So am I</span>. / <span class="w">I'm not</span>.<br>A: She can sing. B: <span class="w">Can she?</span> (surprise/interest)<br>A: I didn't go. B: <span class="w">Didn't you?</span></span>`}
],
quiz:[
{q:"Are you hungry? — Yes, I _____.",o:["am","do","am not","be"],a:"am",h:"are → am in answer"},
{q:"Does he speak Thai? — No, he _____.",o:["doesn't","don't","isn't","does"],a:"doesn't",h:"does → doesn't (negative)"},
{q:"Have they arrived? — Yes, they _____.",o:["have","has","had","do"],a:"have",h:"have → have in answer"},
{q:"Can you drive? — No, I _____.",o:["can't","don't","won't","amn't"],a:"can't",h:"can → can't (negative)"},
]},

{id:"u80",num:"Unit 80",title:"So do I / Neither do I",
preview:"I like coffee. So do I! I don't smoke. Neither do I.",
grammar:[
{h:"So + auxiliary + I (agreeing with positive)",c:`<span class="hl">So</span> + auxiliary + subject = me too<span class="ex">A: I'm tired. B: <span class="w">So am I</span>. (= I'm tired too)<br>A: She likes Thai food. B: <span class="w">So do I</span>.<br>A: He can swim. B: <span class="w">So can she</span>.</span>`},
{h:"Neither + auxiliary + I (agreeing with negative)",c:`<span class="hl">Neither</span> + auxiliary + subject = me neither<span class="ex">A: I don't like spicy food. B: <span class="w">Neither do I</span>. (= I don't either)<br>A: She can't drive. B: <span class="w">Neither can he</span>.<br>A: I haven't seen it. B: <span class="w">Neither have I</span>.</span>`},
{h:"Disagreeing",c:`Just use a full statement:<span class="ex">A: I like fish. B: <span class="w">I don't</span>. (disagreeing)<br>A: I can't cook. B: <span class="w">I can</span>.</span>`}
],
quiz:[
{q:"I love sushi. _____ do I.",o:["So","Neither","Nor","Too"],a:"So",h:"Agreeing with positive → So do I"},
{q:"She hasn't eaten yet. _____ have I.",o:["Neither","So","Nor have","Too"],a:"Neither",h:"Agreeing with negative → Neither have I"},
{q:"I'm going to the party. _____ am I.",o:["So","Neither","Not","Too"],a:"So",h:"Positive agreement → So am I"},
{q:"A: I can't swim. B: _____ can I.",o:["Neither","So","Nor","Both"],a:"Neither",h:"can't → negative → Neither can I"},
]},

{id:"u81",num:"Unit 81",title:"Indirect Questions — Do you know where...?",
preview:"Do you know where she lives? Can you tell me what time it is?",
grammar:[
{h:"Direct → Indirect (word order changes)",c:`Direct: <span class="hl">Where does she live?</span><br>Indirect: Do you know <span class="hl">where she lives?</span> (normal word order, no auxiliary)<span class="ex">Where is the bank? → Do you know <span class="w">where the bank is</span>?<br>What time does it start? → Can you tell me <span class="w">what time it starts</span>?</span>`},
{h:"Indirect yes/no questions → if/whether",c:`<span class="ex">Is there a bank nearby? → Do you know <span class="w">if there is a bank</span> nearby?<br>Did she call? → I wonder <span class="w">whether she called</span>.</span>`},
{h:"Common introductions",c:`<span class="hl">Do you know...? / Can you tell me...? / Could you tell me...? / I'd like to know... / I wonder... / I'm not sure...</span><span class="ex"><span class="w">Could you tell me</span> where the station is?<br><span class="w">I'm not sure</span> what time the film starts.</span>`}
],
quiz:[
{q:"Where does he work? → Do you know where he _____?",o:["works","does work","work","worked"],a:"works",h:"Indirect question: normal word order, no does"},
{q:"Is there a toilet nearby? → Can you tell me _____ there is a toilet?",o:["if","what","whether or not","Both a and c"],a:"Both a and c",h:"Yes/no → if or whether"},
{q:"What time is it? → Do you know what time _____?",o:["it is","is it","it was","does it"],a:"it is",h:"Indirect: subject + verb (not inverted)"},
{q:"How much does it cost? → I'd like to know how much it _____.",o:["costs","does cost","cost","is costing"],a:"costs",h:"Indirect: normal word order (costs, not does cost)"},
]},

{id:"u82",num:"Unit 82",title:"What... (What I need / What happened)",
preview:"What I need is a coffee. What happened was very strange.",
grammar:[
{h:"What = the thing(s) that",c:`<span class="hl">what</span> used as a noun clause subject or object<span class="ex"><span class="w">What I need</span> is a good rest. (= The thing I need is...)<br><span class="w">What happened</span> was very strange. (= The thing that happened...)<br>Did you get <span class="w">what you wanted</span>?</span>`},
{h:"What ... is/was (emphasising)",c:`<span class="ex"><span class="w">What I like</span> about her is her honesty.<br><span class="w">What surprised me</span> was how calm she was.<br><span class="w">What we need</span> is more time.</span>`},
{h:"what vs. which vs. that",c:`<span class="ex">This is <span class="w">what</span> she said. (= the thing that)<br>This is the book <span class="w">that/which</span> she mentioned. (relative clause)<br>I don't know <span class="w">what</span> to do.</span>`}
],
quiz:[
{q:"_____ I need is a long holiday.",o:["What","That","Which","It"],a:"What",h:"What = the thing that — subject of sentence"},
{q:"She didn't understand _____ he was saying.",o:["what","that","which","who"],a:"what",h:"what = the thing that — object"},
{q:"_____ happened next was a complete surprise.",o:["What","That","It","Which"],a:"What",h:"What happened = the thing that happened"},
{q:"Tell me _____ you want.",o:["what","that","which","how"],a:"what",h:"what you want = the thing that you want"},
]},

{id:"u83",num:"Unit 83",title:"Shall I...? / Shall we...?",
preview:"Shall I open the window? Shall we go? What shall I do?",
grammar:[
{h:"Shall I...? — offering to do something",c:`<span class="hl">Shall I</span> + base verb? = Do you want me to...?<span class="ex"><span class="w">Shall I</span> open the window? — Yes, please.<br><span class="w">Shall I</span> call a taxi? &nbsp; <span class="w">Shall I</span> help you with that?</span>`},
{h:"Shall we...? — suggesting doing something together",c:`<span class="hl">Shall we</span> + base verb? = Let's...? / What about...?<span class="ex"><span class="w">Shall we</span> go now? — Yes, let's.<br><span class="w">Shall we</span> eat here or somewhere else?</span>`},
{h:"What shall I/we do? (asking for suggestion)",c:`<span class="ex"><span class="w">What shall I</span> do? I can't decide.<br><span class="w">Where shall we</span> meet? &nbsp; <span class="w">What shall we</span> have for dinner?</span>`}
],
quiz:[
{q:"_____ I carry that bag for you?",o:["Shall","Will","Would","Should"],a:"Shall",h:"Offering to help → Shall I?"},
{q:"_____ we start the meeting?",o:["Shall","Will","Should","Do"],a:"Shall",h:"Suggestion to do together → Shall we?"},
{q:"What _____ I do? I don't know which job to take.",o:["shall","will","should","must"],a:"shall",h:"Asking for advice/suggestion → What shall I?"},
{q:"_____ I close the door? — Yes, please.",o:["Shall","Will","Would you like","Must"],a:"Shall",h:"Offering → Shall I?"},
]},
]},

// ══════════════════════════════════════════
// SECTION 20 — MORE COMPARISONS
// ══════════════════════════════════════════
{id:"comp2",label:"More Comparisons",units:[
{id:"u84",num:"Unit 84",title:"as ... as (equal comparisons)",
preview:"She is as tall as her sister. It's not as expensive as I thought.",
grammar:[
{h:"as + adjective/adverb + as = equal",c:`<span class="hl">as ... as</span> = the same degree<span class="ex">She is <span class="w">as tall as</span> her sister. (= same height)<br>This is <span class="w">as good as</span> that one.<br>He runs <span class="w">as fast as</span> a professional athlete.</span>`},
{h:"not as ... as = less than",c:`<span class="hl">not as ... as</span> = less than<span class="ex">This film is <span class="w">not as good as</span> the first one. (= the first was better)<br>I'm <span class="w">not as tired as</span> yesterday.</span>`},
{h:"the same as / similar to / different from",c:`<span class="ex">Your bag is <span class="w">the same as</span> mine.<br>This is <span class="w">similar to</span> what I had before.<br>His idea is <span class="w">different from</span> hers.</span>`},
{h:"twice as ... as / half as ... as",c:`<span class="ex">She earns <span class="w">twice as much as</span> me.<br>This costs <span class="w">three times as much as</span> that.<br>He's <span class="w">half as tall as</span> his father.</span>`}
],
quiz:[
{q:"She is _____ tall _____ her brother.",o:["as/as","so/as","as/than","more/as"],a:"as/as",h:"Equal comparison → as ... as"},
{q:"This exam was _____ difficult _____ the last one. (same difficulty)",o:["as/as","more/than","so/as","as/that"],a:"as/as",h:"as ... as for equal"},
{q:"He doesn't earn _____ much _____ his boss.",o:["as/as","so/as","as/than","more/than"],a:"as/as",h:"not as much as → not equal"},
{q:"Your car is _____ mine. (same model)",o:["the same as","similar to","as","different from"],a:"the same as",h:"Identical → the same as"},
]},

{id:"u85",num:"Unit 85",title:"much better / a lot easier / far more (comparative emphasis)",
preview:"She's much taller. It's a lot cheaper. He's far more intelligent.",
grammar:[
{h:"Emphasising comparatives",c:`Use <span class="hl">much / a lot / far / a bit / slightly</span> before comparative:<span class="ex">She's <span class="w">much</span> taller than me. &nbsp; It's <span class="w">a lot</span> cheaper.<br>He's <span class="w">far</span> more intelligent. &nbsp; It's <span class="w">a bit</span> colder today.<br>She's <span class="w">slightly</span> older than I thought.</span>`},
{h:"comparative and comparative = increasing",c:`<span class="hl">adjective-er and adjective-er / more and more + adjective</span> = getting increasingly<span class="ex">It's getting <span class="w">colder and colder</span>.<br>The film was getting <span class="w">more and more</span> interesting.<br>He's becoming <span class="w">more and more</span> confident.</span>`},
{h:"the + comparative, the + comparative",c:`<span class="ex"><span class="w">The more</span> you practise, <span class="w">the better</span> you get.<br><span class="w">The sooner</span> we leave, <span class="w">the earlier</span> we arrive.<br><span class="w">The older</span> I get, <span class="w">the wiser</span> I become.</span>`}
],
quiz:[
{q:"This is _____ better than the old version.",o:["much","very","so","enough"],a:"much",h:"much/far/a lot + comparative"},
{q:"The weather is getting _____ every day.",o:["worse and worse","more worse","more bad","badder"],a:"worse and worse",h:"Increasing → worse and worse"},
{q:"_____ you sleep, _____ you'll feel.",o:["The more/the better","More/better","The most/the best","Much/well"],a:"The more/the better",h:"the + comparative, the + comparative"},
{q:"She's _____ more experienced than me.",o:["far","very","so","too"],a:"far",h:"far/much/a lot before comparative"},
]},

{id:"u86",num:"Unit 86",title:"quite / rather / pretty / fairly",
preview:"It's quite good. She's rather tired. It's pretty cold. It's fairly easy.",
grammar:[
{h:"quite = moderately / fairly (less than 'very')",c:`<span class="hl">quite</span> = not very, but more than a little<span class="ex">The film was <span class="w">quite</span> good. (= fairly good, not bad)<br>I'm <span class="w">quite</span> tired. &nbsp; She speaks English <span class="w">quite</span> well.</span>`},
{h:"quite + a/an + adjective + noun",c:`<span class="ex">It was <span class="w">quite a</span> good film. (= quite + a/an — NOT: a quite good film)<br>She's <span class="w">quite a</span> good singer.</span>`},
{h:"rather = more than expected / quite (sometimes negative)",c:`<span class="hl">rather</span> = more than you'd expect, or stronger than 'quite'<span class="ex">It's <span class="w">rather</span> cold for June. (= surprisingly cold)<br>This is <span class="w">rather</span> difficult. &nbsp; She's <span class="w">rather</span> nice.</span>`},
{h:"pretty / fairly = informally 'quite'",c:`<span class="hl">pretty</span> (informal) ≈ <span class="hl">fairly</span> = moderately<span class="ex">It's <span class="w">pretty</span> good. &nbsp; He's <span class="w">fairly</span> easy to work with.<br>The exam was <span class="w">pretty</span> hard.</span>`}
],
quiz:[
{q:"The hotel was _____ nice — not amazing, but OK.",o:["quite","very","extremely","too"],a:"quite",h:"Moderately → quite"},
{q:"It was _____ a difficult exam. (more than expected)",o:["rather","quite a","very","pretty"],a:"quite a",h:"quite + a/an + adjective + noun"},
{q:"It's _____ cold today — unusual for this time of year.",o:["rather","quite","fairly","pretty"],a:"rather",h:"Surprising degree → rather"},
{q:"The journey was _____ long — about 3 hours.",o:["fairly","very extremely","quite extremely","much"],a:"fairly",h:"Moderately → fairly (informal: pretty)"},
]},

{id:"u87",num:"Unit 87",title:"prefer / would rather",
preview:"I prefer tea to coffee. I'd rather stay home. She'd rather not go.",
grammar:[
{h:"prefer + -ing/noun + to + -ing/noun (general preference)",c:`<span class="hl">prefer</span> + -ing/noun + <span class="hl">to</span> + -ing/noun<span class="ex">I <span class="w">prefer</span> tea <span class="w">to</span> coffee. (general, always)<br>She <span class="w">prefers</span> reading <span class="w">to</span> watching TV.</span>`},
{h:"prefer + to-infinitive (specific situation)",c:`<span class="ex">I'd <span class="w">prefer to stay</span> home tonight. (specific occasion)<br>I'd <span class="w">prefer not to go</span>. &nbsp; Would you prefer to eat here or outside?</span>`},
{h:"would rather + base verb (preference right now)",c:`<span class="hl">would rather</span> (= 'd rather) + base verb<span class="ex">I <span class="w">'d rather stay</span> home. &nbsp; She <span class="w">'d rather not come</span>.<br><span class="w">Would you rather</span> have tea or coffee?</span>`},
{h:"would rather + subject + past simple (preference for others)",c:`<span class="ex">I'd rather <span class="w">you didn't</span> tell anyone. (= I'd prefer if you didn't)<br>She'd rather <span class="w">he came</span> with us.</span>`}
],
quiz:[
{q:"I prefer swimming _____ running.",o:["to","than","from","over"],a:"to",h:"prefer + -ing + to + -ing"},
{q:"I'd rather _____ home tonight.",o:["stay","staying","to stay","stayed"],a:"stay",h:"would rather + base verb"},
{q:"Would you rather _____ now or later?",o:["eat","eating","to eat","ate"],a:"eat",h:"would rather + base verb"},
{q:"I'd rather you _____ tell anyone about this.",o:["didn't","don't","won't","not"],a:"didn't",h:"I'd rather + person + past simple"},
]},
]},

// ══════════════════════════════════════════
// SECTION 21 — MORE VERB PATTERNS
// ══════════════════════════════════════════
{id:"verb2",label:"More Verb Patterns",units:[
{id:"u88",num:"Unit 88",title:"be used to / get used to",
preview:"I'm used to getting up early. She got used to the noise. Are you used to it?",
grammar:[
{h:"be used to + -ing/noun (= accustomed to, not strange)",c:`<span class="hl">be used to</span> + -ing or noun = it's normal, I'm accustomed to it<span class="ex">I <span class="w">am used to</span> getting up early. (= it's normal for me)<br>She <span class="w">is used to</span> the noise. (= the noise doesn't bother her)<br>Are you <span class="w">used to</span> driving on the left?</span>`},
{h:"get used to + -ing/noun (= become accustomed)",c:`<span class="hl">get used to</span> = the process of becoming accustomed<span class="ex">I'm getting <span class="w">used to</span> waking up early. (= it's becoming normal)<br>She <span class="w">got used to</span> living alone. (= it became normal)</span>`},
{h:"used to (past habit) ≠ be used to",c:`<table><tr><th>used to + base</th><th>be used to + -ing</th></tr><tr><td>Past habit (no longer)</td><td>Accustomed to now</td></tr><tr><td>I used to smoke.</td><td>I'm used to sleeping late.</td></tr></table>`}
],
quiz:[
{q:"She _____ (used to/be) the cold weather — she's from Canada.",o:["is used to","used to","gets used to","is use to"],a:"is used to",h:"Accustomed to now → be used to"},
{q:"It took a while but I _____ waking up at 5am.",o:["got used to","used to","am used to","was used to"],a:"got used to",h:"Process of becoming accustomed → got used to"},
{q:"He _____ (used to) live here, but he moved away.",o:["used to","is used to","got used to","uses to"],a:"used to",h:"Past habit no longer → used to + base verb"},
{q:"Are you _____ driving on the left?",o:["used to","use to","using to","gotten use to"],a:"used to",h:"be used to → used to (after are)"},
]},

{id:"u89",num:"Unit 89",title:"get — various uses",
preview:"I got a letter. She got angry. He got dressed. We got to London.",
grammar:[
{h:"get = receive / obtain",c:`<span class="ex">I <span class="w">got</span> a letter this morning. &nbsp; She <span class="w">got</span> a new job.<br>Did you <span class="w">get</span> my message?</span>`},
{h:"get + adjective = become",c:`<span class="ex">It's <span class="w">getting</span> cold. &nbsp; She <span class="w">got</span> angry. &nbsp; He's <span class="w">getting</span> better.<br>I <span class="w">got</span> lost. &nbsp; Don't <span class="w">get</span> stressed!</span>`},
{h:"get + past participle = passive action",c:`<span class="ex">She <span class="w">got</span> hurt in the accident. &nbsp; He <span class="w">got</span> fired.<br>My phone <span class="w">got</span> stolen. &nbsp; I <span class="w">got</span> stuck in traffic.</span>`},
{h:"get + to + place = arrive",c:`<span class="ex">What time do we <span class="w">get to</span> Bangkok?<br>I <span class="w">got home</span> at midnight. &nbsp; She <span class="w">got to</span> the office late.</span>`}
],
quiz:[
{q:"She _____ angry when she heard the news.",o:["got","get","is getting","was get"],a:"got",h:"get + adjective = become"},
{q:"What time do we _____ the airport?",o:["get to","get at","arrive to","get in"],a:"get to",h:"get to + place = arrive at"},
{q:"He _____ in the accident and had to go to hospital.",o:["got hurt","got hurted","was getting hurt","get hurt"],a:"got hurt",h:"get + past participle = passive"},
{q:"I _____ your email this morning.",o:["got","get","have gotten","am getting"],a:"got",h:"get = receive; past tense → got"},
]},

{id:"u90",num:"Unit 90",title:"do and make",
preview:"do the dishes, do exercise — make a mistake, make a decision, make noise",
grammar:[
{h:"do — activities, work, tasks",c:`<span class="hl">do</span> the dishes / the laundry / homework / exercise / your best / a course<span class="ex">I need to <span class="w">do</span> the dishes. &nbsp; She's <span class="w">doing</span> a language course.<br><span class="w">Do</span> your homework! &nbsp; He <span class="w">does</span> exercise every morning.</span>`},
{h:"make — creating, producing, causing",c:`<span class="hl">make</span> a mistake / a decision / a suggestion / noise / money / friends / an effort / a phone call / a mess<span class="ex">Don't <span class="w">make</span> a mess! &nbsp; She <span class="w">made</span> a mistake.<br>He <span class="w">makes</span> a lot of money. &nbsp; <span class="w">Make</span> a decision!</span>`},
{h:"Common fixed expressions",c:`<table><tr><th>do</th><th>make</th></tr><tr><td>do business</td><td>make a profit</td></tr><tr><td>do a favour</td><td>make an excuse</td></tr><tr><td>do harm/good</td><td>make progress</td></tr><tr><td>do nothing</td><td>make a difference</td></tr></table>`}
],
quiz:[
{q:"She _____ a lot of mistakes in the test.",o:["made","did","make","done"],a:"made",h:"mistakes → make"},
{q:"I need to _____ the laundry.",o:["do","make","have","get"],a:"do",h:"laundry → do the laundry"},
{q:"Please don't _____ so much noise!",o:["make","do","have","get"],a:"make",h:"noise → make noise"},
{q:"He _____ his best but still failed.",o:["did","made","was doing","got"],a:"did",h:"your best → do your best"},
]},

{id:"u91",num:"Unit 91",title:"have — expressions with have",
preview:"have breakfast, have a shower, have fun, have a look, have a chat",
grammar:[
{h:"have + noun (actions/experiences — NOT possession)",c:`<span class="hl">have</span> + noun = do/experience something<span class="ex"><span class="w">have breakfast/lunch/dinner</span> &nbsp; <span class="w">have a meal/a drink/a coffee</span><br><span class="w">have a shower/a bath</span> &nbsp; <span class="w">have a rest/a sleep/a nap</span></span>`},
{h:"More have + noun expressions",c:`<span class="ex"><span class="w">have a look</span> (= look) &nbsp; <span class="w">have a try</span> (= try)<br><span class="w">have a chat</span> (= talk) &nbsp; <span class="w">have fun</span> &nbsp; <span class="w">have a good time</span><br><span class="w">have a problem</span> &nbsp; <span class="w">have an idea</span> &nbsp; <span class="w">have a party</span></span>`},
{h:"have got vs. have (possession)",c:`Both mean possession:<br><span class="hl">I have</span> a car. = <span class="hl">I've got</span> a car. (possession — not action)<br>But: <span class="hl">I had a shower</span> this morning. (action — don't use have got)</span>`}
],
quiz:[
{q:"I usually _____ a shower in the morning.",o:["have","take","do","get"],a:"have",h:"have a shower = routine action"},
{q:"Did you _____ fun at the party?",o:["have","make","do","get"],a:"have",h:"have fun = experience"},
{q:"Can I _____ a look at your phone?",o:["have","take","do","get"],a:"have",h:"have a look = look"},
{q:"She _____ breakfast at 7 every morning.",o:["has","makes","does","takes"],a:"has",h:"has breakfast (she → has)"},
]},

{id:"u92",num:"Unit 92",title:"need — need to / needn't / don't need to",
preview:"I need to go. You needn't worry. Do I need to bring anything?",
grammar:[
{h:"need to + base verb (necessity)",c:`<span class="hl">need to</span> = it is necessary to<span class="ex">I <span class="w">need to</span> call her. &nbsp; She <span class="w">needs to</span> see a doctor.<br>Do you <span class="w">need to</span> leave now?</span>`},
{h:"don't need to / needn't (not necessary)",c:`<span class="hl">don't/doesn't need to</span> OR <span class="hl">needn't</span> = not necessary<span class="ex">You <span class="w">don't need to</span> bring food. There'll be plenty.<br>You <span class="w">needn't</span> worry. Everything is fine.<br>She <span class="w">doesn't need to</span> come if she's busy.</span>`},
{h:"didn't need to vs. needn't have",c:`<span class="hl">didn't need to</span> = wasn't necessary (and I knew that)<br><span class="hl">needn't have</span> + p.p. = did it but it wasn't necessary<span class="ex">I <span class="w">didn't need to</span> queue — there was no one there.<br>You <span class="w">needn't have cooked</span> so much — we weren't hungry.</span>`}
],
quiz:[
{q:"You _____ come if you're busy. It's optional.",o:["don't need to","need to","needn't have","must"],a:"don't need to",h:"Not necessary → don't need to"},
{q:"She _____ see a doctor. That cough sounds serious.",o:["needs to","needn't","doesn't need to","need"],a:"needs to",h:"Necessary → needs to"},
{q:"You _____ have bought so much food! We can't eat it all.",o:["needn't","didn't need to","don't need to","mustn't"],a:"needn't",h:"Did it but was unnecessary → needn't have + p.p."},
{q:"Do I _____ a visa to travel there?",o:["need","needs to","have to need","must"],a:"need",h:"Do I need + noun (simple need)"},
]},
]},

// ══════════════════════════════════════════
// SECTION 22 — ADVANCED NOUNS & DETERMINERS
// ══════════════════════════════════════════
{id:"noun2",label:"Nouns & Determiners",units:[
{id:"u93",num:"Unit 93",title:"a lot of / much / many",
preview:"a lot of people, much money, many problems, lots of fun",
grammar:[
{h:"a lot of / lots of (positive sentences, both countable & uncountable)",c:`<span class="hl">a lot of / lots of</span> = used in positive sentences with BOTH types<span class="ex">She has <span class="w">a lot of</span> friends. &nbsp; There's <span class="w">a lot of</span> traffic.<br>I have <span class="w">lots of</span> things to do. &nbsp; They spent <span class="w">a lot of</span> money.</span>`},
{h:"much (uncountable) — mainly negatives & questions",c:`<span class="hl">much</span> + uncountable noun (mainly in negative/questions; 'a lot of' preferred in positive)<span class="ex">I don't have <span class="w">much</span> time. &nbsp; How <span class="w">much</span> money do you need?<br>(In positive: I have <span class="w">a lot of</span> time — NOT: I have much time)</span>`},
{h:"many (countable) — mainly negatives & questions",c:`<span class="hl">many</span> + countable plural (mainly in negative/questions)<span class="ex">There aren't <span class="w">many</span> seats left. &nbsp; How <span class="w">many</span> people are coming?<br>(In positive: <span class="w">a lot of</span> people — NOT: many people — though both are OK formally)</span>`}
],
quiz:[
{q:"I don't have _____ time before the meeting.",o:["much","many","a lot","lots of"],a:"much",h:"Uncountable (time) + negative → much"},
{q:"She has _____ friends at school.",o:["a lot of","much","many a","lots"],a:"a lot of",h:"Positive sentence → a lot of (not much/many)"},
{q:"How _____ cups of coffee do you drink a day?",o:["many","much","lot of","any"],a:"many",h:"Countable (cups) + question → many"},
{q:"There isn't _____ sugar left.",o:["much","many","a lot of","lots of"],a:"much",h:"Uncountable (sugar) + negative → much"},
]},

{id:"u94",num:"Unit 94",title:"(a) little / (a) few",
preview:"a little time, a few friends, little hope, few people",
grammar:[
{h:"a little (uncountable) = some, not much",c:`<span class="hl">a little</span> = small amount (positive meaning)<span class="ex">I have <span class="w">a little</span> time. (= some time — it's OK)<br>Add <span class="w">a little</span> salt. &nbsp; She speaks <span class="w">a little</span> French.</span>`},
{h:"little (uncountable) = not enough, almost none",c:`<span class="hl">little</span> without 'a' = not much (negative meaning)<span class="ex">There is <span class="w">little</span> hope. (= almost no hope)<br>I have <span class="w">little</span> time for this. (= not enough)</span>`},
{h:"a few (countable) = some, not many",c:`<span class="hl">a few</span> = small number (positive meaning)<span class="ex">I have <span class="w">a few</span> friends here. (= some friends — it's OK)<br>She spoke <span class="w">a few</span> words of Thai.</span>`},
{h:"few (countable) = not enough, almost none",c:`<span class="hl">few</span> without 'a' = not many (negative meaning)<span class="ex"><span class="w">Few</span> people know about this. (= almost nobody)<br>There are <span class="w">few</span> seats left. (= almost none)</span>`}
],
quiz:[
{q:"She speaks _____ English — enough to have a conversation.",o:["a little","little","a few","few"],a:"a little",h:"Uncountable (English) + positive → a little"},
{q:"There was _____ traffic, so we were late.",o:["a lot of","little","few","a few"],a:"a lot of",h:"Lots of = reason for being late (positive amount)"},
{q:"I have _____ friends in this city — only one or two.",o:["a few","few","a little","little"],a:"a few",h:"Countable (friends) + small but positive amount → a few"},
{q:"_____ people understand this topic — it's very complex.",o:["Few","A few","Little","A little"],a:"Few",h:"Almost nobody → few (negative meaning)"},
]},

{id:"u95",num:"Unit 95",title:"all / most / some / any / no / none",
preview:"All students passed. Most of them passed. Some failed. None succeeded.",
grammar:[
{h:"all / most / some + noun (no 'of' needed)",c:`<span class="hl">all</span> + noun / <span class="hl">most</span> + noun / <span class="hl">some</span> + noun<span class="ex"><span class="w">All</span> students must take the exam.<br><span class="w">Most</span> people like music.<br><span class="w">Some</span> children learn very quickly.</span>`},
{h:"all of / most of / some of + the/these/my... (specific group)",c:`<span class="ex"><span class="w">All of</span> the students passed. (= all students in THIS class)<br><span class="w">Most of</span> my friends live abroad.<br><span class="w">Some of</span> these questions are very hard.</span>`},
{h:"no + noun vs. none (of) + pronoun",c:`<span class="hl">no</span> + noun = not any<br><span class="hl">none</span> (of) = stands alone or with 'of'<span class="ex">There is <span class="w">no</span> milk. = There is <span class="w">none</span>.<br><span class="w">None of</span> my friends came. &nbsp; 'How many came?' — '<span class="w">None</span>.'</span>`},
{h:"any (positive) = it doesn't matter which",c:`<span class="ex">Come <span class="w">any</span> time. &nbsp; Take <span class="w">any</span> seat. &nbsp; <span class="w">Any</span> student can do this.</span>`}
],
quiz:[
{q:"_____ my friends are coming tonight — none at all.",o:["None of","No of","All of","Most of"],a:"None of",h:"None of + pronoun/determiner"},
{q:"_____ people enjoy working long hours.",o:["Most","Most of","All of","None"],a:"Most",h:"General statement (no 'the') → most + noun"},
{q:"_____ the students passed the exam — only 3 failed.",o:["Most of","Most","All","None of"],a:"Most of",h:"Specific class (the students) → most of the"},
{q:"Come _____ time — I'm always here.",o:["any","some","all","none"],a:"any",h:"It doesn't matter which time → any"},
]},

{id:"u96",num:"Unit 96",title:"Possessive 's / of",
preview:"Tom's car, the girl's name, the end of the street, the top of the hill",
grammar:[
{h:"'s — for people, animals, time expressions",c:`<span class="hl">'s</span> (apostrophe s) = belonging to a person/animal, or time<span class="ex"><span class="w">Tom's</span> car &nbsp; <span class="w">the girl's</span> name &nbsp; <span class="w">my sister's</span> friend<br><span class="w">yesterday's</span> news &nbsp; <span class="w">today's</span> meeting &nbsp; <span class="w">a week's</span> holiday</span>`},
{h:"of — for things, places, organizations",c:`<span class="hl">of</span> = used with inanimate things<span class="ex">the end <span class="w">of</span> the street &nbsp; the top <span class="w">of</span> the hill<br>the name <span class="w">of</span> the company &nbsp; the price <span class="w">of</span> petrol</span>`},
{h:"Plural 's (apostrophe after plural s)",c:`<span class="ex">my <span class="w">parents'</span> house (parents = plural, add ' after s)<br>the <span class="w">students'</span> books &nbsp; the <span class="w">girls'</span> school</span>`},
{h:"Double possessive",c:`<span class="ex">a friend <span class="w">of</span> Tom's (= one of Tom's friends)<br>a colleague <span class="w">of</span> mine (= one of my colleagues)</span>`}
],
quiz:[
{q:"That is _____ car. (= the car belonging to Lisa)",o:["Lisa's","Lisa of","the car of Lisa","of Lisa"],a:"Lisa's",h:"Person → 's"},
{q:"The end _____ the film was surprising.",o:["of","'s","from","for"],a:"of",h:"Inanimate thing (film) → of"},
{q:"My _____ house is very big. (= the house of my parents)",o:["parents'","parent's","parents's","parent of"],a:"parents'",h:"Plural (parents) → add ' after the s"},
{q:"He's a friend _____ my sister's. (= one of her friends)",o:["of","from","'s","for"],a:"of",h:"Double possessive: a friend of [name]'s"},
]},

{id:"u97",num:"Unit 97",title:"you / they / people (impersonal)",
preview:"You can buy it online. They say it's good. People often ask me this.",
grammar:[
{h:"you = people in general (not specifically the listener)",c:`<span class="hl">you</span> (general) = one, anyone, people in general<span class="ex"><span class="w">You</span> can buy it online. (= one can, anyone can)<br><span class="w">You</span> have to be 18 to vote. (= everyone / people in general)</span>`},
{h:"they = people in authority, experts, society",c:`<span class="hl">they</span> (impersonal) = people generally, the government, experts<span class="ex"><span class="w">They</span> say it's going to rain tomorrow. (= people say)<br><span class="w">They're</span> going to build a new road here. (= the authorities)</span>`},
{h:"people = general (same as 'they')",c:`<span class="ex"><span class="w">People</span> often ask me this question.<br><span class="w">People</span> in Thailand are very friendly.<br>= <span class="w">They</span> are very friendly in Thailand.</span>`},
{h:"one (formal/written)",c:`<span class="hl">one</span> = formal alternative to 'you'<span class="ex"><span class="w">One</span> must be careful in this situation. (formal)<br>= <span class="w">You</span> must be careful. (informal)</span>`}
],
quiz:[
{q:"_____ say the restaurant is very good. Let's try it.",o:["They","It","People say","Both a and c"],a:"Both a and c",h:"They say / People say = impersonal (both OK)"},
{q:"In Thailand, _____ drive on the left.",o:["they","you","people","Both a and b"],a:"Both a and b",h:"you/they both work for general statements"},
{q:"_____ need a passport to travel abroad.",o:["You","They","People","All of the above"],a:"All of the above",h:"All three are used impersonally"},
{q:"_____ are going to close this road for repairs. (authorities)",o:["They","People","You","We"],a:"They",h:"Authorities/unspecified people → they"},
]},
]},
// ══════════════════════════════════════════
// SECTION 23 — WISHES & ADVANCED MODALS
// ══════════════════════════════════════════
{id:"wish",label:"Wishes & Modals",units:[
{id:"u98",num:"Unit 98",title:"I wish... / If only...",
preview:"I wish I had more time. I wish I could fly. If only she were here.",
grammar:[
{h:"wish + past simple (unreal present wish)",c:`<span class="hl">wish</span> + past simple = I want the present to be different<span class="ex">I <span class="w">wish I had</span> more money. (I don't have much — I want more)<br>I <span class="w">wish I could</span> speak French. (I can't)<br>I <span class="w">wish I were</span> taller. (I'm not)</span>`},
{h:"wish + would (wishing for change in behaviour)",c:`<span class="hl">wish + would</span> = I want someone/something to do something different<span class="ex">I <span class="w">wish you would</span> listen. (= Please listen!)<br>I <span class="w">wish it would</span> stop raining.<br>I <span class="w">wish he wouldn't</span> smoke in the car.</span>`},
{h:"wish + past perfect (regret about the past)",c:`<span class="hl">wish + had + p.p.</span> = regret about something in the past<span class="ex">I <span class="w">wish I hadn't eaten</span> so much. (I did eat a lot — I regret it)<br>I <span class="w">wish she had come</span> to the party.</span>`},
{h:"If only... (stronger than wish)",c:`<span class="hl">If only</span> = stronger, more emotional version of wish<span class="ex"><span class="w">If only I had</span> more time! &nbsp; <span class="w">If only she were</span> here.<br><span class="w">If only I hadn't said</span> that!</span>`}
],
quiz:[
{q:"I wish I _____ (can) play the piano.",o:["could","can","would","am able to"],a:"could",h:"Unreal present → wish + could (past of can)"},
{q:"I wish it _____ stop raining. (I want it to change)",o:["would","could","did","has"],a:"would",h:"Wishing for change → wish + would"},
{q:"I wish I _____ (not/say) that. She was upset.",o:["hadn't said","didn't say","wouldn't say","haven't said"],a:"hadn't said",h:"Past regret → wish + hadn't + p.p."},
{q:"_____ only I could see her one more time!",o:["If","I","Only","When"],a:"If",h:"If only = stronger wish"},
]},

{id:"u99",num:"Unit 99",title:"must have / can't have / should have",
preview:"She must have forgotten. He can't have arrived. You should have called.",
grammar:[
{h:"must have + p.p. (certain conclusion about past)",c:`<span class="hl">must have</span> + p.p. = I'm sure it happened<span class="ex">She's not here. She <span class="w">must have left</span> already.<br>He looks exhausted — he <span class="w">must have worked</span> all night.</span>`},
{h:"can't have + p.p. (certain the opposite happened)",c:`<span class="hl">can't have</span> + p.p. = I'm sure it didn't happen<span class="ex">She <span class="w">can't have said</span> that — she's always so kind.<br>He <span class="w">can't have arrived</span> yet — he left only 5 minutes ago.</span>`},
{h:"might have / could have + p.p. (possible past)",c:`<span class="hl">might have / could have</span> + p.p. = maybe it happened<span class="ex">She <span class="w">might have forgotten</span>. &nbsp; He <span class="w">could have missed</span> the bus.</span>`},
{h:"should have + p.p. (criticism / regret about past)",c:`<span class="hl">should have</span> + p.p. = the right thing would have been...<span class="ex">You <span class="w">should have called</span> me. (= you didn't, but you should have)<br>I <span class="w">shouldn't have eaten</span> so much.</span>`}
],
quiz:[
{q:"She looks pale — she _____ seen a ghost!",o:["must have","can't have","should have","might have"],a:"must have",h:"I'm sure it happened → must have + p.p."},
{q:"He _____ said that — he's usually so polite.",o:["can't have","must have","should have","couldn't"],a:"can't have",h:"Certain it didn't happen → can't have + p.p."},
{q:"You _____ told me earlier! Now it's too late.",o:["should have","must have","can't have","could"],a:"should have",h:"Criticism/regret → should have + p.p."},
{q:"I'm not sure — she _____ left already.",o:["might have","must have","can't have","should have"],a:"might have",h:"Uncertain past possibility → might have"},
]},

{id:"u100",num:"Unit 100",title:"in case",
preview:"Take an umbrella in case it rains. I wrote it down in case I forgot.",
grammar:[
{h:"in case = because it might happen (precaution)",c:`<span class="hl">in case</span> + present simple (for future precaution)<br><span class="hl">in case</span> + past simple (for past precaution)<span class="ex">Take an umbrella <span class="w">in case</span> it rains. (precaution)<br>I took an umbrella <span class="w">in case</span> it rained. (past)</span>`},
{h:"in case vs. if",c:`<span class="hl">if</span> = only do something when the condition is true<br><span class="hl">in case</span> = do something as a precaution (regardless)<span class="ex">Take this <span class="hl">if</span> you feel sick. (= take it when/if you're sick)<br>Take this <span class="hl">in case</span> you feel sick. (= take it now, in advance, as a precaution)</span>`},
{h:"just in case (= as a precaution, no specific reason)",c:`<span class="ex">I'll take my phone <span class="w">just in case</span>.<br>She kept his number <span class="w">just in case</span> she needed it.</span>`}
],
quiz:[
{q:"I wrote down his number _____ I forgot it.",o:["in case","if","so that","unless"],a:"in case",h:"Precaution → in case"},
{q:"Take a coat _____ it gets cold later.",o:["in case","if","when","because"],a:"in case",h:"Advance precaution → in case"},
{q:"In case _____ (it/rain), I'll take an umbrella.",o:["it rains","it will rain","it rained","of rain"],a:"it rains",h:"in case + present simple (for future)"},
{q:"I'll bring some extra food, _____ in case.",o:["just","only","quite","even"],a:"just",h:"just in case = as a precaution without specific reason"},
]},

{id:"u101",num:"Unit 101",title:"unless / as long as / provided",
preview:"I'll go unless it rains. You can stay as long as you're quiet.",
grammar:[
{h:"unless = if not / except if",c:`<span class="hl">unless</span> + present simple (for future)<span class="ex"><span class="w">Unless</span> it rains, we'll go. (= If it doesn't rain, we'll go)<br>I'll come <span class="w">unless</span> I'm busy. (= if I'm not busy)<br>Don't call <span class="w">unless</span> it's urgent.</span>`},
{h:"as long as / so long as = on condition that",c:`<span class="hl">as long as</span> = provided that, if only<span class="ex">You can borrow my car <span class="w">as long as</span> you drive carefully.<br><span class="w">As long as</span> you study, you'll pass.</span>`},
{h:"provided (that) / providing (that)",c:`<span class="hl">provided/providing (that)</span> = formal version of 'as long as'<span class="ex">You can go <span class="w">provided that</span> you finish your work first.<br><span class="w">Providing</span> the weather is good, the match will go ahead.</span>`}
],
quiz:[
{q:"I'll help you _____ you promise to try your best.",o:["as long as","unless","if not","despite"],a:"as long as",h:"Condition → as long as"},
{q:"_____ you hurry, you'll miss the bus.",o:["Unless","If","As long as","Provided"],a:"Unless",h:"unless = if not: Unless you hurry (= if you don't hurry)"},
{q:"She'll come _____ she's invited.",o:["provided","unless not","as long","if she's"],a:"provided",h:"provided (that) = if (formal condition)"},
{q:"Don't call me _____ it's really important.",o:["unless","if","as long as","provided"],a:"unless",h:"except if → unless"},
]},

{id:"u102",num:"Unit 102",title:"-ing clauses (Having finished... / Feeling tired...)",
preview:"Feeling tired, she went to bed. Having eaten, they left. Not knowing what to do, he waited.",
grammar:[
{h:"-ing clause = showing when/why/how",c:`An -ing clause replaces a full clause:<span class="ex"><span class="w">Feeling</span> tired, she went to bed. (= Because she felt tired / When she felt tired)<br><span class="w">Walking</span> home, I met an old friend. (= While I was walking)</span>`},
{h:"Having + p.p. = completed action first",c:`<span class="hl">Having + p.p.</span> = after completing something<span class="ex"><span class="w">Having finished</span> her work, she went home.<br><span class="w">Having eaten</span>, they left the restaurant.</span>`},
{h:"Not + -ing (negative)",c:`<span class="ex"><span class="w">Not knowing</span> what to do, he waited.<br><span class="w">Not having</span> enough money, she couldn't go.</span>`},
{h:"The subject of both clauses must be the same",c:`<span class="ex">✓ <span class="w">Walking</span> home, <span class="w">I</span> saw her. (I was walking, I saw)<br>✗ <span class="w">Walking</span> home, the rain started. (Who was walking? Not 'the rain')</span>`}
],
quiz:[
{q:"_____ not feeling well, she decided to stay home.",o:["Feeling","Having felt","Not feeling","Feel"],a:"Not feeling",h:"Negative -ing clause → Not feeling"},
{q:"_____ the letter, he posted it immediately.",o:["Having written","Writing","After write","He wrote"],a:"Having written",h:"Completed action first → Having + p.p."},
{q:"_____ along the street, I noticed a new shop.",o:["Walking","Having walked","Walk","Walked"],a:"Walking",h:"-ing clause = while/as I was walking"},
{q:"_____ tired from the journey, they went straight to bed.",o:["Feeling","Having feeling","Feel","They felt"],a:"Feeling",h:"-ing clause (because/when they felt)"},
]},
]},

// ══════════════════════════════════════════
// SECTION 24 — MORE CONJUNCTIONS & CLAUSES
// ══════════════════════════════════════════
{id:"conj2",label:"More Conjunctions",units:[
{id:"u103",num:"Unit 103",title:"as / since / because",
preview:"Since I was tired, I went to bed. As it was raining, we stayed in.",
grammar:[
{h:"because — giving reason (answers 'why?')",c:`<span class="hl">because</span> = most direct way to give reason<span class="ex">I stayed home <span class="w">because</span> I was ill.<br><span class="w">Because</span> it was raining, we stayed inside.</span>`},
{h:"as / since — giving known/background reason",c:`<span class="hl">as</span> / <span class="hl">since</span> = the reason is already known or is background info<span class="ex"><span class="w">As</span> I was tired, I went to bed. (background reason)<br><span class="w">Since</span> you're here, you can help me. (given that)<br>I didn't call <span class="w">since</span> I thought you were busy.</span>`},
{h:"Position",c:`<span class="hl">because</span> — middle or end (most common at end)<br><span class="hl">as/since</span> — usually at the start<span class="ex">I left early <span class="w">because</span> I was tired.<br><span class="w">Since</span> I was tired, I left early.</span>`}
],
quiz:[
{q:"She was late _____ there was a traffic jam.",o:["because","as","since","Both a and b"],a:"Both a and b",h:"All three work; because is most direct"},
{q:"_____ you know her well, could you introduce me?",o:["Since","Because","As","All three work"],a:"All three work",h:"since/as/because all give reason"},
{q:"I didn't eat _____ I wasn't hungry.",o:["because","since","as","All three work"],a:"All three work",h:"because/since/as all explain why"},
{q:"_____ is the difference between 'as' and 'because'?",o:["as = known reason; because = direct answer to why","They are the same","because = past; as = present","No difference"],a:"as = known reason; because = direct answer to why",h:"as/since = background known reason; because = direct reason"},
]},

{id:"u104",num:"Unit 104",title:"so that / in order to / to (purpose)",
preview:"I study so that I can get a job. I came early to get a seat.",
grammar:[
{h:"to / in order to — purpose (positive)",c:`<span class="hl">to</span> + base verb (simplest, most common)<br><span class="hl">in order to</span> = more formal version<span class="ex">I went to the shop <span class="w">to buy</span> milk.<br>She studied hard <span class="w">in order to</span> pass the exam.</span>`},
{h:"so that + subject + can/will/could/would (purpose with different subjects)",c:`<span class="hl">so that</span> + clause = when the subjects are different<span class="ex">I'll explain slowly <span class="w">so that</span> you can understand.<br>She left early <span class="w">so that</span> she wouldn't be late.</span>`},
{h:"so as not to / in order not to (negative purpose)",c:`<span class="ex">Speak quietly <span class="w">so as not to</span> wake the baby.<br>I left early <span class="w">in order not to</span> miss the train.</span>`}
],
quiz:[
{q:"She studies every day _____ pass the exam.",o:["to","so that","in order that","for"],a:"to",h:"Purpose → to + base verb"},
{q:"I'll write it down _____ I don't forget.",o:["so that","to","in order to","because"],a:"so that",h:"Different subjects (I write; I don't forget) → so that"},
{q:"He tiptoed _____ wake the baby.",o:["so as not to","to not","in order not","so that not"],a:"so as not to",h:"Negative purpose → so as not to"},
{q:"She left early _____ catch the last train.",o:["in order to","so that","because","for to"],a:"in order to",h:"Purpose → in order to (formal) / to (informal)"},
]},

{id:"u105",num:"Unit 105",title:"whatever / whenever / wherever / whoever / however",
preview:"Whatever you do, I'll support you. Wherever she goes, he follows.",
grammar:[
{h:"-ever words = it doesn't matter which/who/when/where/how",c:`<span class="hl">whatever</span> = no matter what<br><span class="hl">wherever</span> = no matter where<br><span class="hl">whenever</span> = no matter when / every time<br><span class="hl">whoever</span> = no matter who<br><span class="hl">however</span> = no matter how<span class="ex"><span class="w">Whatever</span> happens, I'll be there for you.<br><span class="w">Wherever</span> she goes, she makes friends.<br><span class="w">Whenever</span> I see her, I smile.<br><span class="w">Whoever</span> calls, tell them I'm busy.<br><span class="w">However</span> hard I try, I can't do it.</span>`},
{h:"Emphasis: no matter what/who/when...",c:`<span class="hl">whatever</span> = <span class="hl">no matter what</span><br><span class="hl">wherever</span> = <span class="hl">no matter where</span><span class="ex"><span class="w">No matter what</span> you say, I won't change my mind.<br>= <span class="w">Whatever</span> you say, I won't change my mind.</span>`}
],
quiz:[
{q:"Call me _____ you need help.",o:["whenever","wherever","whatever","however"],a:"whenever",h:"No matter when → whenever"},
{q:"_____ she goes, she feels at home.",o:["Wherever","Whenever","Whatever","However"],a:"Wherever",h:"No matter where → wherever"},
{q:"_____ you do, don't press that button!",o:["Whatever","Whenever","Whoever","However"],a:"Whatever",h:"No matter what → whatever"},
{q:"_____ hard it is, keep trying.",o:["However","Whatever","Whenever","Wherever"],a:"However",h:"No matter how → however"},
]},

{id:"u106",num:"Unit 106",title:"by the time / until / as soon as",
preview:"By the time we arrived, the film had started. Wait until I get back.",
grammar:[
{h:"by the time = when... at that point, already",c:`<span class="hl">by the time</span> = when that moment arrives, something will have happened<span class="ex"><span class="w">By the time</span> we arrived, the film had already started. (past)<br><span class="w">By the time</span> you read this, I will have left. (future)</span>`},
{h:"until / till = up to that point",c:`<span class="hl">until/till</span> = continue up to that moment<span class="ex">Wait <span class="w">until</span> I get back.<br>I worked <span class="w">until</span> midnight.<br><span class="w">Until</span> she arrived, I was bored.</span>`},
{h:"as soon as = immediately when",c:`<span class="hl">as soon as</span> = the moment that something happens<span class="ex">I'll call you <span class="w">as soon as</span> I arrive.<br><span class="w">As soon as</span> she saw him, she smiled.</span>`}
],
quiz:[
{q:"_____ we arrived, the party had ended.",o:["By the time","Until","As soon as","When"],a:"By the time",h:"When we arrived, it was already over → by the time"},
{q:"I'll wait _____ you finish.",o:["until","by the time","as soon as","when"],a:"until",h:"Continue up to a point → until"},
{q:"She called me _____ she heard the news.",o:["as soon as","by the time","until","since"],a:"as soon as",h:"Immediately when → as soon as"},
{q:"_____ you read this, I'll have left.",o:["By the time","Until","As soon as","When"],a:"By the time",h:"When you read it, it will already have happened → by the time"},
]},
]},

{id:"prep2",label:"More Prepositions",units:[
{id:"u107",num:"Unit 107",title:"on time / in time / at the end / in the end",
preview:"The train was on time. We arrived in time. At the end of the film. In the end, she agreed.",
grammar:[
{h:"on time = exactly at the scheduled time",c:`<span class="hl">on time</span> = punctual, not late<span class="ex">The train arrived <span class="w">on time</span>. &nbsp; Please be <span class="w">on time</span>.<br>The meeting started <span class="w">on time</span>.</span>`},
{h:"in time (for) = early enough, not too late",c:`<span class="hl">in time</span> = with enough time, before it's too late<span class="ex">We arrived <span class="w">in time</span> for the show. (= before it started)<br>I got there just <span class="w">in time</span>. &nbsp; Is it <span class="w">in time</span> for dinner?</span>`},
{h:"at the end (of) = at the final point",c:`<span class="hl">at the end</span> + of = the final part/point<span class="ex"><span class="w">At the end of</span> the film, everyone cried.<br>I'll pay you <span class="w">at the end</span> of the month.</span>`},
{h:"in the end = finally, after a long time",c:`<span class="hl">in the end</span> = eventually, after everything<span class="ex"><span class="w">In the end</span>, she agreed to come. (= eventually / finally)<br>We tried many solutions; <span class="w">in the end</span>, this one worked.</span>`}
],
quiz:[
{q:"The bus was late — it didn't arrive _____.",o:["on time","in time","at the end","in the end"],a:"on time",h:"Punctual/scheduled time → on time"},
{q:"We ran and got there just _____ to catch the train.",o:["in time","on time","at the end","in the end"],a:"in time",h:"Early enough, not too late → in time"},
{q:"_____ the story, the hero saves everyone.",o:["At the end of","In the end of","At the end","In the end"],a:"At the end of",h:"Final point + of → at the end of"},
{q:"It was difficult but _____ she passed the exam.",o:["in the end","at the end","on time","in time"],a:"in the end",h:"Eventually / after all → in the end"},
]},

{id:"u108",num:"Unit 108",title:"by — uses of by",
preview:"by car, by mistake, by the time, a play by Shakespeare, pay by card",
grammar:[
{h:"by + transport (no article)",c:`<span class="hl">by</span> car / bus / train / plane / bike / boat / foot / hand<span class="ex">I go to work <span class="w">by</span> bus. &nbsp; She travels <span class="w">by</span> plane.<br>He delivered it <span class="w">by</span> hand.</span>`},
{h:"by + noun (method/means)",c:`<span class="ex">Pay <span class="w">by</span> card / cash. &nbsp; Send it <span class="w">by</span> post / email.<br>Made <span class="w">by</span> hand. &nbsp; Sold <span class="w">by</span> weight.</span>`},
{h:"by + -self (alone, without help)",c:`<span class="ex">She did it <span class="w">by herself</span>. &nbsp; He lives <span class="w">by himself</span>.<br>I made this <span class="w">by myself</span>.</span>`},
{h:"by + noun phrases",c:`<span class="ex">a book <span class="w">by</span> Shakespeare (= written by)<br><span class="w">by accident / by mistake / by chance</span> (= not on purpose)<br><span class="w">by the way</span> (= incidentally) &nbsp; <span class="w">by heart</span> (= from memory)</span>`}
],
quiz:[
{q:"I usually go to work _____ bike.",o:["by","on","in","with"],a:"by",h:"Transport → by (no article)"},
{q:"He broke it _____ accident — it wasn't on purpose.",o:["by","with","from","in"],a:"by",h:"by accident = not intentionally"},
{q:"She learned all the words _____ heart.",o:["by","in","from","with"],a:"by",h:"by heart = from memory"},
{q:"This song was written _____ The Beatles.",o:["by","from","of","with"],a:"by",h:"by + creator (agent)"},
]},

{id:"u109",num:"Unit 109",title:"Noun + Preposition (reason for, cause of, key to)",
preview:"the reason for, the cause of, a solution to, an increase in, a problem with",
grammar:[
{h:"Common noun + preposition combinations",c:`<table><tr><th>Noun + prep.</th><th>Example</th></tr><tr><td>reason <b>for</b></td><td>What's the reason for this?</td></tr><tr><td>cause <b>of</b></td><td>the cause of the problem</td></tr><tr><td>solution <b>to</b></td><td>a solution to the crisis</td></tr><tr><td>answer <b>to</b></td><td>the answer to the question</td></tr><tr><td>increase/decrease <b>in</b></td><td>an increase in prices</td></tr><tr><td>problem <b>with</b></td><td>the problem with this plan</td></tr><tr><td>damage <b>to</b></td><td>damage to the car</td></tr><tr><td>advantage <b>of</b></td><td>the advantage of this method</td></tr></table>`},
{h:"More noun + preposition",c:`<table><tr><th>Noun + prep.</th><th>Example</th></tr><tr><td>example <b>of</b></td><td>an example of good writing</td></tr><tr><td>need <b>for</b></td><td>the need for change</td></tr><tr><td>demand <b>for</b></td><td>the demand for oil</td></tr><tr><td>contact <b>with</b></td><td>in contact with her team</td></tr><tr><td>relationship <b>with/between</b></td><td>a good relationship with clients</td></tr></table>`}
],
quiz:[

{q:"Nobody knows the cause _____ the accident.",o:["of","for","to","with"],a:"of",h:"cause of"},
{q:"There has been an increase _____ prices recently.",o:["in","of","for","to"],a:"in",h:"increase in"},
{q:"Have you found a solution _____ the problem?",o:["to","for","of","with"],a:"to",h:"solution to"},
]},

{id:"u110",num:"Unit 110",title:"Verb + Preposition 2 (talk about / complain about / insist on)",
preview:"talk about, complain about, dream of, insist on, concentrate on, succeed in",
grammar:[
{h:"Verb + about",c:`<span class="hl">talk / think / dream / care / complain / worry / hear / know</span> about<span class="ex">What are you <span class="w">talking about</span>?<br>She <span class="w">complains about</span> everything.<br>I've been <span class="w">thinking about</span> your offer.</span>`},
{h:"Verb + on",c:`<span class="hl">concentrate / focus / depend / insist / rely / spend (time)</span> on<span class="ex">She <span class="w">insists on</span> paying herself.<br>I can't <span class="w">concentrate on</span> my work.<br>He <span class="w">spent</span> two hours <span class="w">on</span> the report.</span>`},
{h:"Verb + of",c:`<span class="hl">dream / think / consist / approve / accuse / suspect / remind</span> of<span class="ex">She <span class="w">dreamed of</span> becoming a singer.<br>This reminds me <span class="w">of</span> my childhood.<br>He was accused <span class="w">of</span> stealing.</span>`},
{h:"Verb + in",c:`<span class="hl">believe / succeed / result / specialise / be interested</span> in<span class="ex">I <span class="w">believe in</span> hard work.<br>She <span class="w">succeeded in</span> passing the exam.<br>The accident <span class="w">resulted in</span> injuries.</span>`}
],
quiz:[
{q:"She always complains _____ the weather.",o:["about","of","on","for"],a:"about",h:"complain about"},
{q:"He insists _____ paying the bill.",o:["on","about","of","for"],a:"on",h:"insist on"},
{q:"I've always dreamed _____ visiting Japan.",o:["of","about","on","in"],a:"of",h:"dream of"},

]},
]},

{id:"pv2",label:"More Phrasal Verbs",units:[
{id:"u111",num:"Unit 111",title:"Phrasal verbs with out",
preview:"find out, go out, carry out, run out, put out, work out, point out",
grammar:[
{h:"out = completing or discovering",c:`<table><tr><th>Phrasal verb</th><th>Meaning</th><th>Example</th></tr><tr><td>find out</td><td>discover</td><td>Find out what happened.</td></tr><tr><td>work out</td><td>calculate / exercise / succeed</td><td>I can't work it out.</td></tr><tr><td>carry out</td><td>do/complete (plan/research)</td><td>carry out an experiment</td></tr><tr><td>point out</td><td>draw attention to</td><td>She pointed out the mistake.</td></tr><tr><td>run out (of)</td><td>have none left</td><td>We ran out of milk.</td></tr><tr><td>put out</td><td>extinguish</td><td>Put out the fire!</td></tr><tr><td>turn out</td><td>prove to be / happen</td><td>It turned out to be easy.</td></tr></table>`}
],
quiz:[

{q:"The firefighters _____ the fire quickly.",o:["put out","put off","put in","put up"],a:"put out",h:"extinguish → put out"},

{id:"u112",num:"Unit 112",title:"Phrasal verbs with up",
preview:"grow up, give up, use up, make up, turn up, set up, bring up, look up",
grammar:[
{h:"up = completion or increase",c:`<table><tr><th>Phrasal verb</th><th>Meaning</th><th>Example</th></tr><tr><td>grow up</td><td>become an adult</td><td>Where did you grow up?</td></tr><tr><td>give up</td><td>stop doing / quit</td><td>Don't give up!</td></tr><tr><td>use up</td><td>use all of something</td><td>We've used up the budget.</td></tr><tr><td>make up</td><td>invent / reconcile</td><td>He made up an excuse.</td></tr><tr><td>turn up</td><td>arrive / increase volume</td><td>She turned up late.</td></tr><tr><td>set up</td><td>establish</td><td>They set up a new company.</td></tr><tr><td>bring up</td><td>raise (a child) / mention</td><td>She was brought up in Paris.</td></tr><tr><td>look up</td><td>search for information</td><td>Look it up in a dictionary.</td></tr></table>`}
],
quiz:[

{q:"Don't _____ — you're almost there!",o:["give up","grow up","use up","make up"],a:"give up",h:"stop/quit → give up"},
{q:"If you don't know the word, _____ it _____ in the dictionary.",o:["look/up","find/out","bring/up","set/up"],a:"look/up",h:"search for → look up"},

{id:"u113",num:"Unit 113",title:"Phrasal verbs with on and off",
preview:"put on, take off, switch on/off, call off, go on, carry on, get on",
grammar:[
{h:"on/off — continuing or stopping",c:`<table><tr><th>Phrasal verb</th><th>Meaning</th><th>Example</th></tr><tr><td>put on</td><td>wear / switch on</td><td>Put on your jacket.</td></tr><tr><td>take off</td><td>remove / (plane) depart</td><td>Take your shoes off.</td></tr><tr><td>switch/turn on</td><td>start (machine)</td><td>Turn on the TV.</td></tr><tr><td>switch/turn off</td><td>stop (machine)</td><td>Turn off the light.</td></tr><tr><td>call off</td><td>cancel</td><td>They called off the match.</td></tr><tr><td>carry on</td><td>continue</td><td>Carry on — don't stop.</td></tr><tr><td>get on</td><td>have a relationship / board</td><td>Do you get on with him?</td></tr><tr><td>go off</td><td>explode / ring / go bad</td><td>The alarm went off.</td></tr></table>`}
],
quiz:[
{q:"It's cold — _____ your coat.",o:["Put on","Take off","Switch on","Call off"],a:"Put on",h:"wear → put on"},
{q:"The match was _____ because of rain.",o:["called off","turned off","put off","switched off"],a:"called off",h:"cancelled → called off"},
{q:"The alarm _____ at 6am and woke everyone up.",o:["went off","turned off","called off","put off"],a:"went off",h:"rang/activated → went off"},
{q:"Do you _____ well with your colleagues?",o:["get on","go on","carry on","turn on"],a:"get on",h:"have a good relationship → get on"},
]},

{id:"u114",num:"Unit 114",title:"Phrasal verbs with in, away, back",
preview:"come in, go away, come back, pay back, break in, run away, get back",
grammar:[
{h:"in = entering",c:`<table><tr><th>Phrasal verb</th><th>Meaning</th><th>Example</th></tr><tr><td>come in</td><td>enter</td><td>Come in! The door's open.</td></tr><tr><td>break in</td><td>enter by force</td><td>Someone broke in last night.</td></tr><tr><td>join in</td><td>participate</td><td>Everyone joined in the fun.</td></tr><tr><td>plug in</td><td>connect electrically</td><td>Plug in the charger.</td></tr></table>`},
{h:"away & back",c:`<table><tr><th>Phrasal verb</th><th>Meaning</th><th>Example</th></tr><tr><td>go away</td><td>leave / travel</td><td>She went away for a week.</td></tr><tr><td>run away</td><td>escape</td><td>The dog ran away.</td></tr><tr><td>come back</td><td>return</td><td>When will you come back?</td></tr><tr><td>get back</td><td>return / recover</td><td>I got back at midnight.</td></tr><tr><td>pay back</td><td>repay</td><td>I'll pay you back tomorrow.</td></tr><tr><td>look back</td><td>think about the past</td><td>Looking back, I was wrong.</td></tr></table>`}
],
quiz:[
{q:"Thieves _____ and stole the TV.",o:["broke in","came in","went in","joined in"],a:"broke in",h:"entered by force → broke in"},
{q:"I'll _____ you _____ the money I borrowed.",o:["pay/back","give/back","Both are correct","bring/back"],a:"Both are correct",h:"repay → pay back / give back"},
{q:"Please _____ — you can say hello later.",o:["come in","go away","get back","join in"],a:"come in",h:"enter → come in"},
{q:"She _____ on holiday and will _____ next week.",o:["went away/come back","go away/get back","went away/get back","Both a and c"],a:"Both a and c",h:"went away = left; come/get back = return"},
]},

{id:"u115",num:"Unit 115",title:"Phrasal verbs with down",
preview:"turn down, let down, write down, break down, calm down, slow down",
grammar:[
{h:"down = reducing or recording",c:`<table><tr><th>Phrasal verb</th><th>Meaning</th><th>Example</th></tr><tr><td>turn down</td><td>refuse / reduce volume</td><td>She turned down the offer.</td></tr><tr><td>let down</td><td>disappoint</td><td>You really let me down.</td></tr><tr><td>write down</td><td>record on paper</td><td>Write it down before you forget.</td></tr><tr><td>break down</td><td>stop working / collapse emotionally</td><td>My car broke down.</td></tr><tr><td>calm down</td><td>become less upset</td><td>Calm down! It's OK.</td></tr><tr><td>slow down</td><td>go more slowly</td><td>Slow down — you're driving too fast!</td></tr><tr><td>cut down (on)</td><td>reduce</td><td>Cut down on sugar.</td></tr></table>`}
],
quiz:[

{q:"My car _____ on the motorway. I had to call for help.",o:["broke down","let down","slowed down","turned down"],a:"broke down",h:"stopped working → broke down"},

{q:"He promised to come but didn't. He really _____ me _____.",o:["let/down","turned/down","broke/down","cut/down"],a:"let/down",h:"disappointed → let down"},
]},
]},

{id:"art2",label:"Advanced Articles",units:[
{id:"u116",num:"Unit 116",title:"The — places (the cinema, the bank, the sea)",
preview:"I went to the cinema. She's at the hospital. They swam in the sea.",
grammar:[
{h:"the with public places (going there for their purpose)",c:`<span class="hl">the cinema, the theatre, the bank, the post office, the supermarket, the gym, the beach</span><span class="ex">I went to <span class="w">the cinema</span> last night.<br>She's at <span class="w">the bank</span>. &nbsp; I need to go to <span class="w">the supermarket</span>.</span>`},
{h:"the sea / the ocean / the sky / the environment",c:`<span class="ex">We swam in <span class="w">the sea</span>. &nbsp; Look at <span class="w">the sky</span>.<br>We must protect <span class="w">the environment</span>.<br>The ship crossed <span class="w">the Atlantic Ocean</span>.</span>`},
{h:"No the — school / prison / hospital (as institution/concept)",c:`<span class="ex">She's at <span class="hl">school</span>. (= studying there)<br>She's at <span class="hl">the school</span>. (= at the building, maybe visiting)<br>He's in <span class="hl">hospital</span>. (= he's a patient)<br>He's in <span class="hl">the hospital</span>. (= at the building, maybe visiting)</span>`}
],
quiz:[
{q:"I'm going to _____ bank to get some money.",o:["the","a","—","an"],a:"the",h:"Public place → the bank"},
{q:"She's in _____ hospital. She had an accident.",o:["—","the","a","an"],a:"—",h:"As a patient → hospital (no article)"},
{q:"We went for a swim in _____ sea.",o:["the","a","—","some"],a:"the",h:"the sea (unique)"},
{q:"He went to _____ prison for 5 years.",o:["—","the","a","some"],a:"—",h:"As a prisoner/for its purpose → no article"},
]},

{id:"u117",num:"Unit 117",title:"The — nationalities and groups (the French, the young)",
preview:"The French love food. The elderly need care. The rich get richer.",
grammar:[

{h:"the + adjective = group of people",c:`<span class="hl">the rich, the poor, the young, the old/elderly, the unemployed, the disabled, the homeless</span><span class="ex"><span class="w">The rich</span> get richer. &nbsp; We should help <span class="w">the poor</span>.<br><span class="w">The young</span> need opportunities.</span>`},
{h:"These are plural in meaning",c:`<span class="ex">The rich <span class="w">are</span> getting richer. (NOT: the rich is)<br>The homeless <span class="w">need</span> support. (plural verb)</span>`}
],
quiz:[

{q:"The government should do more to help _____.",o:["the homeless","homeless","a homeless","the homeless people"],a:"the homeless",h:"Group of people → the + adjective"},
{q:"_____ often have more free time than workers.",o:["The unemployed","An unemployed","Unemployed people","Both a and c"],a:"Both a and c",h:"the unemployed / unemployed people — both work"},
{q:"_____ (young people) want more job opportunities.",o:["The young","Young","A young","The youngs"],a:"The young",h:"Group → the young (no plural -s)"},
]},

{id:"u118",num:"Unit 118",title:"Names with and without the",
preview:"the Nile, the Alps, the USA — but: Lake Baikal, Mount Everest, Thailand",
grammar:[

{h:"NO the with:",c:`<span class="hl">Countries (most):</span> Thailand, France, Japan, China<br><span class="hl">Cities/towns:</span> Bangkok, London, New York<br><span class="hl">Single mountains:</span> Mount Everest, Mount Fuji<br><span class="hl">Single lakes:</span> Lake Victoria, Lake Baikal<br><span class="hl">Continents:</span> Asia, Europe, Africa`},
{h:"Streets, parks, buildings",c:`No the: Oxford Street, Hyde Park, Bangkok Airport<br>The: the Eiffel Tower, the Taj Mahal (famous buildings)<br>The: the British Museum, the Louvre (museums with 'the')`}
],
quiz:[

{q:"She lives in _____ Japan.",o:["—","the","a","The"],a:"—",h:"Most countries → no article"},
{q:"They climbed _____ Himalayas last year.",o:["the","—","a","The"],a:"the",h:"Mountain ranges → the"},
{q:"He has visited _____ United States twice.",o:["the","—","a","The"],a:"the",h:"United States (plural/group) → the"},
