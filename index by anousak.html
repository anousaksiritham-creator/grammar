<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Essential Grammar in Use — Interactive Learner</title>
<style>
:root{--bg:#0a0a14;--surface:#141428;--card:#1a1a32;--accent:#0f3460;--primary:#e94560;--secondary:#53d8fb;--green:#36d399;--yellow:#fbbd23;--text:#e2e8f0;--muted:#7a8fa6;--r:18px;--shadow:0 8px 32px #00000060}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:-1;
  background:
    radial-gradient(ellipse 60% 50% at 15% 15%,#0f346038 0%,transparent 70%),
    radial-gradient(ellipse 50% 60% at 85% 85%,#e9456025 0%,transparent 70%),
    radial-gradient(ellipse 40% 40% at 50% 50%,#53d8fb08 0%,transparent 60%);
  animation:bgP 10s ease-in-out infinite alternate}
@keyframes bgP{0%{opacity:.7}100%{opacity:1}}

/* ── HEADER ── */
header{text-align:center;padding:56px 24px 28px;background:linear-gradient(180deg,#0f346045 0%,transparent 100%);position:relative}
header h1{font-size:clamp(1.9rem,5vw,3.2rem);font-weight:900;letter-spacing:-1.5px;background:linear-gradient(135deg,var(--secondary) 30%,var(--primary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 20px #53d8fb30)}
header p{color:var(--muted);margin-top:6px;font-size:.95rem;letter-spacing:.3px}
.pb-wrap{max-width:480px;margin:20px auto 0;background:#ffffff12;border-radius:99px;height:10px;overflow:hidden;box-shadow:0 0 0 1px #ffffff08}
.pb{height:100%;background:linear-gradient(90deg,var(--secondary),var(--primary));border-radius:99px;transition:width .7s cubic-bezier(.4,0,.2,1);position:relative}
.pb::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,#ffffff40 50%,transparent 100%);animation:shimmer 2s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
#pt{margin-top:10px;font-size:.82rem;color:var(--muted);letter-spacing:.3px}

/* ── SEARCH ── */
.search-wrap{max-width:400px;margin:20px auto 0;position:relative}
.search-wrap input{width:100%;padding:10px 16px 10px 40px;border-radius:99px;border:1px solid #ffffff15;background:#ffffff08;color:var(--text);font-size:.9rem;outline:none;transition:all .25s;backdrop-filter:blur(4px)}
.search-wrap input:focus{border-color:var(--secondary);background:#ffffff12;box-shadow:0 0 0 3px #53d8fb15}
.search-wrap input::placeholder{color:var(--muted)}
.search-wrap::before{content:'🔍';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:.85rem;pointer-events:none}
.search-results{position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--surface);border:1px solid #ffffff15;border-radius:14px;z-index:200;overflow:hidden;box-shadow:var(--shadow);display:none;max-height:280px;overflow-y:auto}
.search-results.show{display:block}
.sr-item{padding:10px 16px;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:10px;font-size:.88rem}
.sr-item:hover{background:#ffffff08}
.sr-item .sr-num{font-size:.7rem;font-weight:700;color:var(--secondary);min-width:56px}
.sr-item .sr-title{color:var(--text)}

/* ── NAV ── */
nav{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;padding:28px 16px 0;max-width:1100px;margin:0 auto}
.nb{padding:7px 16px;border-radius:99px;border:1px solid #ffffff15;background:var(--surface);color:var(--muted);cursor:pointer;font-size:.8rem;font-weight:600;transition:all .22s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.nb:hover{border-color:var(--secondary);color:var(--secondary);transform:translateY(-2px);background:#53d8fb08}
.nb.active{background:linear-gradient(135deg,var(--primary),#c23356);border-color:var(--primary);color:#fff;box-shadow:0 4px 16px var(--primary)40}
.nb .np{font-size:.68rem;background:#ffffff20;border-radius:99px;padding:1px 7px;font-weight:700}
.nb.active .np{background:#ffffff30}

/* ── MAIN GRID ── */
main{max-width:1000px;margin:0 auto;padding:28px 16px 96px}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.sec-title{font-size:1.35rem;font-weight:800;display:flex;align-items:center;gap:10px}
.sec-title span{width:5px;height:26px;border-radius:3px;background:linear-gradient(180deg,var(--secondary),var(--primary));display:block;flex-shrink:0}
.sec-badge{font-size:.75rem;font-weight:700;padding:4px 12px;border-radius:99px;background:var(--accent);color:var(--secondary)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:14px}
.card{background:var(--card);border:1px solid #ffffff0d;border-radius:var(--r);padding:20px 20px 16px;cursor:pointer;transition:transform .28s cubic-bezier(.4,0,.2,1),box-shadow .28s,border-color .28s;position:relative;overflow:hidden;animation:cardIn .4s both}
@keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--secondary),var(--primary));opacity:0;transition:opacity .25s}
.card::after{content:'';position:absolute;inset:0;border-radius:var(--r);background:radial-gradient(circle at 50% 0%,#53d8fb0a,transparent 70%);opacity:0;transition:opacity .28s}
.card:hover{transform:translateY(-5px);border-color:#53d8fb35;box-shadow:0 16px 48px #00000050}
.card:hover::before{opacity:1}
.card:hover::after{opacity:1}
.card .unum{font-size:.7rem;font-weight:700;color:var(--secondary);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:6px}
.card h3{font-size:.98rem;font-weight:700;margin-bottom:8px;line-height:1.4}
.card p{font-size:.8rem;color:var(--muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:.7rem;font-weight:700;background:#e9456020;color:var(--primary);border:1px solid #e9456030}
.card.done{border-color:#36d39930}
.card.done::before{opacity:1;background:linear-gradient(90deg,var(--green),#20c980)}
.card.done .tag{background:#36d39920;color:var(--green);border-color:#36d39930}
.card-num-pill{font-size:.68rem;color:var(--muted);font-weight:600}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;z-index:100;background:#00000090;backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:linear-gradient(160deg,#1c1c35,#141428);border:1px solid #ffffff12;border-radius:26px;max-width:760px;width:100%;max-height:92vh;overflow-y:auto;padding:36px;transform:translateY(32px) scale(.97);transition:all .38s cubic-bezier(.34,1.56,.64,1);scrollbar-width:thin;scrollbar-color:var(--accent) transparent;box-shadow:0 32px 80px #00000080}
.overlay.open .modal{transform:translateY(0) scale(1)}
.mhead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;gap:16px}
.mhead-left{}
.mhead .unum-m{font-size:.7rem;font-weight:700;color:var(--secondary);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:5px}
.mhead h2{font-size:1.45rem;font-weight:800;line-height:1.3}
.mhead-nav{display:flex;align-items:center;gap:8px;flex-shrink:0}
.mnav-btn{background:var(--card);border:1px solid #ffffff15;color:var(--muted);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:.9rem;transition:all .2s;display:flex;align-items:center;justify-content:center}
.mnav-btn:hover{border-color:var(--secondary);color:var(--secondary)}
.x{background:#ffffff0a;border:1px solid #ffffff15;color:var(--muted);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:1rem;transition:all .2s;display:flex;align-items:center;justify-content:center}
.x:hover{background:var(--primary);border-color:var(--primary);color:#fff}

/* ── TABS ── */
.ltabs{display:flex;gap:4px;background:#0a0a14;border-radius:14px;padding:4px;margin-bottom:24px;border:1px solid #ffffff08}
.ltab{flex:1;padding:9px;text-align:center;border-radius:11px;border:none;cursor:pointer;font-size:.84rem;font-weight:600;background:none;color:var(--muted);transition:all .22s}
.ltab.active{background:linear-gradient(135deg,var(--accent),#1a4a7a);color:var(--secondary);box-shadow:0 2px 8px #0f346060}

/* ── GRAMMAR BOXES ── */
.tp{display:none}
.tp.active{display:block;animation:fup .32s cubic-bezier(.4,0,.2,1)}
@keyframes fup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.gbox{background:var(--card);border-radius:14px;padding:20px;margin-bottom:14px;border:1px solid #ffffff0a;border-left:3px solid var(--secondary);transition:border-color .2s}
.gbox:hover{border-left-color:var(--primary)}
.gbox h4{color:var(--secondary);font-size:.73rem;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.gbox h4::before{content:'';display:block;width:6px;height:6px;border-radius:50%;background:var(--secondary);flex-shrink:0}
.rule{font-size:.92rem;line-height:1.8;color:var(--text)}
.hl{color:var(--secondary);font-weight:700}
.ex{display:block;margin-top:10px;padding:10px 14px;background:#ffffff07;border-radius:10px;font-style:italic;color:var(--yellow);border-left:2px solid var(--yellow)40;line-height:1.7}
.ex .w{font-style:normal;font-weight:700;color:var(--primary)}
table{width:100%;border-collapse:collapse;margin:12px 0;font-size:.84rem;border-radius:10px;overflow:hidden}
table th{background:#0f3460;padding:9px 12px;text-align:left;font-size:.71rem;text-transform:uppercase;letter-spacing:.6px;color:var(--secondary)}
table td{padding:9px 12px;border-bottom:1px solid #ffffff08;transition:background .15s}
table tr:hover td{background:#ffffff04}
table tr:last-child td{border-bottom:none}

/* ── QUIZ ── */
.qsec h3{font-size:1.05rem;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:8px;color:var(--text)}
.qsec h3::before{content:'';display:block;width:4px;height:18px;border-radius:2px;background:linear-gradient(180deg,var(--secondary),var(--primary))}
.qi{background:var(--card);border-radius:14px;padding:18px;margin-bottom:12px;border:1px solid #ffffff0d;transition:border-color .2s}
.qi.answered{border-color:#ffffff18}
.qi .qn{font-size:.7rem;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:.5px}
.qi .qt{font-size:.92rem;margin-bottom:14px;line-height:1.6;font-weight:500}
.opts{display:flex;flex-wrap:wrap;gap:8px}
.ob{padding:8px 18px;border-radius:10px;border:1px solid #ffffff18;background:#ffffff05;color:var(--text);cursor:pointer;font-size:.84rem;transition:all .2s;font-weight:500}
.ob:hover:not(:disabled){border-color:var(--secondary);color:var(--secondary);background:#53d8fb0a;transform:translateY(-1px)}
.ob.correct{background:#36d39922;border-color:var(--green);color:var(--green);font-weight:700}
.ob.wrong{background:#e9456018;border-color:var(--primary);color:var(--primary)}
.ob:disabled{cursor:default}
.fb{margin-top:10px;font-size:.82rem;font-weight:600;display:none;padding:6px 10px;border-radius:8px}
.fb.show{display:block;animation:fup .2s}
.fb.ok{color:var(--green);background:#36d39912}
.fb.no{color:#fb9053;background:#fb905312}

/* ── SCORE ── */
.sdis{text-align:center;padding:24px;background:linear-gradient(135deg,var(--card),#1c1c3a);border-radius:16px;margin-top:20px;display:none;border:1px solid #ffffff0d}
.sdis.show{display:block;animation:fup .4s}
.sdis .bs{font-size:3.5rem;font-weight:900;background:linear-gradient(135deg,var(--secondary),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1}
.sdis .score-label{color:var(--muted);font-size:.9rem;margin-top:4px;margin-bottom:8px}
.sdis .score-msg{font-size:1.1rem;font-weight:700;color:var(--text)}

/* ── BUTTONS ── */
.btn-row{display:flex;gap:10px;margin-top:24px}
.cbtn{flex:1;padding:14px;border-radius:14px;border:none;cursor:pointer;font-size:.95rem;font-weight:700;background:linear-gradient(135deg,var(--secondary),var(--primary));color:#fff;transition:all .25s;letter-spacing:.4px}
.cbtn:hover{transform:translateY(-2px);box-shadow:0 10px 30px var(--primary)40}
.cbtn.done-s{background:linear-gradient(135deg,var(--green),#1a9e6d)}
.cbtn-ghost{padding:14px 20px;border-radius:14px;border:1px solid #ffffff20;cursor:pointer;font-size:.95rem;font-weight:700;background:transparent;color:var(--muted);transition:all .25s}
.cbtn-ghost:hover{border-color:var(--secondary);color:var(--secondary)}
.go-quiz-btn{display:block;width:100%;margin-top:18px;padding:12px;border-radius:11px;border:1px solid #53d8fb30;background:#53d8fb0a;color:var(--secondary);font-size:.88rem;font-weight:700;cursor:pointer;transition:all .22s;text-align:center}
.go-quiz-btn:hover{background:#53d8fb18;border-color:var(--secondary)}

/* ── FAB ── */
.fab{position:fixed;bottom:28px;right:28px;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#c23356);border:none;color:#fff;font-size:1.1rem;cursor:pointer;box-shadow:0 4px 20px var(--primary)50;transition:all .25s;z-index:50;display:flex;align-items:center;justify-content:center}
.fab:hover{transform:scale(1.12);box-shadow:0 8px 28px var(--primary)60}
@media(max-width:600px){.modal{padding:20px 16px;border-radius:20px}header{padding:36px 16px 20px}.grid{grid-template-columns:1fr}.btn-row{flex-direction:column}}
</style>
</head>
<body>
<header>
  <h1>Essential Grammar in Use</h1>
  <p>Interactive Grammar Learner &mdash; 145 Units</p>
  <div class="pb-wrap"><div class="pb" id="pb" style="width:0%"></div></div>
  <p id="pt">0 / 145 units completed</p>
  <div class="search-wrap" style="position:relative">
    <input type="text" id="srch" placeholder="Search units... (e.g. passive, conditionals)" oninput="doSearch(this.value)" onblur="setTimeout(()=>closeSR(),200)" autocomplete="off">
    <div class="search-results" id="sr"></div>
  </div>
</header>
<nav id="nav"></nav>
<main id="app"></main>
<button class="fab" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top">↑</button>
<div class="overlay" id="ov" onclick="ovClick(event)">
  <div class="modal" id="mod"></div>
</div>

<script>
const S=[
// ══════════════════════════════════════════
// SECTION 1 — PRESENT TENSES
// ══════════════════════════════════════════
{id:"pres",label:"Present Tenses",units:[
{id:"u1",num:"Unit 1",title:"am / is / are",
preview:"I am a student. She is happy. They are friends.",
grammar:[
{h:"Positive",c:`<span class="hl">I</span> am (I'm) &nbsp;|&nbsp; <span class="hl">he/she/it</span> is (he's/she's/it's) &nbsp;|&nbsp; <span class="hl">you/we/they</span> are (you're/we're/they're)<span class="ex"><span class="w">I'm</span> a student. &nbsp; <span class="w">She's</span> a doctor. &nbsp; <span class="w">They're</span> from Thailand.</span>`},
{h:"Negative",c:`<span class="hl">am not / isn't / aren't</span><span class="ex"><span class="w">I'm not</span> tired. &nbsp; <span class="w">He isn't</span> tall. &nbsp; <span class="w">We aren't</span> late.</span>`},
{h:"Questions",c:`<span class="hl">Am I? / Is he/she/it? / Are you/we/they?</span><span class="ex"><span class="w">Are you</span> a student? — Yes, I am. / No, I'm not.<br><span class="w">Is she</span> at home? — Yes, she is. / No, she isn't.</span>`},
{h:"Short answers",c:`<table><tr><th>Question</th><th>Yes</th><th>No</th></tr><tr><td>Are you...?</td><td>Yes, I <b>am</b>.</td><td>No, I'm <b>not</b>.</td></tr><tr><td>Is he/she...?</td><td>Yes, he/she <b>is</b>.</td><td>No, he/she <b>isn't</b>.</td></tr><tr><td>Are they...?</td><td>Yes, they <b>are</b>.</td><td>No, they <b>aren't</b>.</td></tr></table>`}
],
quiz:[
{q:"_____ she a doctor?",o:["Am","Is","Are","Be"],a:"Is",h:"She → is"},
{q:"I _____ not hungry.",o:["am","is","are","be"],a:"am",h:"I → am"},
{q:"They _____ from Japan.",o:["am","is","are","be"],a:"are",h:"They → are"},
{q:"_____ you tired? — Yes, I _____.",o:["Are / am","Is / am","Am / are","Are / is"],a:"Are / am",h:"You → are; I → am"},
]},

{id:"u2",num:"Unit 2",title:"am/is/are — Questions & Negatives",
preview:"Are you happy? I'm not angry. Where is she?",
grammar:[
{h:"Making questions — put am/is/are BEFORE the subject",c:`<span class="ex">She <span class="w">is</span> tired. → <span class="w">Is she</span> tired?<br>They <span class="w">are</span> at home. → <span class="w">Are they</span> at home?<br><span class="w">Where is</span> he? &nbsp; <span class="w">What is</span> your name? &nbsp; <span class="w">How old are</span> you?</span>`},
{h:"Negative — am not / isn't / aren't",c:`<span class="ex"><span class="w">I'm not</span> ready. &nbsp; <span class="w">He isn't</span> American. &nbsp; <span class="w">They aren't</span> here.<br>Note: there is no <b>amn't</b> in English.</span>`},
{h:"What / Where / Who / How + am/is/are",c:`<table><tr><th>Question word</th><th>Example</th></tr><tr><td>What is...?</td><td>What is your job?</td></tr><tr><td>Where are...?</td><td>Where are your keys?</td></tr><tr><td>Who is...?</td><td>Who is that man?</td></tr><tr><td>How old is...?</td><td>How old is she?</td></tr></table>`}
],
quiz:[
{q:"_____ your parents at home?",o:["Is","Are","Am","Be"],a:"Are",h:"parents → are"},
{q:"Where _____ my keys?",o:["are","is","am","be"],a:"are",h:"keys (plural) → are"},
{q:"She _____ not ready yet.",o:["is","are","am","isn't"],a:"is",h:"She is not = she isn't"},
{q:"How old _____ your brother?",o:["is","are","am","be"],a:"is",h:"brother (singular) → is"},
]},

{id:"u3",num:"Unit 3",title:"Present Continuous — I am doing",
preview:"I am reading now. She is cooking. They are playing.",
grammar:[
{h:"Form: am/is/are + verb-ing",c:`<span class="ex"><span class="w">I'm reading</span> a book right now.<br><span class="w">She's cooking</span> dinner at the moment.<br><span class="w">They're watching</span> TV.</span>`},
{h:"When to use",c:`• Something happening <span class="hl">right now</span><br>• Something happening <span class="hl">around now</span> (temporary)<span class="ex">Look! It <span class="w">is raining</span>!<br>I <span class="w">am learning</span> English this year. (around now)</span>`},
{h:"Spelling -ing",c:`• Most verbs: add <span class="hl">-ing</span> → work→working, read→reading<br>• End in -e: drop e + <span class="hl">-ing</span> → come→coming, write→writing<br>• Short (vowel+consonant): double → run→<span class="hl">running</span>, sit→<span class="hl">sitting</span>, swim→<span class="hl">swimming</span>`},
{h:"Negative & Question",c:`Negative: <span class="hl">I'm not / isn't / aren't</span> + -ing<br>Question: <span class="hl">Am/Is/Are</span> + subject + -ing?<span class="ex"><span class="w">He isn't sleeping</span>. He's working.<br><span class="w">Are you listening</span> to me? — Yes, I am.</span>`}
],
quiz:[
{q:"Look! The baby _____ (cry).",o:["cries","is crying","are crying","cry"],a:"is crying",h:"Right now → present continuous; baby → is"},
{q:"I _____ (not/watch) TV. I'm reading.",o:["don't watch","am not watching","isn't watching","not watching"],a:"am not watching",h:"I + am not + -ing"},
{q:"_____ they _____ (play) football now?",o:["Are/playing","Is/playing","Do/play","Are/play"],a:"Are/playing",h:"They → Are + playing"},
{q:"She _____ (sit) at her desk.",o:["sit","sits","is sitting","are sitting"],a:"is sitting",h:"She + is + sit→sitting (double t)"},
]},

{id:"u4",num:"Unit 4",title:"Present Continuous — Questions & Negatives",
preview:"Are you working? She isn't sleeping. What are they doing?",
grammar:[
{h:"Yes/No Questions",c:`<span class="hl">Am/Is/Are</span> + subject + verb-ing?<span class="ex"><span class="w">Are you working</span> now? — Yes, I am. / No, I'm not.<br><span class="w">Is she sleeping</span>? — No, she isn't. She's reading.</span>`},
{h:"Wh- Questions",c:`<span class="hl">What / Where / Why / Who</span> + am/is/are + subject + -ing?<span class="ex"><span class="w">What are you doing?</span> — I'm making coffee.<br><span class="w">Where is he going?</span> — He's going to the market.<br><span class="w">Why are they laughing?</span> — Because it's funny.</span>`},
{h:"Negatives",c:`<span class="hl">I'm not / he isn't / she isn't / we/they aren't</span> + -ing<span class="ex"><span class="w">I'm not working</span> today. I'm on holiday.<br><span class="w">They aren't coming</span> to the party.</span>`}
],
quiz:[
{q:"What _____ you _____ (do)?",o:["are/doing","is/doing","am/doing","do/do"],a:"are/doing",h:"You → are + doing"},
{q:"She _____ (not/listen) to me.",o:["isn't listening","aren't listening","not listening","doesn't listen"],a:"isn't listening",h:"She + isn't + -ing"},
{q:"_____ he _____ (come) with us?",o:["Is/coming","Are/coming","Am/coming","Does/come"],a:"Is/coming",h:"He → Is + coming"},
{q:"Why _____ they _____ (laugh)?",o:["are/laughing","is/laughing","do/laugh","are/laugh"],a:"are/laughing",h:"They → are + laughing"},
]},

{id:"u5",num:"Unit 5",title:"Present Simple — I do",
preview:"I work every day. She likes coffee. They live in Bangkok.",
grammar:[
{h:"Form",c:`I/you/we/they <span class="hl">work</span> &nbsp;|&nbsp; he/she/it <span class="hl">works</span> (add -s or -es)<span class="ex"><span class="w">I work</span> in an office. &nbsp; <span class="w">She works</span> in a hospital.<br>He <span class="w">watches</span> TV every evening. &nbsp; She <span class="w">studies</span> hard.</span>`},
{h:"When to use",c:`• <span class="hl">Habits / routines</span> (things done regularly)<br>• <span class="hl">Facts</span> (always true)<br>Key words: <span class="hl">always, usually, often, sometimes, never, every day</span><span class="ex">I <span class="w">always drink</span> coffee in the morning. (habit)<br>The sun <span class="w">rises</span> in the east. (fact)</span>`},
{h:"-s/-es spelling rules",c:`• Most verbs: add <span class="hl">-s</span> → work→works, like→likes<br>• End in -o/-ch/-sh/-ss/-x: add <span class="hl">-es</span> → go→goes, watch→watches<br>• End in consonant+y: change y→i + <span class="hl">-es</span> → study→studies, carry→carries<br>• Irregular: have→<span class="hl">has</span>, be→<span class="hl">is</span>`},
{h:"Time expressions",c:`<span class="hl">every day/week/morning, always, usually, often, sometimes, rarely, never, on Mondays, twice a week</span>`}
],
quiz:[
{q:"She _____ (study) English every evening.",o:["study","studies","is studying","studied"],a:"studies",h:"She → consonant+y → studies"},
{q:"He _____ (not/like) cold weather.",o:["doesn't like","don't like","isn't liking","not like"],a:"doesn't like",h:"He → doesn't + base verb"},
{q:"_____ they _____ (live) in Bangkok?",o:["Do/live","Does/live","Are/living","Do/lives"],a:"Do/live",h:"They → Do + base verb"},
{q:"Water _____ (boil) at 100°C.",o:["boils","boil","is boiling","boiled"],a:"boils",h:"Fact → simple; water (it) → boils"},
]},

{id:"u6",num:"Unit 6",title:"Present Simple — Negatives & Questions",
preview:"I don't like spicy food. Does she work here? What do you want?",
grammar:[
{h:"Negative: don't / doesn't + base verb",c:`I/you/we/they <span class="hl">don't</span> + verb &nbsp;|&nbsp; he/she/it <span class="hl">doesn't</span> + verb<span class="ex"><span class="w">I don't like</span> spicy food.<br><span class="w">She doesn't eat</span> meat. (NOT: she doesn't eats)</span>`},
{h:"Question: Do / Does + subject + base verb?",c:`<span class="ex"><span class="w">Do you</span> speak English? — Yes, I do. / No, I don't.<br><span class="w">Does he</span> live here? — Yes, he does. / No, he doesn't.</span>`},
{h:"Wh- Questions",c:`<span class="hl">What / Where / When / Why / Who / How</span> + do/does + subject + base verb?<span class="ex"><span class="w">Where do you live?</span> — I live in Chiang Mai.<br><span class="w">What does she do?</span> — She's a nurse.<br><span class="w">How often do you exercise?</span> — Three times a week.</span>`}
],
quiz:[
{q:"She _____ (not/know) the answer.",o:["doesn't know","don't know","isn't knowing","not know"],a:"doesn't know",h:"She → doesn't + base verb (not: doesn't knows)"},
{q:"_____ he _____ (speak) French?",o:["Does/speak","Do/speaks","Is/speaking","Does/speaks"],a:"Does/speak",h:"He → Does; base verb (no -s)"},
{q:"What time _____ you _____ (start) work?",o:["do/start","does/start","are/starting","do/starts"],a:"do/start",h:"You → do + base verb"},
{q:"I _____ (not/understand) this.",o:["don't understand","doesn't understand","am not understanding","not understand"],a:"don't understand",h:"I → don't + base verb"},
]},

{id:"u7",num:"Unit 7",title:"Present Continuous vs. Present Simple",
preview:"I'm eating now (not always). I eat rice every day (habit).",
grammar:[
{h:"Key difference",c:`<span class="hl">Present Continuous</span> = happening NOW or around now (temporary)<br><span class="hl">Present Simple</span> = habit, routine, always true (permanent)<span class="ex">I <span class="w">am drinking</span> coffee now. (right now)<br>I <span class="w">drink</span> coffee every morning. (habit)</span>`},
{h:"Comparison",c:`<table><tr><th>Situation</th><th>Tense</th><th>Example</th></tr><tr><td>Right now</td><td>Continuous</td><td>She is sleeping.</td></tr><tr><td>Every day</td><td>Simple</td><td>She sleeps at 10pm.</td></tr><tr><td>This week (temporary)</td><td>Continuous</td><td>I'm staying at a hotel.</td></tr><tr><td>Always (permanent)</td><td>Simple</td><td>I live in Bangkok.</td></tr></table>`},
{h:"Stative verbs — NEVER use continuous!",c:`<span class="hl">like, love, hate, want, need, know, understand, believe, have (possess), see, hear, remember, forget</span><span class="ex">✗ I am liking this song. &nbsp; ✓ I <span class="w">like</span> this song.<br>✗ She is knowing the answer. &nbsp; ✓ She <span class="w">knows</span> the answer.</span>`}
],
quiz:[
{q:"I _____ (read) a great book this week.",o:["am reading","read","reads","reading"],a:"am reading",h:"This week = temporary → continuous"},
{q:"She _____ (not/understand) the question.",o:["doesn't understand","isn't understanding","not understand","don't understand"],a:"doesn't understand",h:"understand = stative verb → simple"},
{q:"Look! It _____ (snow)!",o:["is snowing","snows","snowed","snow"],a:"is snowing",h:"Look! = right now → continuous"},
{q:"I _____ (love) Thai food.",o:["love","am loving","loves","is loving"],a:"love",h:"love = stative → no -ing"},
]},

{id:"u8",num:"Unit 8",title:"have got",
preview:"I've got a car. Have you got a pen? She hasn't got any money.",
grammar:[
{h:"Form: have/has got",c:`<span class="hl">I/you/we/they have got</span> (I've got) &nbsp;|&nbsp; <span class="hl">he/she/it has got</span> (he's got)<span class="ex"><span class="w">I've got</span> two sisters. &nbsp; <span class="w">She's got</span> blue eyes.<br><span class="w">They've got</span> a beautiful house.</span>`},
{h:"Meaning",c:`<span class="hl">have got</span> = <span class="hl">have</span> (possession, relationships, characteristics)<span class="ex">I've got a headache. = I <span class="w">have</span> a headache.<br>He's got brown hair. = He <span class="w">has</span> brown hair.</span>`},
{h:"Negative & Question",c:`Negative: <span class="hl">haven't got / hasn't got</span><br>Question: <span class="hl">Have you got...? / Has she got...?</span><span class="ex"><span class="w">Have you got</span> a pen? — Yes, I have. / No, I haven't.<br><span class="w">She hasn't got</span> any money.</span>`},
{h:"British vs American English",c:`British: <span class="hl">I've got</span> a car. &nbsp; Have you <span class="hl">got</span> a car?<br>American: I <span class="hl">have</span> a car. &nbsp; Do you <span class="hl">have</span> a car?<br>Both are correct!`}
],
quiz:[
{q:"She _____ got long hair.",o:["has","have","is","are"],a:"has",h:"She → has got"},
{q:"_____ you got a minute?",o:["Have","Has","Do","Are"],a:"Have",h:"You → Have you got?"},
{q:"They _____ got any problems.",o:["haven't","hasn't","don't have","aren't"],a:"haven't",h:"They → haven't got"},
{q:"He _____ got a new job!",o:["has","have","is","got"],a:"has",h:"He → has got"},
]},
]},

// ══════════════════════════════════════════
// SECTION 2 — PAST TENSES
// ══════════════════════════════════════════
{id:"past",label:"Past Tenses",units:[
{id:"u9",num:"Unit 9",title:"was / were",
preview:"I was tired. They were at home. Was she happy?",
grammar:[
{h:"Forms",c:`<span class="hl">I / he / she / it</span> → <span class="hl">was</span><br><span class="hl">you / we / they</span> → <span class="hl">were</span><span class="ex"><span class="w">I was</span> at school yesterday. &nbsp; <span class="w">She was</span> very happy.<br><span class="w">They were</span> tired. &nbsp; <span class="w">We were</span> at the cinema.</span>`},
{h:"Negative: wasn't / weren't",c:`<span class="ex"><span class="w">He wasn't</span> at the party.<br><span class="w">We weren't</span> ready. &nbsp; <span class="w">I wasn't</span> hungry.</span>`},
{h:"Questions",c:`<span class="hl">Was</span> I/he/she/it...? &nbsp;|&nbsp; <span class="hl">Were</span> you/we/they...?<span class="ex"><span class="w">Were you</span> at home last night? — Yes, I was. / No, I wasn't.<br><span class="w">Was it</span> cold? — Yes, it was.</span>`},
{h:"Common time expressions",c:`<span class="hl">yesterday, last night/week/month/year, in 2020, ago, when I was young</span>`}
],
quiz:[
{q:"She _____ very happy yesterday.",o:["was","were","is","am"],a:"was",h:"She → was"},
{q:"We _____ at the cinema last night.",o:["were","was","are","be"],a:"were",h:"We → were"},
{q:"_____ it cold this morning?",o:["Was","Were","Is","Be"],a:"Was",h:"It → Was it?"},
{q:"They _____ not ready on time.",o:["weren't","wasn't","aren't","don't"],a:"weren't",h:"They → weren't"},
]},

{id:"u10",num:"Unit 10",title:"Past Simple — Positive",
preview:"I worked yesterday. She went to the market. They ate lunch.",
grammar:[
{h:"Regular verbs: add -ed",c:`work→<span class="hl">worked</span>, play→<span class="hl">played</span>, study→<span class="hl">studied</span>, stop→<span class="hl">stopped</span>, love→<span class="hl">loved</span><span class="ex"><span class="w">I worked</span> late last night. &nbsp; <span class="w">She studied</span> all evening.</span>`},
{h:"Irregular verbs — must memorize",c:`<table><tr><th>Base</th><th>Past</th><th>Base</th><th>Past</th></tr><tr><td>go</td><td><b>went</b></td><td>eat</td><td><b>ate</b></td></tr><tr><td>have</td><td><b>had</b></td><td>see</td><td><b>saw</b></td></tr><tr><td>come</td><td><b>came</b></td><td>buy</td><td><b>bought</b></td></tr><tr><td>get</td><td><b>got</b></td><td>take</td><td><b>took</b></td></tr><tr><td>do</td><td><b>did</b></td><td>say</td><td><b>said</b></td></tr><tr><td>make</td><td><b>made</b></td><td>know</td><td><b>knew</b></td></tr><tr><td>think</td><td><b>thought</b></td><td>give</td><td><b>gave</b></td></tr><tr><td>find</td><td><b>found</b></td><td>tell</td><td><b>told</b></td></tr><tr><td>meet</td><td><b>met</b></td><td>leave</td><td><b>left</b></td></tr><tr><td>put</td><td><b>put</b></td><td>read</td><td><b>read*</b></td></tr></table>*read (past) = same spelling, different pronunciation /rɛd/`},
{h:"Time expressions",c:`<span class="hl">yesterday, last night/week/year, ago, in 2020, when I was young, this morning</span>`}
],
quiz:[
{q:"She _____ (go) to the market yesterday.",o:["went","goed","goes","go"],a:"went",h:"go → went (irregular)"},
{q:"He _____ (buy) a new phone last week.",o:["bought","buyed","buys","buy"],a:"bought",h:"buy → bought (irregular)"},
{q:"I _____ (study) all night.",o:["studied","studyed","study","was study"],a:"studied",h:"study → consonant+y → studied"},
{q:"They _____ (meet) at the airport.",o:["met","meeted","meet","meets"],a:"met",h:"meet → met (irregular)"},
]},

{id:"u11",num:"Unit 11",title:"Past Simple — Negatives & Questions",
preview:"I didn't go. Did you see the film? Where did she work?",
grammar:[
{h:"Negative: didn't + base verb",c:`<span class="hl">didn't</span> (= did not) + base verb (same for ALL subjects)<span class="ex"><span class="w">I didn't go</span> to the party. (NOT: I didn't went)<br><span class="w">She didn't eat</span> breakfast. &nbsp; <span class="w">They didn't come</span>.</span>`},
{h:"Question: Did + subject + base verb?",c:`<span class="ex"><span class="w">Did you see</span> the film? — Yes, I did. / No, I didn't.<br><span class="w">Did she call</span> you? — No, she didn't.</span>`},
{h:"Wh- Questions",c:`<span class="hl">What/Where/When/Who/Why/How</span> + did + subject + base verb?<span class="ex"><span class="w">Where did you go</span> last night?<br><span class="w">What did she say?</span> &nbsp; <span class="w">Why did they leave</span> early?</span>`},
{h:"Careful! Don't use -ed with didn't",c:`✗ I didn't <b>went</b>. &nbsp; ✗ She didn't <b>worked</b>.<br>✓ I didn't <span class="hl">go</span>. &nbsp; ✓ She didn't <span class="hl">work</span>.`}
],
quiz:[
{q:"I _____ (not/watch) the game last night.",o:["didn't watch","don't watch","didn't watched","wasn't watch"],a:"didn't watch",h:"didn't + base verb (no -ed)"},
{q:"_____ you _____ (enjoy) the meal?",o:["Did/enjoy","Do/enjoyed","Did/enjoyed","Was/enjoying"],a:"Did/enjoy",h:"Did + base verb"},
{q:"She _____ (not/know) the answer.",o:["didn't know","doesn't know","didn't knew","not know"],a:"didn't know",h:"didn't + base verb"},
{q:"Where _____ he _____ (go) yesterday?",o:["did/go","did/went","does/go","was/go"],a:"did/go",h:"did + base verb (not: went)"},
]},

{id:"u12",num:"Unit 12",title:"I used to...",
preview:"I used to play football. She used to live in Paris. I didn't use to like coffee.",
grammar:[
{h:"Form: used to + base verb",c:`<span class="hl">used to</span> + base verb (same for ALL subjects)<span class="ex">I <span class="w">used to play</span> football when I was young. (but not now)<br>She <span class="w">used to live</span> in Paris. (but she doesn't live there now)</span>`},
{h:"Meaning",c:`<span class="hl">used to</span> = something happened regularly in the past but NOT anymore<span class="ex">I <span class="w">used to smoke</span>, but I stopped three years ago.<br>He <span class="w">used to be</span> very shy.</span>`},
{h:"Negative & Question",c:`Negative: <span class="hl">didn't use to</span> (NOT: didn't used to)<br>Question: <span class="hl">Did you use to</span>...?<span class="ex"><span class="w">I didn't use to</span> like vegetables, but I do now.<br><span class="w">Did you use to</span> watch this programme? — Yes, I did.</span>`},
{h:"used to vs. past simple",c:`<span class="hl">used to</span> = repeated past habit (over a period)<br><span class="hl">past simple</span> = a specific event in the past<span class="ex">I <span class="w">used to play</span> tennis. (= often, for years)<br>I <span class="w">played</span> tennis yesterday. (= one event)</span>`}
],
quiz:[
{q:"She _____ (live) in London, but she moved to Bangkok.",o:["used to live","uses to live","use to live","is used to live"],a:"used to live",h:"Past habit, no longer → used to + base verb"},
{q:"I _____ (not/like) coffee, but now I love it.",o:["didn't use to like","didn't used to like","don't use to like","wasn't use to like"],a:"didn't use to like",h:"didn't use to + base verb"},
{q:"_____ you _____ (walk) to school?",o:["Did/use to walk","Did/used to walk","Do/use to walk","Were/used to walk"],a:"Did/use to walk",h:"Question: Did + subject + use to?"},
{q:"He _____ (be) very thin when he was young.",o:["used to be","use to be","was used to be","used to was"],a:"used to be",h:"used to + base verb (be)"},
]},

{id:"u13",num:"Unit 13",title:"Past Continuous — I was doing",
preview:"I was reading when she called. They were playing football at 3pm.",
grammar:[
{h:"Form: was/were + verb-ing",c:`<span class="hl">I/he/she/it was</span> + -ing &nbsp;|&nbsp; <span class="hl">you/we/they were</span> + -ing<span class="ex"><span class="w">I was reading</span> at 8pm last night.<br><span class="w">They were watching</span> TV when I arrived.</span>`},
{h:"When to use",c:`• Action <span class="hl">in progress at a point in the past</span><br>• Longer action <span class="hl">interrupted</span> by a shorter one<span class="ex">I <span class="w">was walking</span> home <span class="hl">when</span> it started to rain.<br><span class="hl">While</span> she <span class="w">was cooking</span>, the phone rang.</span>`},
{h:"Negative & Question",c:`Negative: <span class="hl">wasn't / weren't</span> + -ing<br>Question: <span class="hl">Was/Were</span> + subject + -ing?<span class="ex"><span class="w">He wasn't sleeping</span>. He was working.<br><span class="w">Were you listening</span>? — Yes, I was.</span>`}
],
quiz:[
{q:"I _____ (sleep) when you called.",o:["was sleeping","slept","were sleeping","am sleeping"],a:"was sleeping",h:"I + was + sleeping"},
{q:"They _____ (play) football at 4pm.",o:["were playing","was playing","played","are playing"],a:"were playing",h:"They → were + playing"},
{q:"While she _____ (read), the lights went out.",o:["was reading","read","were reading","reads"],a:"was reading",h:"She + was + reading (longer action)"},
{q:"What _____ you _____ (do) at 10 last night?",o:["were/doing","was/doing","did/do","are/doing"],a:"were/doing",h:"You → were"},
]},

{id:"u14",num:"Unit 14",title:"Past Continuous vs. Past Simple",
preview:"I was watching TV when the phone rang. She fell while she was running.",
grammar:[
{h:"The pattern",c:`<span class="hl">Past Continuous</span> (longer background action) + <span class="hl">when/while</span> + <span class="hl">Past Simple</span> (short event)<span class="ex">I <span class="w">was having</span> dinner <span class="hl">when</span> he <span class="w">arrived</span>.<br>She <span class="w">fell</span> <span class="hl">while</span> she <span class="w">was running</span>.</span>`},
{h:"Comparison",c:`<table><tr><th>Past Continuous</th><th>Past Simple</th></tr><tr><td>longer action (in progress)</td><td>short completed action / interruption</td></tr><tr><td>I was sleeping...</td><td>...when the alarm rang.</td></tr><tr><td>She was talking...</td><td>...when he came in.</td></tr></table>`},
{h:"Two simultaneous long actions → while + continuous",c:`<span class="ex">I <span class="w">was cooking</span> while she <span class="w">was setting</span> the table.<br><span class="w">While</span> it <span class="w">was raining</span>, we <span class="w">were watching</span> a film.</span>`}
],
quiz:[
{q:"I _____ (read) when he _____ (knock) on the door.",o:["was reading/knocked","read/was knocking","was reading/was knocking","read/knocked"],a:"was reading/knocked",h:"Longer action (was reading) interrupted by short action (knocked)"},
{q:"She _____ (break) her leg while she _____ (ski).",o:["broke/was skiing","was breaking/skied","broke/skied","was breaking/was skiing"],a:"broke/was skiing",h:"Short event (broke) happened during longer action (was skiing)"},
{q:"They _____ (play) cards when the electricity _____ (go) off.",o:["were playing/went","played/was going","were playing/was going","played/went"],a:"were playing/went",h:"Continuous background + simple interruption"},
{q:"While I _____ (wait), I _____ (read) a magazine.",o:["was waiting/read","waited/was reading","was waiting/was reading","waited/read"],a:"was waiting/read",h:"While + continuous is fine; read = simple completed action OR both continuous work here"},
]},
]},
