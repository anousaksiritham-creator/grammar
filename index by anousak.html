// SECTION 12 — ADJECTIVES & ADVERBS
// ══════════════════════════════════════════
{id:"adj",label:"Adjectives & Adverbs",units:[
{id:"u51",num:"Unit 51",title:"Adjectives",
preview:"a beautiful day, an old man, She seems happy, The food tastes good.",
grammar:[
{h:"Position of adjectives",c:`• BEFORE a noun: <span class="hl">a beautiful</span> day, an <span class="hl">old</span> man, a <span class="hl">blue</span> car<br>• AFTER be/seem/look/feel/taste/smell/sound:<span class="ex">She <span class="w">seems happy</span>. &nbsp; The food <span class="w">tastes good</span>. &nbsp; He <span class="w">looks tired</span>.</span>`},
{h:"Order of multiple adjectives",c:`Opinion → Size → Age → Shape → Colour → Origin → Material<span class="ex">a <span class="w">beautiful big old round green French wooden</span> table<br>(in practice, use 2-3 at most)</span>`},
{h:"Adjectives — no plural form",c:`Adjectives in English do NOT change for plural:<span class="ex">✗ She is talls. &nbsp; ✗ They are beautifuls.<br>✓ She is <span class="w">tall</span>. &nbsp; ✓ They are <span class="w">beautiful</span>.</span>`},
{h:"Adjectives vs. adverbs",c:`<span class="hl">Adjective</span> → describes a noun: a <span class="hl">fast</span> car<br><span class="hl">Adverb</span> → describes a verb: He drives <span class="hl">fast</span><span class="ex">She is a <span class="w">careful</span> driver. (adjective → describes driver)<br>She drives <span class="w">carefully</span>. (adverb → describes how she drives)</span>`}
],
quiz:[
{q:"She has _____ hair. (long, black, beautiful — which order?)",o:["beautiful long black","long beautiful black","black long beautiful","beautiful black long"],a:"beautiful long black",h:"Opinion → Size → Colour"},
{q:"The soup _____ delicious.",o:["tastes","taste","is tasting","tasted"],a:"tastes",h:"taste + adjective (not adverb)"},
{q:"She looks _____. Is she OK?",o:["tired","tiredly","tiresome","tiring"],a:"tired",h:"After look → adjective (not adverb)"},
{q:"He is a _____ player.",o:["good","well","goodly","best"],a:"good",h:"Adjective before noun → good (not well)"},
]},

{id:"u52",num:"Unit 52",title:"Adverbs — quickly, well, hard, fast",
preview:"She runs quickly. He plays well. They work hard. Drive carefully!",
grammar:[
{h:"Forming adverbs: adjective + -ly",c:`quick → <span class="hl">quickly</span>, slow → <span class="hl">slowly</span>, careful → <span class="hl">carefully</span>, happy → <span class="hl">happily</span>, easy → <span class="hl">easily</span><span class="ex">She <span class="w">speaks clearly</span>. &nbsp; Drive <span class="w">carefully</span>!</span>`},
{h:"Irregular adverbs",c:`<table><tr><th>Adjective</th><th>Adverb</th></tr><tr><td>good</td><td><b>well</b></td></tr><tr><td>fast</td><td><b>fast</b> (no -ly)</td></tr><tr><td>hard</td><td><b>hard</b> (no -ly)</td></tr><tr><td>early</td><td><b>early</b> (no change)</td></tr><tr><td>late</td><td><b>late</b> (no change)</td></tr></table>`},
{h:"hard vs. hardly / late vs. lately / near vs. nearly",c:`<span class="hl">hard</span> = with effort | <span class="hl">hardly</span> = almost not<br><span class="hl">late</span> = not on time | <span class="hl">lately</span> = recently<span class="ex">She works <span class="w">hard</span>. (a lot) &nbsp; She <span class="w">hardly</span> works. (almost nothing)<br>He arrived <span class="w">late</span>. &nbsp; I haven't seen him <span class="w">lately</span>. (recently)</span>`},
{h:"Position: after verb / before adjective",c:`<span class="ex">She sings <span class="w">beautifully</span>. (after verb)<br>It's <span class="w">very</span> hot today. (before adjective)<br>I'm <span class="w">really</span> tired.</span>`}
],
quiz:[
{q:"She plays the piano _____.",o:["well","good","goodly","nicely good"],a:"well",h:"good → well (irregular adverb)"},
{q:"He ran _____ and won the race.",o:["fast","fastly","quick","fastily"],a:"fast",h:"fast is both adjective and adverb — no -ly"},
{q:"I've been working very _____ lately.",o:["hard","hardly","harder","hardness"],a:"hard",h:"with effort → hard (not hardly)"},
{q:"Please drive _____. The road is wet.",o:["carefully","careful","careless","good"],a:"carefully",h:"careful → carefully (adjective + -ly)"},
]},

{id:"u53",num:"Unit 53",title:"Comparatives — older, more expensive",
preview:"She is taller than me. This is more interesting than that.",
grammar:[
{h:"Short adjectives — add -er",c:`old→<span class="hl">older</span>, tall→<span class="hl">taller</span>, fast→<span class="hl">faster</span>, big→<span class="hl">bigger</span>, hot→<span class="hl">hotter</span>, happy→<span class="hl">happier</span><span class="ex">He is <span class="w">taller</span> than his brother.<br>This car is <span class="w">faster</span> than that one.</span>`},
{h:"Long adjectives — more...",c:`beautiful→<span class="hl">more beautiful</span>, expensive→<span class="hl">more expensive</span>, interesting→<span class="hl">more interesting</span><span class="ex">This hotel is <span class="w">more expensive</span> than that one.<br>The book was <span class="w">more interesting</span> than the film.</span>`},
{h:"Irregular comparatives",c:`<table><tr><th>Adjective</th><th>Comparative</th></tr><tr><td>good</td><td><b>better</b></td></tr><tr><td>bad</td><td><b>worse</b></td></tr><tr><td>far</td><td><b>farther/further</b></td></tr><tr><td>little</td><td><b>less</b></td></tr><tr><td>many/much</td><td><b>more</b></td></tr></table>`},
{h:"as ... as (equal comparison)",c:`<span class="hl">as + adjective + as</span> = the same degree<span class="ex">She is <span class="w">as tall as</span> her sister. &nbsp; This is <span class="w">not as expensive as</span> I thought.</span>`}
],
quiz:[
{q:"This exam is _____ (difficult) than the last one.",o:["more difficult","difficulter","most difficult","much difficult"],a:"more difficult",h:"Long adjective → more difficult"},
{q:"My results are _____ (bad) than before.",o:["worse","more bad","badder","worst"],a:"worse",h:"bad → worse (irregular)"},
{q:"She is _____ (good) at maths than her brother.",o:["better","more good","gooder","best"],a:"better",h:"good → better (irregular)"},
{q:"Bangkok is _____ hot _____ London.",o:["as/as","more/than","much/as","so/as"],a:"as/as",h:"Equal comparison: as ... as"},
]},

{id:"u54",num:"Unit 54",title:"Superlatives — the oldest, the most expensive",
preview:"She is the tallest in the class. This is the best film I've seen.",
grammar:[
{h:"Short adjectives — the ...-est",c:`old→<span class="hl">the oldest</span>, tall→<span class="hl">the tallest</span>, big→<span class="hl">the biggest</span>, happy→<span class="hl">the happiest</span><span class="ex">She is <span class="w">the tallest</span> student in the class.<br>This is <span class="w">the cheapest</span> restaurant in town.</span>`},
{h:"Long adjectives — the most...",c:`beautiful→<span class="hl">the most beautiful</span>, expensive→<span class="hl">the most expensive</span><span class="ex">This is <span class="w">the most interesting</span> book I've ever read.</span>`},
{h:"Irregular superlatives",c:`<table><tr><th>Adjective</th><th>Superlative</th></tr><tr><td>good</td><td><b>the best</b></td></tr><tr><td>bad</td><td><b>the worst</b></td></tr><tr><td>far</td><td><b>the farthest/furthest</b></td></tr></table>`},
{h:"Superlative + present perfect",c:`<span class="ex">This is <span class="w">the best</span> meal I <span class="w">have ever eaten</span>.<br>That was <span class="w">the worst</span> film I <span class="w">have ever seen</span>.</span>`}
],
quiz:[
{q:"This is _____ (expensive) hotel in the city.",o:["the most expensive","the expensivest","most expensive","the more expensive"],a:"the most expensive",h:"Long adjective → the most..."},
{q:"She's _____ (smart) student in the class.",o:["the smartest","the most smart","smarter","the smarter"],a:"the smartest",h:"Short adjective → the ...-est"},
{q:"That was _____ (bad) film I've ever seen.",o:["the worst","the most bad","the baddest","worst"],a:"the worst",h:"bad → the worst (irregular)"},
{q:"This is _____ (good) pizza I've ever tasted.",o:["the best","the goodest","the most good","better"],a:"the best",h:"good → the best (irregular)"},
]},

{id:"u55",num:"Unit 55",title:"too / enough / very",
preview:"It's too hot to work. She's old enough to drive. He's very tall.",
grammar:[
{h:"very — makes meaning stronger",c:`<span class="hl">very</span> + adjective/adverb<span class="ex">It's <span class="w">very</span> hot today. &nbsp; She runs <span class="w">very</span> fast.</span>`},
{h:"too — more than needed (negative idea)",c:`<span class="hl">too</span> + adjective/adverb (= more than is good)<span class="ex">It's <span class="w">too</span> hot to work. (I can't work — it's too hot.)<br>He speaks <span class="w">too</span> fast. (I can't understand him.)<br>This bag is <span class="w">too</span> heavy for me to carry.</span>`},
{h:"enough — the right amount",c:`adjective + <span class="hl">enough</span> / <span class="hl">enough</span> + noun<span class="ex">She is old <span class="w">enough</span> to drive. (= she has reached the age)<br>I don't have <span class="w">enough</span> money. &nbsp; Is it warm <span class="w">enough</span>?</span>`},
{h:"too vs. very",c:`<span class="hl">very</span> = intensifier (can be positive or neutral)<br><span class="hl">too</span> = problematic, more than desired<span class="ex">The coffee is <span class="w">very</span> hot. (it's hot — maybe I like it)<br>The coffee is <span class="w">too</span> hot. (I can't drink it yet)</span>`}
],
quiz:[
{q:"This coffee is _____ hot to drink right now.",o:["too","very","enough","so"],a:"too",h:"Can't drink = problem → too"},
{q:"She's _____ old enough to vote.",o:["Not quite — 'old enough' only (no 'very')","very","too","much"],a:"Not quite — 'old enough' only (no 'very')",h:"enough follows the adjective: old enough"},
{q:"I don't have _____ time to finish this.",o:["enough","too","very","much"],a:"enough",h:"enough + noun or adjective + enough"},
{q:"The film was _____ long. I fell asleep.",o:["too","very","enough","so"],a:"too",h:"Problem (fell asleep) → too long"},
]},
]},

// ══════════════════════════════════════════
// SECTION 13 — CONJUNCTIONS
// ══════════════════════════════════════════
{id:"conj",label:"Conjunctions",units:[
{id:"u56",num:"Unit 56",title:"and / but / or / so / because",
preview:"I like tea and coffee. It's cold but sunny. I was tired so I slept.",
grammar:[
{h:"and — adding information",c:`<span class="ex">I like tea <span class="w">and</span> coffee.<br>She is smart <span class="w">and</span> hardworking.<br>He came home <span class="w">and</span> went to bed.</span>`},
{h:"but — contrasting ideas",c:`<span class="ex">It's cold <span class="w">but</span> sunny.<br>I wanted to go <span class="w">but</span> I was tired.<br>She speaks English well <span class="w">but</span> she makes mistakes.</span>`},
{h:"or — alternatives",c:`<span class="ex">Do you want tea <span class="w">or</span> coffee?<br>Hurry up, <span class="w">or</span> you'll miss the bus.<br>You can stay here <span class="w">or</span> come with us.</span>`},
{h:"so — result / because — reason",c:`<span class="hl">so</span> = result (what happened because of something)<br><span class="hl">because</span> = reason (why something happened)<span class="ex">I was tired, <span class="w">so</span> I went to bed early. (result)<br>I went to bed early <span class="w">because</span> I was tired. (reason)</span>`}
],
quiz:[
{q:"I was hungry _____ I ate a big meal.",o:["so","but","or","and"],a:"so",h:"Result → so"},
{q:"I was hungry _____ I hadn't eaten all day.",o:["because","so","but","or"],a:"because",h:"Reason → because"},
{q:"She studied hard _____ she passed the exam.",o:["and/so","but","or","nor"],a:"and/so",h:"Result chain: studied → and/so → passed"},
{q:"Hurry up _____ you'll miss the train!",o:["or","and","but","so"],a:"or",h:"Alternative (threat/warning) → or"},
]},

{id:"u57",num:"Unit 57",title:"when / while / before / after / until / as soon as",
preview:"Call me when you arrive. Wait until I come. I'll leave after she comes.",
grammar:[
{h:"when — at the time that",c:`<span class="ex">Call me <span class="w">when</span> you arrive.<br><span class="w">When</span> I was young, I lived in the countryside.<br>I'll cook dinner <span class="w">when</span> I get home.</span>`},
{h:"while — during the time that (two simultaneous actions)",c:`<span class="ex"><span class="w">While</span> I was cooking, she was watching TV.<br>I listened to music <span class="w">while</span> I was running.</span>`},
{h:"before / after",c:`<span class="ex">Call me <span class="w">before</span> you leave. &nbsp; I'll rest <span class="w">after</span> I finish.<br>She checked her email <span class="w">before</span> going to bed.</span>`},
{h:"until / as soon as",c:`<span class="hl">until</span> = up to a point in time<br><span class="hl">as soon as</span> = immediately when<span class="ex">Wait <span class="w">until</span> I come back. &nbsp; I'll call you <span class="w">as soon as</span> I arrive.</span>`}
],
quiz:[
{q:"I'll text you _____ I get there.",o:["as soon as","until","while","since"],a:"as soon as",h:"Immediately when → as soon as"},
{q:"She studied _____ midnight.",o:["until","while","when","before"],a:"until",h:"Up to a point in time → until"},
{q:"_____ she was cooking, he was setting the table.",o:["While","When","Before","After"],a:"While",h:"Two simultaneous actions → while"},
{q:"Brush your teeth _____ you go to bed.",o:["before","after","while","until"],a:"before",h:"Action happens first → before"},
]},

{id:"u58",num:"Unit 58",title:"although / though / even though / however",
preview:"Although it was raining, we went out. It was cold; however, we enjoyed it.",
grammar:[
{h:"although / though / even though — concession",c:`<span class="hl">although / even though / though</span> + clause = despite the fact that<span class="ex"><span class="w">Although</span> it was raining, we went out.<br>I liked the film <span class="w">even though</span> it was long.<br><span class="w">Though</span> she was tired, she kept working.</span>`},
{h:"even though = stronger than although",c:`<span class="hl">even though</span> expresses more surprise or contrast<span class="ex">He went to work <span class="w">even though</span> he was very sick. (surprising!)</span>`},
{h:"however / nevertheless — linking sentences",c:`<span class="hl">however</span> (= but, contrasting) comes at the start of a new sentence with a semicolon or full stop<span class="ex">It was very cold. <span class="w">However</span>, we enjoyed the trip.<br>She worked hard; <span class="w">however</span>, she didn't pass the exam.</span>`},
{h:"despite / in spite of + noun/-ing (not + clause)",c:`<span class="ex"><span class="w">Despite</span> the rain, we went out. (NOT: despite it rained)<br><span class="w">In spite of</span> being tired, she continued.<br>= <span class="w">Although</span> it rained / she was tired...</span>`}
],
quiz:[
{q:"_____ it was cold, we had a great time.",o:["Although","Despite","However","Because"],a:"Although",h:"Concession + clause → although"},
{q:"I liked the book. _____, the ending was disappointing.",o:["However","Although","Despite","Because"],a:"However",h:"Contrast between sentences → however"},
{q:"He went to work _____ he was ill.",o:["even though","despite","however","so"],a:"even though",h:"Surprising contrast + clause → even though"},
{q:"_____ the traffic, she arrived on time.",o:["Despite","Although","However","Even though"],a:"Despite",h:"Despite + noun (not a clause) → despite"},
]},
]},

// ══════════════════════════════════════════
// SECTION 14 — PREPOSITIONS
// ══════════════════════════════════════════
{id:"prep",label:"Prepositions",units:[
{id:"u59",num:"Unit 59",title:"at / on / in — Time",
preview:"at 5pm, on Monday, in January, in the morning, at night",
grammar:[
{h:"AT — specific times & fixed expressions",c:`<span class="hl">at</span> + clock time, specific time, special expressions<span class="ex">at <span class="w">5 o'clock</span>, at <span class="w">midnight</span>, at <span class="w">noon</span><br>at <span class="w">the weekend</span>, at <span class="w">Christmas</span>, at <span class="w">night</span>, at <span class="w">the moment</span></span>`},
{h:"ON — days & dates",c:`<span class="hl">on</span> + days of the week, specific dates<span class="ex">on <span class="w">Monday</span>, on <span class="w">Friday morning</span><br>on <span class="w">15 June</span>, on <span class="w">my birthday</span>, on <span class="w">New Year's Day</span></span>`},
{h:"IN — months, years, seasons, longer periods",c:`<span class="hl">in</span> + months, years, seasons, times of day<span class="ex">in <span class="w">January</span>, in <span class="w">2024</span>, in <span class="w">summer</span><br>in <span class="w">the morning</span>, in <span class="w">the evening</span>, in <span class="w">the 21st century</span></span>`},
{h:"Quick guide",c:`<table><tr><th>at</th><th>on</th><th>in</th></tr><tr><td>at 3pm</td><td>on Monday</td><td>in March</td></tr><tr><td>at midnight</td><td>on 5th June</td><td>in 2025</td></tr><tr><td>at night</td><td>on my birthday</td><td>in winter</td></tr><tr><td>at Christmas</td><td>on Tuesday morning</td><td>in the morning</td></tr></table>`}
],
quiz:[
{q:"I'll see you _____ Friday.",o:["on","at","in","-"],a:"on",h:"Days of the week → on"},
{q:"She was born _____ 1998.",o:["in","on","at","-"],a:"in",h:"Years → in"},
{q:"The meeting is _____ 3 o'clock.",o:["at","in","on","-"],a:"at",h:"Clock times → at"},
{q:"I love going for walks _____ the evening.",o:["in","at","on","-"],a:"in",h:"Times of day → in"},
]},

{id:"u60",num:"Unit 60",title:"at / on / in — Place",
preview:"at the station, on the table, in the box, in London, on the wall",
grammar:[
{h:"AT — a specific point or location",c:`<span class="hl">at</span> = a point / place<span class="ex">at <span class="w">the bus stop</span>, at <span class="w">the door</span>, at <span class="w">school</span><br>at <span class="w">home</span>, at <span class="w">work</span>, at <span class="w">the airport</span>, at <span class="w">the top</span></span>`},
{h:"ON — a surface (horizontal or vertical)",c:`<span class="hl">on</span> = touching a surface<span class="ex">on <span class="w">the table</span>, on <span class="w">the wall</span>, on <span class="w">the floor</span><br>on <span class="w">the left/right</span>, on <span class="w">page 10</span>, on <span class="w">the first floor</span></span>`},
{h:"IN — inside an enclosed space / area",c:`<span class="hl">in</span> = inside / within<span class="ex">in <span class="w">the box</span>, in <span class="w">the room</span>, in <span class="w">Bangkok</span><br>in <span class="w">Thailand</span>, in <span class="w">the photo</span>, in <span class="w">bed</span>, in <span class="w">the car</span></span>`},
{h:"Common confusions",c:`<table><tr><th>at</th><th>on</th><th>in</th></tr><tr><td>at the station</td><td>on the platform</td><td>in the train</td></tr><tr><td>at the top of the page</td><td>on page 10</td><td>in the book</td></tr><tr><td>at school (concept)</td><td>on the school ground</td><td>in the classroom</td></tr></table>`}
],
quiz:[
{q:"The keys are _____ the table.",o:["on","in","at","-"],a:"on",h:"Surface → on"},
{q:"I live _____ Bangkok.",o:["in","at","on","-"],a:"in",h:"Cities → in"},
{q:"She's waiting _____ the bus stop.",o:["at","on","in","-"],a:"at",h:"Specific point → at"},
{q:"He put the letter _____ the envelope.",o:["in","on","at","-"],a:"in",h:"Inside enclosed space → in"},
]},

{id:"u61",num:"Unit 61",title:"to / in / into / at — movement & position",
preview:"I'm going to school. Come in! She walked into the room. I'm at school.",
grammar:[
{h:"to — direction/destination (movement toward)",c:`<span class="hl">to</span> = movement toward a destination<span class="ex">I'm going <span class="w">to</span> school. &nbsp; She walked <span class="w">to</span> the door.<br>Come <span class="w">to</span> my party. &nbsp; He flew <span class="w">to</span> Tokyo.</span>`},
{h:"into — movement from outside to inside",c:`<span class="hl">into</span> = movement that enters something<span class="ex">She walked <span class="w">into</span> the room. &nbsp; Jump <span class="w">into</span> the pool!<br>Put it <span class="w">into</span> the bag. &nbsp; The car drove <span class="w">into</span> the car park.</span>`},
{h:"at vs. in for location (no movement)",c:`<span class="hl">at</span> = a point &nbsp;|&nbsp; <span class="hl">in</span> = inside an area<span class="ex">I'm <span class="w">at</span> school. (= at the location of school)<br>I'm <span class="w">in</span> school. (= inside the building)<br>She's <span class="w">at</span> home. &nbsp; He's <span class="w">in</span> the kitchen.</span>`},
{h:"arrive at vs. arrive in",c:`<span class="hl">arrive at</span> = specific place (station, hotel, building)<br><span class="hl">arrive in</span> = city or country<span class="ex">We <span class="w">arrived at</span> the airport. &nbsp; She <span class="w">arrived in</span> Bangkok.</span>`}
],
quiz:[
{q:"She walked _____ the room and sat down.",o:["into","in","to","at"],a:"into",h:"Movement from outside to inside → into"},
{q:"I'm going _____ the supermarket.",o:["to","into","in","at"],a:"to",h:"Destination → to"},
{q:"They arrived _____ Paris at noon.",o:["in","at","to","into"],a:"in",h:"City → arrive in"},
{q:"He arrived _____ the hotel at midnight.",o:["at","in","to","into"],a:"at",h:"Specific building → arrive at"},
]},

{id:"u62",num:"Unit 62",title:"on / in / at — other uses",
preview:"on TV, on the phone, in the newspaper, at the end, by car",
grammar:[
{h:"on",c:`<span class="hl">on</span> TV / the radio / the phone / the internet / the bus / the train / the plane<span class="ex">I saw it <span class="w">on</span> TV. &nbsp; She's talking <span class="w">on</span> the phone.<br>I read it <span class="w">on</span> the internet. &nbsp; They came <span class="w">on</span> the bus.</span>`},
{h:"in",c:`<span class="hl">in</span> a newspaper / a book / a photo / a queue / the sky / the world<span class="ex">I read it <span class="w">in</span> the newspaper. &nbsp; She's <span class="w">in</span> the photo.<br>There are millions of stars <span class="w">in</span> the sky.</span>`},
{h:"at",c:`<span class="hl">at</span> the end / the beginning / the top / the bottom / the front / the back<span class="ex">There's a note <span class="w">at the end</span> of the chapter.<br>She sits <span class="w">at the front</span> of the class.</span>`}
],
quiz:[
{q:"I saw the news _____ TV.",o:["on","in","at","by"],a:"on",h:"TV/radio/phone → on"},
{q:"I read about it _____ the newspaper.",o:["in","on","at","by"],a:"in",h:"Newspaper/magazine/book → in"},
{q:"There's a summary _____ the end of the chapter.",o:["at","on","in","by"],a:"at",h:"at the end/beginning/top/bottom"},
{q:"She was talking _____ her phone.",o:["on","in","at","by"],a:"on",h:"phone → on"},
]},

{id:"u63",num:"Unit 63",title:"by / with / without / about / for",
preview:"I go by bus. Write with a pen. She left without saying goodbye.",
grammar:[
{h:"by — method of transport / agent",c:`<span class="hl">by</span> + transport (no article): by car/bus/train/plane/bike/foot<br><span class="hl">by</span> + agent in passive: written by Shakespeare<span class="ex">I go to work <span class="w">by</span> bus. &nbsp; She travelled <span class="w">by</span> plane.<br>This was painted <span class="w">by</span> Picasso.</span>`},
{h:"with / without",c:`<span class="hl">with</span> = accompanied by / using<br><span class="hl">without</span> = not accompanied / not using<span class="ex">She came <span class="w">with</span> her friend. &nbsp; Write <span class="w">with</span> a pen.<br>He left <span class="w">without</span> saying goodbye. &nbsp; Coffee <span class="w">without</span> sugar.</span>`},
{h:"about",c:`<span class="hl">about</span> = on the subject of, concerning<span class="ex">Tell me <span class="w">about</span> your holiday. &nbsp; What's this film <span class="w">about</span>?<br>I'm worried <span class="w">about</span> the exam.</span>`},
{h:"for",c:`<span class="hl">for</span> = purpose, duration, recipient<span class="ex">This gift is <span class="w">for</span> you. &nbsp; I've been here <span class="w">for</span> an hour.<br>What's this tool <span class="w">for</span>? (purpose)</span>`}
],
quiz:[
{q:"She goes to work _____ bus.",o:["by","on","with","in"],a:"by",h:"Transport → by (no article)"},
{q:"He left _____ saying goodbye.",o:["without","with","by","about"],a:"without",h:"Not doing something → without + -ing"},
{q:"What are you talking _____?",o:["about","for","with","by"],a:"about",h:"Subject of conversation → about"},
{q:"I bought this _____ you.",o:["for","to","with","by"],a:"for",h:"Recipient → for"},
]},
]},
// ══════════════════════════════════════════
// SECTION 15 — REPORTED SPEECH
// ══════════════════════════════════════════
{id:"rep",label:"Reported Speech",units:[
{id:"u64",num:"Unit 64",title:"Reported Speech — Statements",
preview:"He said he was tired. She told me she liked it. They said they would come.",
grammar:[
{h:"Direct → Reported speech (tense changes)",c:`<table><tr><th>Direct</th><th>Reported</th></tr><tr><td>am/is/are</td><td>was/were</td></tr><tr><td>was/were</td><td>had been</td></tr><tr><td>do/does</td><td>did</td></tr><tr><td>did</td><td>had done</td></tr><tr><td>will</td><td>would</td></tr><tr><td>can</td><td>could</td></tr><tr><td>have/has done</td><td>had done</td></tr></table>`},
{h:"say vs. tell",c:`<span class="hl">say</span> (+ that) — no person needed after say<br><span class="hl">tell</span> + person (+ that)<span class="ex">He <span class="w">said</span> he was hungry. (NOT: said me)<br>She <span class="w">told me</span> she was tired. (tell + person)</span>`},
{h:"Examples",c:`<span class="ex">"I am busy." → He <span class="w">said he was</span> busy.<br>"She likes coffee." → He <span class="w">told me she liked</span> coffee.<br>"I will call you." → She <span class="w">said she would call</span> me.<br>"I can help." → He <span class="w">said he could help</span>.</span>`},
{h:"Time/place changes",c:`<span class="hl">now → then, today → that day, here → there, this → that, tomorrow → the next day, yesterday → the day before</span><span class="ex">"I am coming <span class="w">now</span>." → She said she was coming <span class="w">then</span>.</span>`}
],
quiz:[
{q:'"I am tired." → She said she _____ tired.',o:["was","is","has been","were"],a:"was",h:"am → was in reported speech"},
{q:'"I will help you." → He said he _____ help me.',o:["would","will","could","should"],a:"would",h:"will → would in reported speech"},
{q:'She _____ me she liked the film. (tell)',o:["told","said","tell","says"],a:"told",h:"tell + person → told me"},
{q:'"I can swim." → He said he _____ swim.',o:["could","can","would","should"],a:"could",h:"can → could in reported speech"},
]},

{id:"u65",num:"Unit 65",title:"Reported Speech — Questions & Commands",
preview:"She asked if I was OK. He told me to sit down. She asked where I lived.",
grammar:[
{h:"Reported questions — yes/no (asked if/whether)",c:`<span class="hl">asked if / asked whether</span> + subject + verb (normal word order, NO question mark)<span class="ex">"Are you OK?" → She <span class="w">asked if I was</span> OK.<br>"Do you like it?" → He <span class="w">asked whether I liked</span> it.</span>`},
{h:"Reported questions — wh-questions",c:`<span class="hl">asked + question word</span> + subject + verb<span class="ex">"Where do you live?" → She <span class="w">asked where I lived</span>.<br>"What time is it?" → He <span class="w">asked what time it was</span>.</span>`},
{h:"Reported commands (tell/ask + to-infinitive)",c:`<span class="hl">told + person + to</span> + base verb<br><span class="hl">asked + person + to</span> + base verb<span class="ex">"Sit down!" → She <span class="w">told me to sit</span> down.<br>"Please help me." → He <span class="w">asked me to help</span> him.<br>"Don't touch that!" → She <span class="w">told him not to touch</span> it.</span>`}
],
quiz:[
{q:'"Are you hungry?" → She asked _____ I _____ hungry.',o:["if / was","if / am","whether / is","that / was"],a:"if / was",h:"Yes/no question → asked if + subject + past verb"},
{q:'"Where do you work?" → He asked _____ I _____.',o:["where / worked","where / work","if / worked","what / worked"],a:"where / worked",h:"Wh-question → asked where + subject + past verb"},
{q:'"Sit down!" → She told me _____ down.',o:["to sit","sit","sitting","that sit"],a:"to sit",h:"Command → told + person + to + base verb"},
{q:'"Don\'t open the door." → He told her _____ the door.',o:["not to open","to not open","not open","don't open"],a:"not to open",h:"Negative command → told + person + not to + base verb"},
]},
]},

// ══════════════════════════════════════════
// SECTION 16 — RELATIVE CLAUSES
// ══════════════════════════════════════════
{id:"rel",label:"Relative Clauses",units:[
{id:"u66",num:"Unit 66",title:"Relative Clauses — who / which / that",
preview:"The man who called is my uncle. The book which I bought was great.",
grammar:[
{h:"who — for people",c:`<span class="hl">who</span> = referring to a person<span class="ex">The man <span class="w">who called</span> is my uncle.<br>I know the woman <span class="w">who lives</span> next door.<br>She is the teacher <span class="w">who helped</span> me most.</span>`},
{h:"which — for things/animals",c:`<span class="hl">which</span> = referring to a thing or animal<span class="ex">The book <span class="w">which I bought</span> was excellent.<br>The car <span class="w">which was parked</span> outside has gone.</span>`},
{h:"that — for people OR things (informal)",c:`<span class="hl">that</span> = can replace who or which (common in spoken English)<span class="ex">The man <span class="w">that called</span> is my uncle.<br>The book <span class="w">that I bought</span> was great.</span>`},
{h:"When you can omit the relative pronoun",c:`Omit who/which/that when it is the OBJECT of the clause (not the subject):<span class="ex">The book <span class="w">that I bought</span> → The book I bought. (that = object → can omit)<br>The man <span class="w">who called</span> me. (who = subject → cannot omit)</span>`}
],
quiz:[
{q:"The woman _____ works here is very kind.",o:["who","which","what","where"],a:"who",h:"Referring to a person → who"},
{q:"The film _____ we watched last night was amazing.",o:["which","who","what","when"],a:"which",h:"Referring to a thing → which"},
{q:"Is this the bag _____ you lost?",o:["that","who","what","when"],a:"that",h:"Object of clause — that (or which) for things"},
{q:"She's the doctor _____ treated me.",o:["who","which","where","what"],a:"who",h:"Person → who"},
]},

{id:"u67",num:"Unit 67",title:"Relative Clauses — whose / where / when",
preview:"The man whose car was stolen. The place where I grew up. The day when we met.",
grammar:[
{h:"whose — possession",c:`<span class="hl">whose</span> = of whom / of which (possessive relative pronoun)<span class="ex">The man <span class="w">whose car was stolen</span> was very upset.<br>She's the student <span class="w">whose essay</span> won the prize.<br>The company <span class="w">whose products</span> I use is based in Japan.</span>`},
{h:"where — places",c:`<span class="hl">where</span> = in which / at which (for places)<span class="ex">That's the restaurant <span class="w">where we had</span> our first date.<br>The town <span class="w">where I grew up</span> is very small.<br>This is the room <span class="w">where it happened</span>.</span>`},
{h:"when — time",c:`<span class="hl">when</span> = at which / on which (for times)<span class="ex">I remember the day <span class="w">when we met</span>.<br>The year <span class="w">when she was born</span> was 1990.<br>There are times <span class="w">when I just want</span> to be alone.</span>`}
],
quiz:[
{q:"That's the man _____ daughter won the competition.",o:["whose","who","which","where"],a:"whose",h:"Possession → whose"},
{q:"Bangkok is the city _____ I was born.",o:["where","when","which","who"],a:"where",h:"Place → where"},
{q:"Do you remember the day _____ we first met?",o:["when","where","which","who"],a:"when",h:"Time → when"},
{q:"She's the author _____ books I love.",o:["whose","who","which","that"],a:"whose",h:"Possessive → whose books"},
]},

{id:"u68",num:"Unit 68",title:"Defining vs. Non-defining Relative Clauses",
preview:"The man who called me is my boss. (defining) My boss, who called me, is nice. (non-defining)",
grammar:[
{h:"Defining relative clause — NO commas",c:`Identifies WHICH person/thing we mean (essential info):<span class="ex">The woman <span class="w">who lives next door</span> is a doctor. (= which woman? the one next door)<br>The book <span class="w">that I borrowed</span> was excellent.</span>`},
{h:"Non-defining relative clause — WITH commas",c:`Adds EXTRA information (not essential to identify):<span class="ex">My sister, <span class="w">who lives in London</span>, is visiting next week. (we already know which sister)<br>The Eiffel Tower, <span class="w">which was built in 1889</span>, attracts millions of visitors.</span>`},
{h:"Key differences",c:`<table><tr><th>Defining</th><th>Non-defining</th></tr><tr><td>No commas</td><td>Commas required</td></tr><tr><td>can use that</td><td>cannot use that</td></tr><tr><td>can omit pronoun</td><td>cannot omit pronoun</td></tr><tr><td>essential information</td><td>extra/bonus information</td></tr></table>`}
],
quiz:[
{q:"Students _____ work hard usually succeed. (which type — defining or non-defining?)",o:["Defining (no commas — which students?)","Non-defining (extra info)","Neither","Both"],a:"Defining (no commas — which students?)",h:"Identifies which students → defining, no commas"},
{q:"My car, _____ I bought last year, broke down.",o:["which","that","who","whose"],a:"which",h:"Non-defining (commas used) → which (not that)"},
{q:"The hotel _____ we stayed was beautiful.",o:["where","which","that","whose"],a:"where",h:"Place → where (or: that we stayed at)"},
{q:"Shakespeare, _____ wrote Hamlet, was born in 1564.",o:["who","which","whose","that"],a:"who",h:"Non-defining, person → who (not that)"},
]},
]},

// ══════════════════════════════════════════
// SECTION 17 — SPECIAL STRUCTURES
// ══════════════════════════════════════════
{id:"spec",label:"Special Structures",units:[
{id:"u69",num:"Unit 69",title:"so / such",
preview:"It was so cold! She's such a nice person. So many people! Such good food!",
grammar:[
{h:"so + adjective/adverb",c:`<span class="hl">so</span> + adjective or adverb (= very, to a great degree)<span class="ex">It was <span class="w">so</span> cold! &nbsp; She speaks <span class="w">so</span> fast.<br>He is <span class="w">so</span> kind. &nbsp; I was <span class="w">so</span> tired that I fell asleep.</span>`},
{h:"such + (a/an) + noun",c:`<span class="hl">such a/an</span> + singular countable noun<br><span class="hl">such</span> + uncountable or plural noun<span class="ex">She's <span class="w">such a</span> nice person!<br>It was <span class="w">such</span> good food! &nbsp; They were <span class="w">such</span> kind people!</span>`},
{h:"so ... that / such ... that (result)",c:`<span class="ex">It was <span class="w">so</span> cold <span class="hl">that</span> we stayed inside.<br>She's <span class="w">such a</span> good cook <span class="hl">that</span> everyone loves her food.</span>`},
{h:"so many/much vs. such a lot of",c:`<span class="hl">so many</span> + countable plural / <span class="hl">so much</span> + uncountable<span class="ex">There were <span class="w">so many</span> people there!<br>I have <span class="w">so much</span> work to do.<br>= <span class="w">such a lot of</span> people / work</span>`}
],
quiz:[
{q:"The film was _____ boring that I fell asleep.",o:["so","such","such a","very so"],a:"so",h:"so + adjective"},
{q:"It was _____ lovely day!",o:["such a","so","such","so a"],a:"such a",h:"such a + singular countable noun"},
{q:"She speaks _____ quickly that I can't understand her.",o:["so","such","such a","very"],a:"so",h:"so + adverb"},
{q:"There were _____ people that we couldn't get a seat.",o:["so many","such many","so much","such a"],a:"so many",h:"so many + countable plural noun"},
]},

{id:"u70",num:"Unit 70",title:"have something done",
preview:"I had my hair cut. She's having her car repaired. Get your eyes tested.",
grammar:[
{h:"Form: have + object + past participle",c:`<span class="hl">have</span> + object + past participle (someone does it FOR you / on your behalf)<span class="ex">I <span class="w">had my hair cut</span>. (= someone cut it for me)<br>She <span class="w">is having her car repaired</span>. (a mechanic is doing it)<br>He <span class="w">had his photo taken</span>.</span>`},
{h:"Tense — changes 'have'",c:`<table><tr><th>Tense</th><th>Example</th></tr><tr><td>Present</td><td>I have my car cleaned every week.</td></tr><tr><td>Past</td><td>She had her nails done yesterday.</td></tr><tr><td>Future</td><td>I'm going to have my eyes tested.</td></tr><tr><td>Continuous</td><td>He is having his house painted.</td></tr></table>`},
{h:"get something done (informal)",c:`<span class="hl">get</span> + object + past participle (informal alternative)<span class="ex">I need to <span class="w">get my hair cut</span>.<br>She <span class="w">got her bike fixed</span>. &nbsp; When did you last <span class="w">get your eyes tested</span>?</span>`}
],
quiz:[
{q:"She _____ her nails _____ at the salon yesterday.",o:["had/done","has/done","did/done","made/done"],a:"had/done",h:"Past: had + object + past participle"},
{q:"I need to _____ my car _____. It makes a strange noise.",o:["have/checked","make/checked","do/check","have/check"],a:"have/checked",h:"have + object + past participle"},
{q:"He's _____ his house _____ at the moment.",o:["having/painted","having/paint","getting/paint","making/painted"],a:"having/painted",h:"Present continuous: is having + object + past participle"},
{q:"When did you last _____ your eyes _____?",o:["have/tested","get/tested","Both are correct","have/testing"],a:"Both are correct",h:"have/get + object + past participle — both correct"},
]},

{id:"u71",num:"Unit 71",title:"There is / There are / There was / There were",
preview:"There is a problem. There are many people. There was a fire. Is there a bank near here?",
grammar:[
{h:"there is / there are — present",c:`<span class="hl">There is</span> + singular/uncountable<br><span class="hl">There are</span> + plural<span class="ex"><span class="w">There is</span> a bank near here. &nbsp; <span class="w">There is</span> some milk in the fridge.<br><span class="w">There are</span> 50 students in the class.</span>`},
{h:"there was / there were — past",c:`<span class="ex"><span class="w">There was</span> a fire last night. &nbsp; <span class="w">There were</span> a lot of people at the party.</span>`},
{h:"Negative & Question",c:`<span class="ex">Is <span class="w">there</span> a supermarket nearby? — Yes, there is. / No, there isn't.<br>Are <span class="w">there</span> any seats? — Yes, there are. / No, there aren't.<br><span class="w">There isn't</span> any milk. &nbsp; <span class="w">There aren't</span> any tickets left.</span>`},
{h:"Other tenses",c:`<span class="ex"><span class="w">There will be</span> a meeting tomorrow.<br><span class="w">There has been</span> an accident.<br><span class="w">There might be</span> a problem.</span>`}
],
quiz:[
{q:"_____ a great restaurant near my house.",o:["There is","There are","It is","There was"],a:"There is",h:"Singular → there is"},
{q:"_____ any eggs in the fridge?",o:["Are there","Is there","There are","Do there"],a:"Are there",h:"Plural (eggs) question → Are there"},
{q:"_____ a storm last night.",o:["There was","There were","There is","It was"],a:"There was",h:"Past singular → there was"},
{q:"_____ will _____ a big concert next week.",o:["There/be","It/be","There/is","It/is"],a:"There/be",h:"Future → there will be"},
]},

{id:"u72",num:"Unit 72",title:"It... (It is, It takes, It seems)",
preview:"It's raining. It takes 20 minutes. It seems like a good idea. It's easy to learn.",
grammar:[
{h:"It — weather, time, distance",c:`<span class="hl">It</span> (= no real meaning, just a subject)<span class="ex"><span class="w">It's</span> raining. &nbsp; <span class="w">It's</span> cold today. &nbsp; <span class="w">It's</span> 3 o'clock.<br><span class="w">It's</span> 10km to the city. &nbsp; <span class="w">It takes</span> 30 minutes by bus.</span>`},
{h:"It + adjective + to-infinitive",c:`<span class="ex"><span class="w">It's easy</span> to understand. &nbsp; <span class="w">It's difficult</span> to learn.<br><span class="w">It was nice</span> to meet you. &nbsp; <span class="w">It's important</span> to be honest.</span>`},
{h:"It seems / It appears / It looks like",c:`<span class="ex"><span class="w">It seems</span> like a good idea. &nbsp; <span class="w">It appears</span> there's a problem.<br><span class="w">It looks like</span> it's going to rain.</span>`},
{h:"It vs. There",c:`<table><tr><th>It</th><th>There</th></tr><tr><td>weather, time, distance</td><td>existence of something</td></tr><tr><td>It's cold today.</td><td>There is a problem.</td></tr><tr><td>It takes 10 minutes.</td><td>There are 10 people.</td></tr></table>`}
],
quiz:[
{q:"_____ takes about two hours to drive there.",o:["It","There","This","That"],a:"It",h:"Duration → It takes..."},
{q:"_____ is raining heavily outside.",o:["It","There","This","She"],a:"It",h:"Weather → it"},
{q:"_____ was nice to meet you.",o:["It","There","This","That"],a:"It",h:"It + adjective + to-infinitive"},
{q:"_____ seems like a good plan.",o:["It","There","This","They"],a:"It",h:"It seems... (impression/judgement)"},
]},

{id:"u73",num:"Unit 73",title:"Word Order — Frequency Adverbs",
preview:"I always drink coffee. She never eats meat. He is often late.",
grammar:[
{h:"Position: BEFORE the main verb",c:`<span class="hl">always, usually, often, sometimes, rarely, seldom, never</span> → BEFORE main verb<span class="ex">I <span class="w">always</span> drink coffee in the morning.<br>She <span class="w">never</span> eats meat. &nbsp; He <span class="w">usually</span> arrives early.</span>`},
{h:"Position: AFTER be (am/is/are/was/were)",c:`<span class="ex">He <span class="w">is often</span> late. (NOT: He often is late.)<br>She <span class="w">was always</span> happy. &nbsp; They <span class="w">are rarely</span> here.</span>`},
{h:"Position: AFTER the first auxiliary verb",c:`<span class="ex">I <span class="w">have always</span> liked this song.<br>She <span class="w">will never</span> forget that day.<br>He <span class="w">has never</span> been to Europe.</span>`},
{h:"Frequency expressions (at the end)",c:`<span class="hl">every day, once a week, twice a month, from time to time, most of the time</span><span class="ex">I exercise <span class="w">three times a week</span>.<br>We visit them <span class="w">every month</span>.</span>`}
],
quiz:[
{q:"She _____ eats breakfast. (never)",o:["never eats","eats never","eats not","not eats"],a:"never eats",h:"never → before main verb"},
{q:"He is _____ late for work. (often)",o:["often late","late often","always","often"],a:"often late",h:"After be → is often late"},
{q:"I have _____ been to Paris. (never)",o:["never been","been never","not been","ever been"],a:"never been",h:"After auxiliary have → have never been"},
{q:"She _____ coffee in the morning. (always drink)",o:["always drinks","drinks always","always drink","drink always"],a:"always drinks",h:"before main verb; she → drinks (+ always before)"},
]},

{id:"u74",num:"Unit 74",title:"still / yet / already",
preview:"I'm still waiting. Have you eaten yet? She has already left.",
grammar:[
{h:"still — continuing (longer than expected)",c:`<span class="hl">still</span> = something is continuing (often surprise that it hasn't stopped)<br>Position: before main verb / after be<span class="ex">I'm <span class="w">still</span> waiting! &nbsp; She <span class="w">still</span> works there.<br>Are you <span class="w">still</span> here?</span>`},
{h:"yet — not happened until now (negative/questions)",c:`<span class="hl">yet</span> = up to now (used with present perfect, at end of sentence)<span class="ex">I haven't finished <span class="w">yet</span>. (negative)<br>Have you eaten <span class="w">yet</span>? (question) — Yes, already. / No, not yet.</span>`},
{h:"already — sooner than expected",c:`<span class="hl">already</span> = happened before expected time<br>Position: before past participle / at end<span class="ex">She has <span class="w">already</span> left. &nbsp; I've <span class="w">already</span> seen that film.<br>A: Dinner is ready. B: I know, I've <span class="w">already</span> eaten.</span>`},
{h:"yet vs. already",c:`<table><tr><th>yet</th><th>already</th></tr><tr><td>not happened yet (negative/question)</td><td>happened (sooner than expected)</td></tr><tr><td>Have you eaten yet? / Not yet</td><td>I've already eaten!</td></tr></table>`}
],
quiz:[
{q:"I haven't finished the report _____.",o:["yet","still","already","just"],a:"yet",h:"Not done, negative sentence → yet (end of sentence)"},
{q:"She _____ lives in the same house. (continuing from years ago)",o:["still","yet","already","just"],a:"still",h:"Continuing situation → still (before verb)"},
{q:"A: Do you want to see the film? B: I've _____ seen it.",o:["already","yet","still","just"],a:"already",h:"Happened before you expected → already"},
{q:"Are you _____ working? It's midnight!",o:["still","yet","already","ever"],a:"still",h:"Continuing past expected time → still"},
]},
]},
