{id:"perf",label:"Present Perfect",units:[
{id:"u15",num:"Unit 15",title:"Present Perfect — I have done",
preview:"I have seen that film. She has finished her homework. They've arrived.",
grammar:[
{h:"Form: have/has + past participle",c:`<span class="hl">I/you/we/they have</span> (I've/you've) + p.p.<br><span class="hl">he/she/it has</span> (he's/she's) + p.p.<span class="ex"><span class="w">I've seen</span> that film before. &nbsp; <span class="w">She's finished</span> her homework.<br><span class="w">They've arrived</span>. &nbsp; <span class="w">He's broken</span> his leg.</span>`},
{h:"Common irregular past participles",c:`<table><tr><th>Verb</th><th>Past participle</th><th>Verb</th><th>Past participle</th></tr><tr><td>go</td><td><b>gone</b></td><td>eat</td><td><b>eaten</b></td></tr><tr><td>see</td><td><b>seen</b></td><td>take</td><td><b>taken</b></td></tr><tr><td>do</td><td><b>done</b></td><td>make</td><td><b>made</b></td></tr><tr><td>give</td><td><b>given</b></td><td>break</td><td><b>broken</b></td></tr><tr><td>write</td><td><b>written</b></td><td>buy</td><td><b>bought</b></td></tr></table>`},
{h:"When to use",c:`• Past action with <span class="hl">a result now</span> (exact time NOT important)<br>• Key words: <span class="hl">just, already, yet, recently, before</span><span class="ex">I <span class="w">have just eaten</span>. (I'm not hungry now.)<br>She <span class="w">has already left</span>. (She's not here now.)</span>`},
{h:"Negative & Question",c:`Negative: <span class="hl">haven't / hasn't</span> + p.p.<br>Question: <span class="hl">Have/Has</span> + subject + p.p.?<span class="ex"><span class="w">I haven't finished</span> yet. &nbsp; <span class="w">Has she called</span> you?</span>`}
],
quiz:[
{q:"I _____ (just/finish) my homework.",o:["have just finished","just finished","has just finished","am just finishing"],a:"have just finished",h:"I + have + just + past participle"},
{q:"She _____ (not/arrive) yet.",o:["hasn't arrived","haven't arrived","didn't arrive","not arrived"],a:"hasn't arrived",h:"She → hasn't + past participle"},
{q:"They _____ (live) here since 2020.",o:["have lived","lived","has lived","are living"],a:"have lived",h:"Since → present perfect"},
{q:"He _____ (already/send) the email.",o:["has already sent","already sent","have already sent","already send"],a:"has already sent",h:"He → has; send → sent (p.p.)"},
]},

{id:"u16",num:"Unit 16",title:"Present Perfect — Have you ever...?",
preview:"Have you ever eaten sushi? I've never been to Paris. She's been there twice.",
grammar:[
{h:"ever and never",c:`<span class="hl">Have you ever</span> + p.p.? (= at any time in your life?)<br><span class="hl">never</span> = not at any time<span class="ex"><span class="w">Have you ever</span> eaten sushi? — Yes, I have. / No, I haven't.<br>I <span class="w">have never</span> been to Paris. &nbsp; He's <span class="w">never</span> tried durian.</span>`},
{h:"Talking about number of times",c:`<span class="ex">She <span class="w">has been</span> to Japan <span class="hl">twice</span>.<br>I <span class="w">have seen</span> that film <span class="hl">three times</span>.<br>This is the <span class="hl">first time</span> I <span class="w">have eaten</span> this.</span>`},
{h:"gone vs. been",c:`<span class="hl">has gone to</span> = went and is still there<br><span class="hl">has been to</span> = went and came back<span class="ex">She <span class="w">has gone to</span> Bangkok. (She's there now.)<br>She <span class="w">has been to</span> Bangkok. (She went before, back now.)</span>`}
],
quiz:[
{q:"_____ you ever _____ (eat) durian?",o:["Have/eaten","Has/eaten","Did/eat","Do/eat"],a:"Have/eaten",h:"You → Have; past participle"},
{q:"I _____ (never/be) to Europe.",o:["have never been","never been","has never been","never have been"],a:"have never been",h:"I + have + never + been"},
{q:"He _____ (go) to Tokyo. He's still there.",o:["has gone to","has been to","went to","goes to"],a:"has gone to",h:"Still there → has gone to"},
{q:"This is the first time she _____ (try) Thai food.",o:["has tried","tried","is trying","have tried"],a:"has tried",h:"First time + present perfect"},
]},

{id:"u17",num:"Unit 17",title:"Present Perfect — How long...? for/since",
preview:"I have lived here for 5 years. She has worked there since 2019.",
grammar:[
{h:"How long + Present Perfect",c:`<span class="hl">How long have you</span> lived here? — <span class="hl">For</span> five years.<span class="ex"><span class="w">How long have you</span> known him? — <span class="w">Since</span> school. / <span class="w">For</span> ten years.</span>`},
{h:"for = period of time",c:`<span class="hl">for</span> + length of time<span class="ex">for <span class="w">two hours</span>, for <span class="w">three days</span>, for <span class="w">a week</span>, for <span class="w">six months</span>, for <span class="w">20 years</span>, for <span class="w">a long time</span></span>`},
{h:"since = point in time",c:`<span class="hl">since</span> + starting point<span class="ex">since <span class="w">Monday</span>, since <span class="w">2019</span>, since <span class="w">January</span>, since <span class="w">I was born</span>, since <span class="w">we met</span></span>`},
{h:"Examples",c:`<span class="ex">I <span class="w">have lived</span> here <span class="hl">for</span> 5 years.<br>She <span class="w">has worked</span> there <span class="hl">since</span> 2019.<br>We <span class="w">have been</span> friends <span class="hl">for</span> a long time.</span>`}
],
quiz:[
{q:"I have known her _____ we were children.",o:["since","for","during","ago"],a:"since",h:"since + starting point in time"},
{q:"He has worked here _____ ten years.",o:["for","since","during","ago"],a:"for",h:"for + period of time"},
{q:"How long _____ you _____ (study) English?",o:["have/studied","did/study","are/studying","do/study"],a:"have/studied",h:"How long → present perfect"},
{q:"She has been sick _____ Monday.",o:["since","for","from","during"],a:"since",h:"Monday = starting point → since"},
]},

{id:"u18",num:"Unit 18",title:"for, since, ago",
preview:"ago = before now. for = duration. since = starting point.",
grammar:[
{h:"ago = time before now (past simple)",c:`<span class="hl">ago</span> = how long before now → used with <span class="hl">past simple</span><span class="ex">I met him <span class="w">two years ago</span>. (= 2 years before now)<br>She left <span class="w">an hour ago</span>. &nbsp; He arrived <span class="w">a few minutes ago</span>.</span>`},
{h:"for = period of time (how long)",c:`<span class="hl">for</span> → used with present perfect OR past simple<span class="ex">I <span class="w">have lived</span> here <span class="hl">for</span> 3 years. (still live here)<br>I <span class="w">lived</span> there <span class="hl">for</span> 3 years. (don't live there anymore)</span>`},
{h:"since = starting point → present perfect",c:`<span class="hl">since</span> + point in time → always used with present perfect<span class="ex">I <span class="w">have lived</span> here <span class="hl">since</span> 2020.<br>She <span class="w">hasn't eaten</span> anything <span class="hl">since</span> this morning.</span>`},
{h:"Comparison",c:`<table><tr><th>Word</th><th>Meaning</th><th>Tense</th></tr><tr><td>ago</td><td>5 years before now</td><td>past simple</td></tr><tr><td>for</td><td>a period of time</td><td>perfect or simple</td></tr><tr><td>since</td><td>from a past point until now</td><td>present perfect</td></tr></table>`}
],
quiz:[
{q:"I started this job three years _____.",o:["ago","since","for","before"],a:"ago",h:"= three years before now → ago + past simple"},
{q:"She has been a teacher _____ 2015.",o:["since","for","ago","from"],a:"since",h:"2015 = starting point → since"},
{q:"We've been waiting here _____ two hours.",o:["for","since","ago","during"],a:"for",h:"two hours = period of time → for"},
{q:"He left _____ a few minutes ago / since a few minutes.",o:["a few minutes ago","since a few minutes","for a few minutes","a few minutes since"],a:"a few minutes ago",h:"ago + past simple"},
]},

{id:"u19",num:"Unit 19",title:"Present Perfect vs. Past Simple",
preview:"I have seen that film. (ever) — I saw it last week. (specific time)",
grammar:[
{h:"The key rule",c:`<span class="hl">Present Perfect</span> → no specific time / connection to now<br><span class="hl">Past Simple</span> → specific time in the past<span class="ex"><span class="w">I have seen</span> that film. (at some point; time not important)<br><span class="w">I saw</span> it <span class="hl">last week</span>. (specific time → past simple)</span>`},
{h:"Time words that trigger past simple",c:`<span class="hl">yesterday, last night/week/year, ago, in 2020, when I was young, this morning (if morning is over)</span><span class="ex">She <span class="w">moved</span> here <span class="hl">two years ago</span>. (✓ past simple)<br>✗ She <span class="w">has moved</span> here two years ago.</span>`},
{h:"Time words that trigger present perfect",c:`<span class="hl">just, already, yet, ever, never, recently, since, for, before, this week (if still ongoing)</span><span class="ex">I <span class="w">have just eaten</span>. &nbsp; <span class="w">Have you ever been</span> to Japan?<br>She <span class="w">hasn't called</span> yet.</span>`},
{h:"Questions about experience — always present perfect",c:`<span class="ex"><span class="w">Have you ever</span> tried sushi? — Yes, I <span class="w">tried</span> it in Tokyo last year.</span>`}
],
quiz:[
{q:"I _____ (see) that film. It was great!",o:["have seen","saw","had seen","see"],a:"have seen",h:"No specific time → present perfect"},
{q:"She _____ (move) to Bangkok two years ago.",o:["moved","has moved","had moved","moves"],a:"moved",h:"two years ago = specific time → past simple"},
{q:"_____ you ever _____ (visit) Chiang Mai?",o:["Have/visited","Did/visit","Have/visit","Did/visited"],a:"Have/visited",h:"Ever = experience → present perfect"},
{q:"He _____ (call) me yesterday.",o:["called","has called","have called","calls"],a:"called",h:"yesterday = specific time → past simple"},
]},
]},

// ══════════════════════════════════════════
// SECTION 4 — FUTURE
// ══════════════════════════════════════════
{id:"fut",label:"Future",units:[
{id:"u20",num:"Unit 20",title:"Future — going to",
preview:"I'm going to study tonight. She's going to travel next month.",
grammar:[
{h:"Form: am/is/are + going to + base verb",c:`<span class="ex"><span class="w">I'm going to study</span> tonight.<br><span class="w">She's going to buy</span> a new car.<br><span class="w">They're going to travel</span> to Europe.</span>`},
{h:"When to use",c:`• <span class="hl">Plans / intentions</span> already decided before speaking<br>• <span class="hl">Predictions</span> based on what you can see now (evidence)<span class="ex">Look at those clouds — it <span class="w">is going to rain</span>. (prediction with evidence)<br>I <span class="w">am going to quit</span> my job. (decided plan)</span>`},
{h:"Negative & Question",c:`Negative: <span class="hl">am not / isn't / aren't going to</span><br>Question: <span class="hl">Am/Is/Are</span> + subject + going to + verb?<span class="ex"><span class="w">I'm not going to watch</span> TV tonight.<br><span class="w">Are you going to come</span> to the party?</span>`}
],
quiz:[
{q:"She _____ (travel) to Japan next month.",o:["is going to travel","go to travel","will travels","goes to travel"],a:"is going to travel",h:"She + is going to + base verb"},
{q:"Look! He _____ (fall)!",o:["is going to fall","will fall","goes to fall","fell"],a:"is going to fall",h:"Prediction with visible evidence → going to"},
{q:"I _____ (not/eat) fast food anymore.",o:["am not going to eat","don't going to eat","am not going to eating","won't eating"],a:"am not going to eat",h:"I + am not going to + base verb"},
{q:"_____ they _____ (open) a new branch next year?",o:["Are/going to open","Is/going to open","Do/going to open","Will/go to open"],a:"Are/going to open",h:"They → Are ... going to open?"},
]},

{id:"u21",num:"Unit 21",title:"Future — will / won't",
preview:"I'll help you. It will be sunny tomorrow. She won't come.",
grammar:[
{h:"Form: will + base verb (all subjects)",c:`Short form: <span class="hl">'ll</span> &nbsp;|&nbsp; Negative: <span class="hl">will not = won't</span><span class="ex"><span class="w">I'll call</span> you later. &nbsp; <span class="w">He won't be</span> at the meeting.<br><span class="w">Will they come</span> to the party? — Yes, they will. / No, they won't.</span>`},
{h:"When to use",c:`• <span class="hl">Spontaneous decisions</span> (decided at the moment of speaking)<br>• <span class="hl">Predictions</span> / opinions about the future<br>• <span class="hl">Promises, offers, requests</span><span class="ex">A: There's no milk. B: <span class="w">I'll buy</span> some. (spontaneous)<br>I think it <span class="w">will rain</span> tomorrow. (opinion/prediction)<br>I <span class="w">won't tell</span> anyone. I promise.</span>`},
{h:"will vs. going to",c:`<table><tr><th>will</th><th>going to</th></tr><tr><td>Spontaneous decision</td><td>Pre-planned intention</td></tr><tr><td>"I'll have the soup." (decides now)</td><td>"I'm going to have soup." (decided before)</td></tr><tr><td>Opinion/prediction: I think it will rain.</td><td>Evidence: Look! It's going to rain!</td></tr></table>`}
],
quiz:[
{q:"A: I'm cold. B: I _____ close the window.",o:["will","am going to","go to","going to"],a:"will",h:"Spontaneous decision → will"},
{q:"I think she _____ pass the exam. She studied hard.",o:["will","is going to","goes to","won't"],a:"will",h:"Opinion/prediction → will"},
{q:"He _____ (not/help) us. He's too busy.",o:["won't help","isn't going to help","will not helps","won't helps"],a:"won't help",h:"will not = won't + base verb"},
{q:"I promise I _____ (be) on time.",o:["will be","am going to be","am being","be"],a:"will be",h:"Promise → will"},
]},

{id:"u22",num:"Unit 22",title:"will vs. going to — Review",
preview:"What are you going to do? / Don't worry, I'll help you.",
grammar:[
{h:"Summary",c:`<table><tr><th></th><th>will</th><th>going to</th></tr><tr><td>Decision</td><td>Spontaneous (at the moment)</td><td>Pre-planned (before)</td></tr><tr><td>Prediction</td><td>Opinion/belief</td><td>Based on evidence now</td></tr><tr><td>Form</td><td>will + base</td><td>am/is/are + going to + base</td></tr></table>`},
{h:"Practice",c:`<span class="ex">A: The phone is ringing! B: OK, <span class="w">I'll answer</span> it. (spontaneous)<br>I <span class="w">am going to answer</span> the phone at 8pm. (planned)<br>Look at the sky! It <span class="w">is going to rain</span>. (evidence)<br>I think it <span class="w">will rain</span> tomorrow. (opinion)</span>`},
{h:"Other future expressions",c:`• <span class="hl">Present Continuous</span> = fixed future arrangement: I <span class="hl">am meeting</span> her at 7.<br>• <span class="hl">Present Simple</span> = timetable: The train <span class="hl">leaves</span> at 9am.<span class="ex">I <span class="w">am flying</span> to London next week. (arrangement)<br>The show <span class="w">starts</span> at 8pm. (timetable)</span>`}
],
quiz:[
{q:"A: We have no bread! B: OK, I _____ go and buy some.",o:["will","am going to","go to","would"],a:"will",h:"Decision made NOW → will"},
{q:"I _____ visit my grandmother this weekend. I already called her.",o:["am going to","will","would","am"],a:"am going to",h:"Plan already made → going to"},
{q:"Look at that car! It _____ crash!",o:["is going to","will","would","is"],a:"is going to",h:"Visible evidence → going to"},
{q:"I think robots _____ replace many jobs in the future.",o:["will","are going to","go to","are"],a:"will",h:"General prediction/opinion → will"},
]},
]},
// ══════════════════════════════════════════
// SECTION 5 — MODAL VERBS
// ══════════════════════════════════════════
{id:"mod",label:"Modal Verbs",units:[
{id:"u23",num:"Unit 23",title:"might",
preview:"I might go to the party. It might rain. She might not come.",
grammar:[
{h:"Form: might + base verb",c:`<span class="hl">might</span> (same for all subjects) — no -s, no do/does<span class="ex">I <span class="w">might go</span> to the party. (I'm not sure yet.)<br>It <span class="w">might rain</span> later. &nbsp; She <span class="w">might not come</span>.</span>`},
{h:"Meaning: possibility (maybe/perhaps)",c:`<span class="hl">might</span> = it's possible but not certain (~50% or less)<span class="ex">A: Are you coming? B: I <span class="w">might</span>. I'm not sure.<br>Take an umbrella — it <span class="w">might rain</span>.</span>`},
{h:"might vs. will",c:`<table><tr><th>might</th><th>will</th></tr><tr><td>possible (not sure)</td><td>certain or decided</td></tr><tr><td>It might be cold.</td><td>It will be cold. (I'm sure)</td></tr></table>`},
{h:"Negative: might not",c:`<span class="ex">I <span class="w">might not</span> finish by 5pm.<br>She <span class="w">might not</span> pass the exam. (= maybe she won't)</span>`}
],
quiz:[
{q:"Take an umbrella — it _____ rain.",o:["might","will","must","should"],a:"might",h:"Possibility, not certain → might"},
{q:"I _____ come to the party. I'm not sure yet.",o:["might","will","must","am going to"],a:"might",h:"Not sure → might"},
{q:"She _____ not be at home. Try calling first.",o:["might","will","must","should"],a:"might",h:"It's possible she's not home → might not"},
{q:"They _____ (might/win) the match — they're very good!",o:["might win","might wins","mights win","might winning"],a:"might win",h:"might + base verb (no -s or -ing)"},
]},

{id:"u24",num:"Unit 24",title:"can and could",
preview:"I can swim. She can't drive. Could you help me, please?",
grammar:[
{h:"can — present ability & permission",c:`<span class="hl">can</span> + base verb (same for ALL subjects, no -s)<span class="ex"><span class="w">I can</span> speak three languages. (ability)<br><span class="w">Can I</span> use your phone? (permission)<br><span class="w">Can you</span> open the door? (request)</span>`},
{h:"can't = cannot",c:`<span class="ex"><span class="w">She can't drive</span>. (= she is not able to drive)<br><span class="w">I can't hear</span> you. Speak louder!</span>`},
{h:"could — past ability",c:`<span class="hl">could</span> = was/were able to (past)<span class="ex">I <span class="w">could run</span> very fast when I was young.<br>She <span class="w">couldn't swim</span> when she was five.</span>`},
{h:"could — polite requests & possibility",c:`<span class="hl">could</span> for requests (more polite than can):<span class="ex"><span class="w">Could you</span> pass the salt, please?<br>It <span class="w">could be</span> dangerous. (= it's possibly dangerous)</span>`}
],
quiz:[
{q:"_____ you swim when you were five?",o:["Could","Can","Will","Would"],a:"Could",h:"Past ability → could"},
{q:"She _____ speak English very well.",o:["can","could","will","is"],a:"can",h:"Present ability → can"},
{q:"_____ you help me with this, please?",o:["Could","Can","Both are correct","Will"],a:"Both are correct",h:"Both can/could work; could is more polite"},
{q:"I _____ (not/sleep) at all last night.",o:["couldn't sleep","can't sleep","not can sleep","won't sleep"],a:"couldn't sleep",h:"Past → couldn't"},
]},

{id:"u25",num:"Unit 25",title:"must / mustn't / don't have to",
preview:"You must wear a seatbelt. You mustn't smoke here. You don't have to pay.",
grammar:[
{h:"must — strong obligation",c:`<span class="hl">must</span> + base verb<span class="ex">You <span class="w">must</span> show your passport. (it's required)<br>I <span class="w">must</span> call her. (I'm telling myself)</span>`},
{h:"mustn't — prohibition (DON'T!)",c:`<span class="hl">mustn't</span> = it is NOT allowed / forbidden<span class="ex">You <span class="w">mustn't smoke</span> in here. (it's forbidden)<br>You <span class="w">mustn't touch</span> that — it's dangerous!</span>`},
{h:"don't have to — not necessary",c:`<span class="hl">don't/doesn't have to</span> = not necessary (you can if you want)<span class="ex">You <span class="w">don't have to come</span>. (optional, no obligation)<br>She <span class="w">doesn't have to wear</span> a uniform.</span>`},
{h:"Key comparison",c:`<table><tr><th>Word</th><th>Meaning</th></tr><tr><td><b>must</b></td><td>necessary / obligation</td></tr><tr><td><b>mustn't</b></td><td>NOT allowed — prohibited!</td></tr><tr><td><b>don't have to</b></td><td>not necessary — your choice</td></tr></table>`}
],
quiz:[
{q:"You _____ drive without a licence. It's illegal.",o:["mustn't","don't have to","must","can't"],a:"mustn't",h:"Prohibited by law → mustn't"},
{q:"It's Sunday — she _____ go to work.",o:["doesn't have to","mustn't","must","can't"],a:"doesn't have to",h:"Not necessary → doesn't have to"},
{q:"You _____ wear a seatbelt. It's the law.",o:["must","mustn't","don't have to","might"],a:"must",h:"Legal obligation → must"},
{q:"Entry is free — you _____ pay.",o:["don't have to","mustn't","must","might not"],a:"don't have to",h:"Not necessary → don't have to"},
]},

{id:"u26",num:"Unit 26",title:"should / shouldn't",
preview:"You should see a doctor. She shouldn't eat so much sugar. Should I call him?",
grammar:[
{h:"Form: should + base verb",c:`<span class="hl">should</span> (same for all subjects) — weaker than must<br>Negative: <span class="hl">shouldn't</span> (should not)<span class="ex"><span class="w">You should</span> see a doctor. (I think it's a good idea)<br><span class="w">She shouldn't</span> eat so much sugar. (advice)</span>`},
{h:"Uses",c:`• <span class="hl">Advice</span>: You should drink more water.<br>• <span class="hl">Opinion</span>: I think they should lower prices.<br>• <span class="hl">Expectation</span>: She should be here soon. (I expect she will)<span class="ex">You <span class="w">shouldn't stay</span> up so late.<br><span class="w">Should I</span> take an umbrella? — Yes, I think you should.</span>`},
{h:"should vs. must",c:`<table><tr><th>should</th><th>must</th></tr><tr><td>advice / opinion</td><td>obligation / necessity</td></tr><tr><td>You should exercise more.</td><td>You must wear a helmet.</td></tr><tr><td>weaker recommendation</td><td>stronger requirement</td></tr></table>`}
],
quiz:[
{q:"You look tired. You _____ go to bed early.",o:["should","must","have to","will"],a:"should",h:"Advice → should"},
{q:"He _____ eat so much junk food.",o:["shouldn't","mustn't","doesn't","won't"],a:"shouldn't",h:"Advice (negative) → shouldn't"},
{q:"_____ I bring anything to the party?",o:["Should","Must","Can","Will"],a:"Should",h:"Asking for advice → should"},
{q:"I think the government _____ spend more on education.",o:["should","must","have to","can"],a:"should",h:"Opinion → should"},
]},

{id:"u27",num:"Unit 27",title:"have to / had to",
preview:"I have to work on Saturdays. She had to leave early. Do you have to wear a uniform?",
grammar:[
{h:"have to — external obligation (rules/laws/other people)",c:`I/you/we/they <span class="hl">have to</span> + verb &nbsp;|&nbsp; he/she/it <span class="hl">has to</span> + verb<span class="ex">I <span class="w">have to work</span> on Saturdays. (company rule)<br>She <span class="w">has to wear</span> a uniform at school.</span>`},
{h:"had to — past obligation",c:`<span class="hl">had to</span> + base verb (ALL subjects, past)<span class="ex">I <span class="w">had to wake up</span> at 5am yesterday.<br>She <span class="w">had to leave</span> early because of traffic.</span>`},
{h:"Negative & Question",c:`Negative: <span class="hl">don't/doesn't have to</span> (not necessary), <span class="hl">didn't have to</span> (wasn't necessary)<br>Question: <span class="hl">Do/Does/Did</span> + subject + <span class="hl">have to</span>?<span class="ex"><span class="w">Do you have to</span> work today? — No, I don't have to.<br><span class="w">Did she have to</span> take an exam? — Yes, she did.</span>`},
{h:"must vs. have to",c:`<span class="hl">must</span> → speaker decides (personal obligation)<br><span class="hl">have to</span> → someone/something else decides (external rule)<span class="ex">I <span class="w">must</span> call her. (I decided this myself.)<br>I <span class="w">have to</span> call her. (My boss told me to.)</span>`}
],
quiz:[
{q:"She _____ wear a uniform at her new school.",o:["has to","have to","must","had to"],a:"has to",h:"She (singular) → has to"},
{q:"I _____ wake up at 5am yesterday. It was terrible.",o:["had to","have to","must","needed"],a:"had to",h:"Past obligation → had to"},
{q:"_____ you _____ work at weekends?",o:["Do/have to","Does/have to","Must/have","Did/had to"],a:"Do/have to",h:"You → Do you have to?"},
{q:"He didn't _____ bring any food. There was plenty.",o:["have to","had to","must","need"],a:"have to",h:"didn't have to (past: wasn't necessary)"},
]},

{id:"u28",num:"Unit 28",title:"would like / I'd like",
preview:"I'd like a coffee. Would you like some tea? She'd like to travel.",
grammar:[
{h:"would like = want (polite form)",c:`<span class="hl">would like</span> (= 'd like) + noun OR + to-infinitive<span class="ex">I <span class="w">'d like</span> a coffee, please. (= I want a coffee — politely)<br>She <span class="w">'d like to travel</span> to Europe.<br><span class="w">Would you like</span> some tea?</span>`},
{h:"Would you like...? (offer/invitation)",c:`<span class="ex"><span class="w">Would you like</span> something to eat? — Yes, please. / No, thank you.<br><span class="w">Would you like to come</span> to my party?</span>`},
{h:"would like vs. like",c:`<table><tr><th>would like</th><th>like</th></tr><tr><td>want (right now)</td><td>enjoy in general</td></tr><tr><td>I'd like a coffee. (now)</td><td>I like coffee. (in general)</td></tr><tr><td>Would you like tea?</td><td>Do you like tea?</td></tr></table>`}
],
quiz:[
{q:"_____ you like some more cake?",o:["Would","Do","Will","Should"],a:"Would",h:"Offer → Would you like?"},
{q:"I _____ a glass of water, please.",o:["'d like","like","would liked","likes"],a:"'d like",h:"Polite want → I'd like"},
{q:"She _____ to visit Japan one day.",o:["would like","likes","is liking","would liked"],a:"would like",h:"would like + to-infinitive"},
{q:"Do you like coffee? vs. Would you like coffee? — which is an offer?",o:["Would you like coffee?","Do you like coffee?","Both","Neither"],a:"Would you like coffee?",h:"Would you like = offer right now; Do you like = general preference"},
]},
]},

// ══════════════════════════════════════════
// SECTION 6 — CONDITIONALS & WHEN
// ══════════════════════════════════════════
{id:"cond",label:"Conditionals",units:[
{id:"u29",num:"Unit 29",title:"1st Conditional — if + present, will",
preview:"If it rains, I'll stay home. If you study, you will pass.",
grammar:[
{h:"Structure",c:`<span class="hl">If</span> + present simple, <span class="hl">will</span> + base verb<span class="ex">If it <span class="w">rains</span>, I <span class="w">'ll stay</span> home.<br>If you <span class="w">study</span> hard, you <span class="w">will pass</span> the exam.</span>`},
{h:"Meaning: real / possible future condition",c:`Used for <span class="hl">real, possible situations</span> in the future — the result is likely if the condition happens.<span class="ex">If I <span class="w">have</span> time, I <span class="w">'ll call</span> you. (I might have time.)<br>If she <span class="w">doesn't hurry</span>, she <span class="w">'ll miss</span> the bus.</span>`},
{h:"Order can be reversed",c:`The if-clause can come first or second:<span class="ex">If it rains, I'll stay home.<br>= I'll stay home <span class="w">if</span> it rains.</span><br>Use a comma only when the if-clause comes FIRST.`},
{h:"unless = if not",c:`<span class="hl">unless</span> = if ... not<span class="ex">I'll go <span class="hl">unless</span> it rains. = I'll go <span class="hl">if it doesn't rain</span>.<br><span class="hl">Unless</span> you hurry, you'll be late.</span>`}
],
quiz:[
{q:"If you _____ (study), you will pass.",o:["study","studied","will study","are studying"],a:"study",h:"if + present simple"},
{q:"If it _____ (rain), we _____ (not/go) to the beach.",o:["rains/won't go","will rain/won't go","rains/don't go","rained/won't go"],a:"rains/won't go",h:"if + present; result = won't + base"},
{q:"She'll be late _____ she hurries.",o:["unless","if","when","before"],a:"unless",h:"unless = if not"},
{q:"What _____ you _____ (do) if you _____ (find) a wallet?",o:["will/do/find","would/do/found","will/do/found","would/do/find"],a:"will/do/find",h:"1st conditional: will + base; if + present"},
]},

{id:"u30",num:"Unit 30",title:"2nd Conditional — if + past, would",
preview:"If I had more money, I would travel. If she were here, she'd help.",
grammar:[
{h:"Structure",c:`<span class="hl">If</span> + past simple, <span class="hl">would</span> + base verb<span class="ex">If I <span class="w">had</span> more money, I <span class="w">would travel</span>.<br>If she <span class="w">lived</span> nearby, I <span class="w">'d visit</span> her more often.</span>`},
{h:"Meaning: imaginary / unlikely situation",c:`Used for <span class="hl">imaginary, unreal, or unlikely</span> situations in the present/future.<span class="ex">If I <span class="w">were</span> a bird, I <span class="w">would fly</span>. (I'm not a bird — imaginary)<br>If I <span class="w">won</span> the lottery, I <span class="w">'d buy</span> a house. (unlikely)</span>`},
{h:"were (not was) after if",c:`In formal/written English: use <span class="hl">were</span> for all subjects after <span class="hl">if</span>:<span class="ex">If I <span class="w">were</span> you, I <span class="w">would</span> apologize.<br>If she <span class="w">were</span> taller, she <span class="w">'d be</span> a model.<br>(Was is also common in spoken English)</span>`},
{h:"1st vs. 2nd conditional",c:`<table><tr><th>1st conditional</th><th>2nd conditional</th></tr><tr><td>Real / possible</td><td>Imaginary / unlikely</td></tr><tr><td>If it rains, I'll stay.</td><td>If I were rich, I'd travel.</td></tr><tr><td>if + present, will</td><td>if + past, would</td></tr></table>`}
],
quiz:[
{q:"If I _____ (have) more time, I _____ (learn) to paint.",o:["had/would learn","have/will learn","had/will learn","have/would learn"],a:"had/would learn",h:"2nd conditional: if + past; would + base"},
{q:"If she _____ (be) here, she _____ (know) what to do.",o:["were/would know","was/will know","is/would know","were/will know"],a:"were/would know",h:"were (formal); would + base"},
{q:"I _____ (travel) the world if I _____ (win) the lottery.",o:["would travel/won","will travel/win","would travel/win","travel/would win"],a:"would travel/won",h:"result: would + base; if: past simple"},
{q:"What _____ you do if you _____ (be) the president?",o:["would/were","will/are","would/are","will/were"],a:"would/were",h:"2nd conditional: would; if + were"},
]},

{id:"u31",num:"Unit 31",title:"when / if / while / before / after / until",
preview:"I'll call you when I arrive. While I was cooking, she set the table.",
grammar:[
{h:"when vs. if",c:`<span class="hl">when</span> = certain to happen &nbsp;|&nbsp; <span class="hl">if</span> = maybe will happen<span class="ex"><span class="w">When</span> I get home, I'll cook dinner. (I will definitely get home.)<br><span class="w">If</span> I get home early, I'll cook. (maybe I will, maybe not)</span>`},
{h:"After when/if/while/before/after/until → present simple (for future)",c:`Do NOT use <span class="hl">will</span> after these words in future sentences:<span class="ex">I'll wait <span class="hl">until</span> you <span class="w">come</span>. (NOT: until you will come)<br><span class="hl">Before</span> you <span class="w">leave</span>, call me.<br><span class="hl">After</span> she <span class="w">arrives</span>, we'll start.</span>`},
{h:"while = at the same time",c:`<span class="ex"><span class="hl">While</span> I <span class="w">was cooking</span>, she <span class="w">was watching</span> TV.<br>I'll read a book <span class="hl">while</span> you <span class="w">are</span> at the meeting.</span>`},
{h:"before / after / until",c:`<span class="ex">Call me <span class="hl">before</span> you <span class="w">leave</span>.<br>I'll relax <span class="hl">after</span> I <span class="w">finish</span> work.<br>Wait here <span class="hl">until</span> I <span class="w">come</span> back.</span>`}
],
quiz:[
{q:"I'll give you the book _____ I see you tomorrow.",o:["when","if","while","during"],a:"when",h:"Certain future event → when"},
{q:"_____ you get home, please call me. (certain)",o:["When","If","While","Until"],a:"When",h:"Certain → when"},
{q:"Wait here until she _____.",o:["comes","will come","came","is coming"],a:"comes",h:"After until → present simple (not will)"},
{q:"I'll rest _____ I finish this work.",o:["after","while","if","when"],a:"after",h:"after = following completion"},
]},
]},

// ══════════════════════════════════════════
// SECTION 7 — PASSIVE
// ══════════════════════════════════════════
{id:"pass",label:"Passive",units:[
{id:"u32",num:"Unit 32",title:"Passive Voice — is/are/was/were done",
preview:"Coffee is grown in Thailand. The window was broken. Mistakes were made.",
grammar:[
{h:"Form: am/is/are + past participle",c:`Active: Someone <span class="hl">cleans</span> the room. → Passive: The room <span class="hl">is cleaned</span>.<span class="ex">English <span class="w">is spoken</span> in many countries. (present)<br>The match <span class="w">was won</span> by Thailand. (past)<br>This bridge <span class="w">was built</span> in 1990.</span>`},
{h:"When to use passive",c:`• When the <span class="hl">action is more important</span> than who did it<br>• When we <span class="hl">don't know</span> or don't want to say who did it<span class="ex">My wallet <span class="w">was stolen</span>. (I don't know who stole it.)<br>This book <span class="w">was written</span> in 1850.</span>`},
{h:"Tense table",c:`<table><tr><th>Tense</th><th>Active</th><th>Passive</th></tr><tr><td>Present</td><td>They make cars.</td><td>Cars <b>are made</b>.</td></tr><tr><td>Past</td><td>They made cars.</td><td>Cars <b>were made</b>.</td></tr><tr><td>Future</td><td>They will make cars.</td><td>Cars <b>will be made</b>.</td></tr><tr><td>Pres. Perfect</td><td>They have made cars.</td><td>Cars <b>have been made</b>.</td></tr></table>`},
{h:"Negative & Question",c:`<span class="ex">The letter <span class="w">wasn't sent</span> yet.<br><span class="w">Was</span> the window <span class="w">broken</span>? — Yes, it was. / No, it wasn't.</span>`}
],
quiz:[
{q:"English _____ (speak) in many countries.",o:["is spoken","speaks","is speaking","was speak"],a:"is spoken",h:"Present passive: is/are + past participle"},
{q:"The Eiffel Tower _____ (build) in 1889.",o:["was built","was build","is built","built"],a:"was built",h:"Past passive: was/were + past participle"},
{q:"My phone _____ (steal) at the market.",o:["was stolen","was stole","is stolen","stole"],a:"was stolen",h:"Past passive; steal → stolen"},
{q:"These cars _____ (make) in Japan.",o:["are made","are make","is made","made"],a:"are made",h:"Present passive (plural cars) → are made"},
]},

{id:"u33",num:"Unit 33",title:"Passive with by — who did it",
preview:"This song was written by Taylor Swift. I was bitten by a dog.",
grammar:[
{h:"by + agent (the doer)",c:`Add <span class="hl">by</span> + the person/thing that did the action<span class="ex">This song <span class="w">was written by</span> Taylor Swift.<br>The window <span class="w">was broken by</span> the ball.<br>I <span class="w">was bitten by</span> a dog.</span>`},
{h:"When to include / omit 'by'",c:`Include <span class="hl">by</span> when the doer is important or interesting.<br>Omit when the doer is unknown, unimportant, or obvious:<span class="ex">The bridge <span class="w">was built</span> in 1960. (we don't know/care who built it)<br>The bridge <span class="w">was built by</span> a famous architect. (important info)</span>`},
{h:"get + past participle (informal passive)",c:`<span class="hl">get</span> + past participle = informal passive (especially for accidents/changes)<span class="ex">I <span class="w">got stung</span> by a bee.<br>She <span class="w">got fired</span> from her job.<br>He <span class="w">got hurt</span> in the accident.</span>`}
],
quiz:[
{q:"The Mona Lisa _____ (paint) by Leonardo da Vinci.",o:["was painted","painted","is painted","were painted"],a:"was painted",h:"Past passive + by the artist"},
{q:"I _____ (sting) by a jellyfish at the beach.",o:["got stung","was stinging","stung","get stung"],a:"got stung",h:"Informal passive for accident: got + past participle"},
{q:"This novel _____ (translate) into 30 languages.",o:["has been translated","has translated","is translate","translated"],a:"has been translated",h:"Present perfect passive: has been + past participle"},
{q:"She _____ (award) the prize _____ the committee.",o:["was awarded/by","awarded/by","was awarded/from","is awarded/by"],a:"was awarded/by",h:"Past passive + by"},
]},
]},

// ══════════════════════════════════════════
// SECTION 8 — QUESTIONS
// ══════════════════════════════════════════
{id:"ques",label:"Questions",units:[
{id:"u34",num:"Unit 34",title:"Question Words — who/what/where/when/why/how",
preview:"What do you do? Where does she live? Why are you late?",
grammar:[
{h:"Question word + auxiliary + subject + verb",c:`<span class="hl">What / Where / When / Who / Why / Which / How</span> + do/does/did/is/are/will... + subject + verb?<span class="ex"><span class="w">Where do</span> you live?<br><span class="w">What does</span> she do?<br><span class="w">Why did</span> he leave early?</span>`},
{h:"Question words with be",c:`<span class="ex"><span class="w">Where is</span> your bag?<br><span class="w">What are</span> those?<br><span class="w">When was</span> she born?<br><span class="w">Who are</span> those people?</span>`},
{h:"Who/What as subject (no do/does)",c:`When <span class="hl">who</span> or <span class="hl">what</span> IS the subject, don't use do/does:<span class="ex">Someone called me. → <span class="w">Who called</span> you? (NOT: Who did call?)<br>Something happened. → <span class="w">What happened</span>? (NOT: What did happen?)</span>`},
{h:"How + adjective/adverb",c:`<span class="ex"><span class="w">How old</span> are you? &nbsp; <span class="w">How tall</span> is he? &nbsp; <span class="w">How far</span> is it?<br><span class="w">How long</span> does it take? &nbsp; <span class="w">How much</span> does it cost? &nbsp; <span class="w">How many</span> people?<br><span class="w">How often</span> do you exercise? &nbsp; <span class="w">How fast</span> can you run?</span>`}
],
quiz:[
{q:"_____ does she live? — In Chiang Mai.",o:["Where","When","What","Why"],a:"Where",h:"Asking about place → where"},
{q:"_____ called you? — My sister did.",o:["Who","Whom","What","How"],a:"Who",h:"Who as subject → Who called (no did)"},
{q:"_____ did you leave early?",o:["Why","Where","What","Who"],a:"Why",h:"Asking for reason → why"},
{q:"_____ does it take to get there? — About 30 minutes.",o:["How long","How far","How much","How many"],a:"How long",h:"Asking about duration → how long"},
]},

{id:"u35",num:"Unit 35",title:"Negative Questions & Question Tags",
preview:"Don't you like it? You're tired, aren't you? She didn't come, did she?",
grammar:[
{h:"Negative questions",c:`<span class="hl">Don't/Doesn't/Didn't/Isn't/Aren't/Won't</span> + subject + verb?<br>Used to express surprise or when you expect a 'yes' answer:<span class="ex"><span class="w">Don't you like</span> coffee? (I thought you did.)<br><span class="w">Isn't she</span> coming? (I thought she was.)<br><span class="w">Didn't you study</span>? (I thought you did.)</span>`},
{h:"Question tags — form",c:`Positive sentence + <span class="hl">negative tag</span><br>Negative sentence + <span class="hl">positive tag</span><span class="ex">You're tired, <span class="w">aren't you</span>?<br>She doesn't like it, <span class="w">does she</span>?<br>He went home, <span class="w">didn't he</span>?<br>It's cold, <span class="w">isn't it</span>?</span>`},
{h:"Special question tags",c:`<span class="ex">I'm right, <span class="w">aren't I</span>? (NOT: amn't I?)<br>There's a problem, <span class="w">isn't there</span>?<br>Let's go, <span class="w">shall we</span>?<br>Don't be late, <span class="w">will you</span>?</span>`}
],
quiz:[
{q:"You like Thai food, _____ you?",o:["don't","aren't","isn't","do"],a:"don't",h:"Positive sentence → negative tag: don't you?"},
{q:"She didn't call, _____ she?",o:["did","didn't","does","is"],a:"did",h:"Negative sentence → positive tag: did she?"},
{q:"It's hot today, _____ it?",o:["isn't","is","doesn't","aren't"],a:"isn't",h:"It's (positive) → isn't it?"},
{q:"They can swim, _____ they?",o:["can't","cannot","don't","can"],a:"can't",h:"Positive (can) → negative tag: can't they?"},
]},

{id:"u36",num:"Unit 36",title:"Who/What/Which — asking about things & people",
preview:"Which dress do you prefer? What kind of music do you like?",
grammar:[
{h:"who — people",c:`<span class="hl">Who</span> = which person/people<span class="ex"><span class="w">Who</span> is your teacher? &nbsp; <span class="w">Who did</span> you meet? &nbsp; <span class="w">Who's</span> calling?</span>`},
{h:"what — things / general",c:`<span class="hl">What</span> = which thing / general question<span class="ex"><span class="w">What</span> is your name? &nbsp; <span class="w">What do</span> you want? &nbsp; <span class="w">What kind of</span> music do you like?</span>`},
{h:"which — limited choice",c:`<span class="hl">Which</span> = which one (from a limited group)<span class="ex"><span class="w">Which dress</span> do you prefer, the red or the blue?<br><span class="w">Which bus</span> goes to the station?<br>(Use which when there is a specific set of options)</span>`},
{h:"what vs. which",c:`<table><tr><th>what</th><th>which</th></tr><tr><td>open question, many possibilities</td><td>limited choices</td></tr><tr><td>What colour do you like?</td><td>Which colour — red or blue?</td></tr><tr><td>What did you eat?</td><td>Which dish — the noodles or the rice?</td></tr></table>`}
],
quiz:[
{q:"_____ is your favourite singer? — Taylor Swift.",o:["Who","Which","What","Where"],a:"Who",h:"Favourite singer = a person → who"},
{q:"_____ do you prefer — tea or coffee?",o:["Which","What","Who","How"],a:"Which",h:"Limited choice (tea or coffee) → which"},
{q:"_____ happened? — I fell down the stairs.",o:["What","Who","Which","Where"],a:"What",h:"Asking about an event/thing → what"},
{q:"_____ subject do you like best?",o:["Which","What","Who","When"],a:"Which",h:"Choosing from school subjects (limited set) → which"},
]},
]},
// ══════════════════════════════════════════
// SECTION 9 — -ING AND INFINITIVE
// ══════════════════════════════════════════
{id:"ing",label:"-ing & Infinitive",units:[
{id:"u37",num:"Unit 37",title:"enjoy / mind / stop + -ing",
preview:"I enjoy reading. Do you mind waiting? She stopped smoking.",
grammar:[
{h:"Verbs followed by -ing (gerund)",c:`<span class="hl">enjoy, mind, stop, finish, keep, avoid, imagine, suggest, admit, deny, practise, miss</span><span class="ex">I <span class="w">enjoy reading</span> in the evening.<br>Do you <span class="w">mind waiting</span>? — No, I don't mind.<br>She <span class="w">stopped smoking</span> last year.</span>`},
{h:"Common patterns",c:`<span class="ex">He <span class="w">finished writing</span> the report. &nbsp; She <span class="w">keeps forgetting</span> things.<br>I <span class="w">avoid eating</span> junk food. &nbsp; They <span class="w">suggested going</span> to the park.</span>`},
{h:"Do you mind + -ing? (asking permission/favour)",c:`<span class="ex"><span class="w">Do you mind opening</span> the window? (= Is it OK if I/you open it?)<br>Would you <span class="w">mind waiting</span> a moment?</span>`},
{h:"stop + -ing vs. stop + to-infinitive",c:`<span class="hl">stop + -ing</span> = finish doing something<br><span class="hl">stop + to</span> = stop in order to do something<span class="ex">She <span class="w">stopped smoking</span>. (she no longer smokes)<br>She <span class="w">stopped to smoke</span>. (she paused in order to smoke)</span>`}
],
quiz:[
{q:"I enjoy _____ (read) books.",o:["reading","to read","read","having read"],a:"reading",h:"enjoy + -ing"},
{q:"She stopped _____ (work) at 6pm.",o:["working","to work","work","worked"],a:"working",h:"stopped + -ing = finished"},
{q:"Do you mind _____ (wait) here?",o:["waiting","to wait","wait","waited"],a:"waiting",h:"mind + -ing"},
{q:"Keep _____ (go) straight and you'll see it.",o:["going","to go","go","gone"],a:"going",h:"keep + -ing"},
]},

{id:"u38",num:"Unit 38",title:"want / would like / hope + to-infinitive",
preview:"I want to go. She hopes to travel. They decided to stay.",
grammar:[
{h:"Verbs followed by to-infinitive",c:`<span class="hl">want, would like, hope, decide, plan, try, need, learn, forget, remember, seem, appear, manage, agree, offer, refuse, promise, expect</span><span class="ex">I <span class="w">want to go</span> home. &nbsp; She <span class="w">hopes to travel</span> next year.<br>He <span class="w">decided to leave</span>. &nbsp; They <span class="w">managed to finish</span> on time.</span>`},
{h:"Negative: don't want / didn't decide etc.",c:`<span class="ex">I <span class="w">don't want to go</span>. &nbsp; She <span class="w">refused to help</span>.<br>He <span class="w">didn't manage to finish</span>.</span>`},
{h:"verb + object + to-infinitive",c:`<span class="hl">tell, ask, want, would like, invite, teach, help</span> + object + to + verb<span class="ex">She <span class="w">told me to wait</span>. &nbsp; He <span class="w">asked her to help</span>.<br>I <span class="w">want you to listen</span>. &nbsp; She <span class="w">helped him to carry</span> the bags.</span>`}
],
quiz:[
{q:"I _____ (want/go) home now.",o:["want to go","want going","wants to go","want go"],a:"want to go",h:"want + to-infinitive"},
{q:"She _____ (decide/study) abroad.",o:["decided to study","decided studying","decides to study","decided study"],a:"decided to study",h:"decide + to-infinitive"},
{q:"He _____ (manage/finish) the project on time.",o:["managed to finish","managed finishing","manage to finish","manages to finish"],a:"managed to finish",h:"manage + to-infinitive"},
{q:"I told _____ (she/wait).",o:["her to wait","she to wait","her waiting","she wait"],a:"her to wait",h:"tell + object + to-infinitive; she → her (object)"},
]},

{id:"u39b",num:"Unit 39",title:"go + -ing (go swimming, go shopping)",
preview:"I go swimming every morning. Let's go shopping! She went hiking.",
grammar:[
{h:"go + -ing for activities (especially sports & leisure)",c:`<span class="hl">go + verb-ing</span> for activities you go somewhere to do:<span class="ex"><span class="w">go swimming</span> &nbsp;|&nbsp; <span class="w">go running</span> &nbsp;|&nbsp; <span class="w">go shopping</span> &nbsp;|&nbsp; <span class="w">go cycling</span><br><span class="w">go hiking</span> &nbsp;|&nbsp; <span class="w">go fishing</span> &nbsp;|&nbsp; <span class="w">go dancing</span> &nbsp;|&nbsp; <span class="w">go skiing</span></span>`},
{h:"Examples",c:`<span class="ex">I <span class="w">go swimming</span> every morning. &nbsp; Let's <span class="w">go shopping</span>!<br>They went <span class="w">hiking</span> in the mountains. &nbsp; She <span class="w">goes running</span> at 6am.</span>`},
{h:"past tense",c:`<span class="ex">I <span class="w">went</span> swimming yesterday. &nbsp; They <span class="w">went</span> shopping last weekend.</span>`}
],
quiz:[
{q:"I _____ every morning. I love the water.",o:["go swimming","go swim","go to swim","am going swim"],a:"go swimming",h:"go + -ing for activity"},
{q:"Let's _____ this afternoon!",o:["go shopping","go shop","go to shop","go shopped"],a:"go shopping",h:"go + -ing"},
{q:"They _____ in the Alps last winter.",o:["went skiing","went ski","go skiing","go ski"],a:"went skiing",h:"past: went + -ing"},
{q:"She _____ three times a week.",o:["goes running","go running","goes run","went running"],a:"goes running",h:"She → goes + -ing (present habit)"},
]},

{id:"u40b",num:"Unit 40",title:"begin/start/continue + -ing or to-infinitive",
preview:"It started raining. She began to cry. He continued working/to work.",
grammar:[
{h:"begin, start, continue, intend — both forms OK",c:`<span class="hl">begin / start / continue / intend</span> + -ing OR + to-infinitive (same meaning)<span class="ex">It <span class="w">started raining</span>. = It <span class="w">started to rain</span>.<br>She <span class="w">began crying</span>. = She <span class="w">began to cry</span>.<br>He <span class="w">continued working</span>. = He <span class="w">continued to work</span>.</span>`},
{h:"like / love / hate — both forms OK (general)",c:`<span class="ex">I <span class="w">like reading</span>. = I <span class="w">like to read</span>. (both = I enjoy it generally)<br>She <span class="w">hates getting up</span> early. = She <span class="w">hates to get up</span> early.</span>`},
{h:"try + -ing vs. try + to-infinitive",c:`<span class="hl">try + -ing</span> = experiment, see what happens<br><span class="hl">try + to</span> = attempt (might be difficult)<span class="ex">Try <span class="w">adding</span> some salt. (experiment to improve it)<br>I tried <span class="w">to open</span> the door but it was locked. (attempt)</span>`},
{h:"remember/forget + -ing vs. to-infinitive",c:`<span class="hl">remember/forget + -ing</span> = looking back (past action)<br><span class="hl">remember/forget + to</span> = looking forward (future action)<span class="ex">I <span class="w">remember meeting</span> her. (= I recall the past event)<br>Remember <span class="w">to call</span> me. (= don't forget to do it)</span>`}
],
quiz:[
{q:"It started _____ (rain) heavily.",o:["raining / to rain","rains","rained","to raining"],a:"raining / to rain",h:"start + -ing or to-infinitive — both correct"},
{q:"I remember _____ (see) her at the airport.",o:["seeing","to see","saw","see"],a:"seeing",h:"remember + -ing = recall a past memory"},
{q:"Remember _____ (lock) the door before you leave.",o:["to lock","locking","locked","lock"],a:"to lock",h:"remember + to-infinitive = don't forget future action"},
{q:"Try _____ (take) this medicine. It might help.",o:["taking","to take","Both are correct","take"],a:"Both are correct",h:"try + -ing = experiment; try + to = attempt (both possible here)"},
]},
]},

// ══════════════════════════════════════════
// SECTION 10 — ARTICLES & NOUNS
// ══════════════════════════════════════════
{id:"art",label:"Articles & Nouns",units:[
{id:"u41",num:"Unit 41",title:"a / an",
preview:"a cat, an apple, a university, an hour, a useful tool",
grammar:[
{h:"a vs. an — based on SOUND, not spelling",c:`<span class="hl">a</span> + consonant SOUND &nbsp;|&nbsp; <span class="hl">an</span> + vowel SOUND (a, e, i, o, u sounds)<span class="ex"><span class="w">a</span> cat, <span class="w">a</span> book, <span class="w">a</span> university (sounds like 'you-')<br><span class="w">an</span> apple, <span class="w">an</span> egg, <span class="w">an</span> hour (h is silent)<br><span class="w">a</span> useful tool (u sounds like 'y'), <span class="w">an</span> honest man (h is silent)</span>`},
{h:"When to use a/an",c:`• First mention: I saw <span class="hl">a</span> dog.<br>• Jobs: She is <span class="hl">a</span> nurse. He is <span class="hl">an</span> engineer.<br>• One of something: I need <span class="hl">a</span> pen.<br>• With singular countable nouns`},
{h:"NO a/an with plurals or uncountable nouns",c:`✗ a water, a rice, a money, a news<br>✓ <span class="hl">some</span> water, <span class="hl">a bottle of</span> water, <span class="hl">a glass of</span> juice<span class="ex">✓ <span class="w">some</span> information &nbsp; ✓ <span class="w">a piece of</span> advice</span>`}
],
quiz:[
{q:"She is _____ engineer.",o:["an","a","the","-"],a:"an",h:"engineer starts with vowel sound 'e'"},
{q:"It took _____ hour to get there.",o:["an","a","the","-"],a:"an",h:"hour — 'h' is silent → vowel sound"},
{q:"He is _____ university student.",o:["a","an","the","-"],a:"a",h:"university sounds like 'you-' → consonant sound"},
{q:"I ate _____ apple and _____ banana.",o:["an / a","a / an","an / an","a / a"],a:"an / a",h:"apple = vowel; banana = consonant"},
]},

{id:"u42",num:"Unit 42",title:"the",
preview:"Look at the moon. The coffee I ordered was cold. Close the door.",
grammar:[
{h:"Use 'the' when both speaker and listener know which one",c:`• <span class="hl">Second mention</span>: I saw a dog. <span class="hl">The dog</span> was friendly.<br>• <span class="hl">Only one</span> of something: the sun, the moon, the sky, the world<br>• <span class="hl">Specific</span>: <span class="hl">the</span> coffee I ordered (that specific coffee)<span class="ex">Can you close <span class="w">the</span> door? (= the door of this room we're in)</span>`},
{h:"the with geography",c:`Use <span class="hl">the</span> with: rivers, oceans, seas, mountain ranges, groups of islands, countries with 'Republic/Kingdom/States/Union'<span class="ex">the Nile, the Pacific, the Himalayas, the United States, the Philippines</span><br>No the with: most countries, cities, single mountains/lakes:<span class="ex">Thailand, Bangkok, Mount Everest, Lake Baikal</span>`},
{h:"No article (zero article)",c:`No article with: <span class="hl">meals</span> (breakfast), <span class="hl">sports</span> (football), <span class="hl">languages</span> (English), <span class="hl">school/work/home/bed/hospital</span> (as concepts)<span class="ex">I have <span class="w">breakfast</span> at 7. &nbsp; She plays <span class="w">tennis</span>. &nbsp; He speaks <span class="w">Thai</span>.<br>She's in <span class="w">hospital</span>. (she's ill) &nbsp; She's in <span class="w">the hospital</span>. (visiting someone)</span>`}
],
quiz:[
{q:"I saw a cat. _____ cat was sitting on the wall.",o:["The","A","An","-"],a:"The",h:"Second mention → the"},
{q:"_____ Nile is the longest river in Africa.",o:["The","A","-","An"],a:"The",h:"Rivers → the"},
{q:"She had _____ lunch at noon.",o:["-","the","a","an"],a:"-",h:"Meals → no article"},
{q:"Please close _____ window. It's cold.",o:["the","a","an","-"],a:"the",h:"Both speaker and listener know which window → the"},
]},

{id:"u43",num:"Unit 43",title:"some and any",
preview:"I'd like some coffee. Have you got any milk? There aren't any eggs.",
grammar:[
{h:"some — positive sentences & offers/requests",c:`<span class="hl">some</span> = a quantity of (positive, uncountable or plural)<span class="ex">I'd like <span class="w">some</span> coffee. &nbsp; There are <span class="w">some</span> eggs in the fridge.<br>Can I have <span class="w">some</span> water? (offer/request — even though a question)</span>`},
{h:"any — negatives & questions",c:`<span class="hl">any</span> = in negatives and (most) questions<span class="ex">I don't have <span class="w">any</span> money. &nbsp; Have you got <span class="w">any</span> questions?<br>Is there <span class="w">any</span> bread left?</span>`},
{h:"any = it doesn't matter which (positive)",c:`<span class="hl">any</span> can also mean 'it doesn't matter which' in positive sentences:<span class="ex">Take <span class="w">any</span> seat you like. &nbsp; Come <span class="w">any</span> time.</span>`},
{h:"Summary table",c:`<table><tr><th></th><th>some</th><th>any</th></tr><tr><td>Positive</td><td>I have some milk.</td><td>Any seat is fine.</td></tr><tr><td>Negative</td><td>✗</td><td>I don't have any milk.</td></tr><tr><td>Question</td><td>Would you like some? (offer)</td><td>Do you have any milk?</td></tr></table>`}
],
quiz:[
{q:"I don't have _____ money.",o:["any","some","a","the"],a:"any",h:"Negative sentence → any"},
{q:"Would you like _____ tea?",o:["some","any","a","the"],a:"some",h:"Offer → some"},
{q:"Are there _____ seats available?",o:["any","some","a","the"],a:"any",h:"Question → any"},
{q:"Take _____ seat you like.",o:["any","some","a","the"],a:"any",h:"It doesn't matter which → any"},
]},

{id:"u44",num:"Unit 44",title:"something / anything / nothing / nobody",
preview:"I need something. I don't want anything. Nobody came. Everything is fine.",
grammar:[
{h:"some- words (positive)",c:`<span class="hl">something, somebody/someone, somewhere</span> — used in positive sentences<span class="ex">I need <span class="w">something</span> to eat. &nbsp; <span class="w">Somebody</span> called you. &nbsp; Let's go <span class="w">somewhere</span> nice.</span>`},
{h:"any- words (negatives & questions)",c:`<span class="hl">anything, anybody/anyone, anywhere</span><span class="ex">I don't want <span class="w">anything</span>. &nbsp; Did <span class="w">anybody</span> call? &nbsp; I can't find it <span class="w">anywhere</span>.</span>`},
{h:"no- words (negative meaning, positive sentence)",c:`<span class="hl">nothing, nobody/no one, nowhere</span> = already negative (don't add 'not')<span class="ex"><span class="w">Nobody</span> came. (NOT: Nobody didn't come.)<br><span class="w">Nothing</span> happened. &nbsp; There is <span class="w">nowhere</span> to park.</span>`},
{h:"every- words",c:`<span class="hl">everything, everybody/everyone, everywhere</span><span class="ex"><span class="w">Everything</span> is ready. &nbsp; <span class="w">Everybody</span> loves her. &nbsp; I've looked <span class="w">everywhere</span>.</span>`}
],
quiz:[
{q:"I need _____ to eat. I'm starving.",o:["something","anything","nothing","everything"],a:"something",h:"Positive sentence → something"},
{q:"Did _____ call while I was out?",o:["anybody","somebody","nobody","everybody"],a:"anybody",h:"Question → anybody"},
{q:"_____ happened. It was a quiet day.",o:["Nothing","Anything","Something","Everything"],a:"Nothing",h:"Nothing = no + thing (positive verb form)"},
{q:"She looked _____ but couldn't find her keys.",o:["everywhere","somewhere","anywhere","nowhere"],a:"everywhere",h:"looked in all places → everywhere"},
]},

{id:"u45",num:"Unit 45",title:"Countable & Uncountable Nouns",
preview:"a book (countable) — some water (uncountable). Much water, many books.",
grammar:[
{h:"Countable nouns",c:`Can be counted: <span class="hl">one book, two books</span><br>Have singular and plural forms<br>Use: <span class="hl">a/an, one, two, some, any, many, a few, how many</span><span class="ex">a <span class="w">book</span>, two <span class="w">chairs</span>, many <span class="w">people</span>, a few <span class="w">days</span></span>`},
{h:"Uncountable nouns",c:`Cannot be counted — no plural, no a/an<br>Use: <span class="hl">some, any, much, a little, a lot of, how much</span><span class="ex"><span class="w">water, milk, rice, bread, sugar, money, information, advice, news, music, air, traffic, luggage</span></span>`},
{h:"much vs. many",c:`<span class="hl">much</span> + uncountable: How much water? Not much money.<br><span class="hl">many</span> + countable: How many books? Not many people.`},
{h:"a little vs. a few",c:`<span class="hl">a little</span> + uncountable: a little time, a little sugar (small amount)<br><span class="hl">a few</span> + countable: a few books, a few people (small number)<span class="ex">I have <span class="w">a little</span> money left. &nbsp; I have <span class="w">a few</span> friends here.</span>`}
],
quiz:[
{q:"How _____ milk do we need?",o:["much","many","few","little"],a:"much",h:"milk = uncountable → how much"},
{q:"I have _____ friends in Bangkok.",o:["a few","a little","much","less"],a:"a few",h:"friends = countable → a few"},
{q:"There isn't _____ information about this.",o:["much","many","few","some"],a:"much",h:"information = uncountable → much"},
{q:"She has only _____ time before the meeting.",o:["a little","a few","many","much"],a:"a little",h:"time = uncountable → a little"},
]},

{id:"u46",num:"Unit 46",title:"Singular & Plural Nouns",
preview:"one child → two children. one knife → two knives. The police are here.",
grammar:[
{h:"Regular plurals: add -s or -es",c:`• Most: add <span class="hl">-s</span> → book→books, car→cars<br>• -ch/-sh/-s/-ss/-x: add <span class="hl">-es</span> → church→churches, bus→buses<br>• Consonant+y: change y→i + <span class="hl">-es</span> → city→cities, country→countries<br>• -f/-fe: change to <span class="hl">-ves</span> → leaf→leaves, knife→knives (but: roof→roofs)`},
{h:"Irregular plurals",c:`<table><tr><th>Singular</th><th>Plural</th><th>Singular</th><th>Plural</th></tr><tr><td>man</td><td><b>men</b></td><td>tooth</td><td><b>teeth</b></td></tr><tr><td>woman</td><td><b>women</b></td><td>foot</td><td><b>feet</b></td></tr><tr><td>child</td><td><b>children</b></td><td>mouse</td><td><b>mice</b></td></tr><tr><td>person</td><td><b>people</b></td><td>sheep</td><td><b>sheep</b></td></tr><tr><td>fish</td><td><b>fish</b></td><td>deer</td><td><b>deer</b></td></tr></table>`},
{h:"Always plural (no singular)",c:`<span class="hl">trousers, jeans, glasses, scissors, headphones, pyjamas</span><span class="ex">My trousers <span class="w">are</span> new. (NOT: My trousers is new.)<br>These glasses <span class="w">are</span> expensive.</span>`}
],
quiz:[
{q:"Two _____ came to the door.",o:["men","mans","man","manes"],a:"men",h:"man → men (irregular)"},
{q:"She has three _____.",o:["children","childs","childrens","child"],a:"children",h:"child → children (irregular)"},
{q:"My _____ (trouser) are dirty.",o:["trousers","trouser","trouserses","trouser's"],a:"trousers",h:"Always plural → trousers"},
{q:"The _____ (country) in Europe are diverse.",o:["countries","countrys","country","countris"],a:"countries",h:"consonant+y → -ies"},
]},
]},

// ══════════════════════════════════════════
// SECTION 11 — PRONOUNS & DETERMINERS
// ══════════════════════════════════════════
{id:"pron",label:"Pronouns",units:[
{id:"u47",num:"Unit 47",title:"Personal Pronouns — I/me, he/him, they/them",
preview:"She likes him. We told them. I gave it to her.",
grammar:[
{h:"Subject pronouns (do the action)",c:`<span class="hl">I, you, he, she, it, we, they</span><span class="ex"><span class="w">She</span> likes coffee. &nbsp; <span class="w">They</span> are late. &nbsp; <span class="w">I</span> don't know.</span>`},
{h:"Object pronouns (receive the action)",c:`<span class="hl">me, you, him, her, it, us, them</span><span class="ex">She likes <span class="w">him</span>. &nbsp; I gave the book to <span class="w">her</span>. &nbsp; Can you help <span class="w">us</span>?</span>`},
{h:"Subject vs. Object",c:`<table><tr><th>Subject</th><th>Object</th><th>Example</th></tr><tr><td>I</td><td>me</td><td>She called me.</td></tr><tr><td>he</td><td>him</td><td>I saw him.</td></tr><tr><td>she</td><td>her</td><td>Tell her.</td></tr><tr><td>we</td><td>us</td><td>Join us.</td></tr><tr><td>they</td><td>them</td><td>I know them.</td></tr></table>`}
],
quiz:[
{q:"_____ called me last night. (= the woman)",o:["She","Her","He","They"],a:"She",h:"Subject pronoun → she"},
{q:"I gave the gift to _____ . (= the woman)",o:["her","she","he","they"],a:"her",h:"Object pronoun → her"},
{q:"Can you help _____ ? (= me and my friend)",o:["us","we","them","our"],a:"us",h:"Object pronoun → us"},
{q:"_____ like Thai food. (= me and my family)",o:["We","Us","Our","They"],a:"We",h:"Subject pronoun → we"},
]},

{id:"u48",num:"Unit 48",title:"Possessives — my/mine, your/yours",
preview:"This is my bag. Is this yours? Her hair is long. Hers is longer.",
grammar:[
{h:"Possessive adjectives (before a noun)",c:`<span class="hl">my, your, his, her, its, our, their</span><span class="ex"><span class="w">My</span> name is Tom. &nbsp; <span class="w">Her</span> hair is beautiful. &nbsp; <span class="w">Their</span> house is big.</span>`},
{h:"Possessive pronouns (stand alone, no noun after)",c:`<span class="hl">mine, yours, his, hers, its, ours, theirs</span><span class="ex">This bag is <span class="w">mine</span>. (= my bag)<br>Is this <span class="w">yours</span>? &nbsp; That's <span class="w">hers</span>. &nbsp; Which seat is <span class="w">ours</span>?</span>`},
{h:"Table",c:`<table><tr><th>Person</th><th>Adj. (my...)</th><th>Pronoun (mine)</th></tr><tr><td>I</td><td>my</td><td>mine</td></tr><tr><td>you</td><td>your</td><td>yours</td></tr><tr><td>he</td><td>his</td><td>his</td></tr><tr><td>she</td><td>her</td><td>hers</td></tr><tr><td>we</td><td>our</td><td>ours</td></tr><tr><td>they</td><td>their</td><td>theirs</td></tr></table>`},
{h:"whose — asking about possession",c:`<span class="ex"><span class="w">Whose</span> bag is this? — It's <span class="w">mine</span>.<br><span class="w">Whose</span> are these keys? — They're <span class="w">hers</span>.</span>`}
],
quiz:[
{q:"_____ name is Lisa. She's a doctor.",o:["Her","Hers","His","Their"],a:"Her",h:"Possessive adjective before noun → her"},
{q:"This book is _____ . (= it belongs to me)",o:["mine","my","me","I"],a:"mine",h:"Stands alone, no noun after → possessive pronoun: mine"},
{q:"_____ house is bigger — yours or _____?",o:["Whose / theirs","Who's / theirs","Whose / their","Who's / their"],a:"Whose / theirs",h:"Whose = asking possession; theirs = pronoun (no noun after)"},
{q:"We forgot _____ umbrella.",o:["our","ours","us","we"],a:"our",h:"Before noun → possessive adjective: our"},
]},

{id:"u49",num:"Unit 49",title:"Reflexive Pronouns — myself, yourself, himself",
preview:"I did it myself. She hurt herself. We enjoyed ourselves.",
grammar:[
{h:"Reflexive pronouns",c:`<table><tr><th>Subject</th><th>Reflexive</th></tr><tr><td>I</td><td>myself</td></tr><tr><td>you</td><td>yourself (singular) / yourselves (plural)</td></tr><tr><td>he</td><td>himself</td></tr><tr><td>she</td><td>herself</td></tr><tr><td>it</td><td>itself</td></tr><tr><td>we</td><td>ourselves</td></tr><tr><td>they</td><td>themselves</td></tr></table>`},
{h:"Uses",c:`• Subject and object are the same person<br>• For emphasis (= alone, without help)<span class="ex">She <span class="w">hurt herself</span>. (she = the person who got hurt)<br>I did it <span class="w">myself</span>. (= without help, I did it alone)<br>The door opened <span class="w">itself</span>. (no one opened it)</span>`},
{h:"by yourself = alone",c:`<span class="hl">by + reflexive pronoun</span> = alone / without help<span class="ex">She lives <span class="w">by herself</span>. (= alone)<br>Did you do this <span class="w">by yourself</span>? (= alone, without help?)</span>`}
],
quiz:[
{q:"Be careful! You might hurt _____.",o:["yourself","you","your","yourselves"],a:"yourself",h:"You (singular) → yourself"},
{q:"She made this cake _____.",o:["herself","himself","herself","hers"],a:"herself",h:"She → herself (emphasis: alone/without help)"},
{q:"The boys enjoyed _____ at the party.",o:["themselves","theirselves","them","their"],a:"themselves",h:"They → themselves"},
{q:"I like living _____ _____ . (= alone)",o:["by/myself","by/me","by/I","with/myself"],a:"by/myself",h:"by myself = alone"},
]},

{id:"u50",num:"Unit 50",title:"all / every / both / either / neither",
preview:"All the students passed. Every day is different. Both sisters are tall.",
grammar:[
{h:"all vs. every",c:`<span class="hl">all</span> + plural noun / <span class="hl">every</span> + singular noun<span class="ex"><span class="w">All</span> the students passed. (group)<br><span class="w">Every</span> student passed. (each one, one by one)<br><span class="w">All</span> day / <span class="w">every</span> day — both possible</span>`},
{h:"both / either / neither — for TWO things",c:`<span class="hl">both</span> = A and B (two, and they are the same)<br><span class="hl">either</span> = A or B (one of two)<br><span class="hl">neither</span> = not A and not B<span class="ex"><span class="w">Both</span> sisters are doctors. (the two of them)<br>You can take <span class="w">either</span> bus — 14 or 22. (one of the two)<br><span class="w">Neither</span> team scored. (= not this team, not that team)</span>`},
{h:"neither ... nor / either ... or / both ... and",c:`<span class="ex"><span class="w">Both</span> Tom <span class="w">and</span> Lisa came. (= Tom came and Lisa came)<br><span class="w">Either</span> he <span class="w">or</span> she will help. (one of them)<br><span class="w">Neither</span> Tom <span class="w">nor</span> Lisa came. (= not Tom, not Lisa)</span>`}
],
quiz:[
{q:"_____ student in the class has a textbook.",o:["Every","All","Both","Neither"],a:"Every",h:"every + singular noun"},
{q:"_____ of them came — not Tom, not Lisa.",o:["Neither","Both","Either","All"],a:"Neither",h:"not this one, not that one → neither"},
{q:"You can sit on _____ side — left or right.",o:["either","both","neither","every"],a:"either",h:"one of two choices → either"},
{q:"_____ my parents are teachers.",o:["Both","Either","Neither","Every"],a:"Both",h:"two people, both → both"},
]},
]},
